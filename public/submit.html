<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スコア投稿 - HBR</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav id="nav"></nav>
<main>
  <h1 class="page-title" data-i18n="submit.title">スコア投稿</h1>
  <p class="page-subtitle" data-i18n="submit.subtitle">リザルト画像とともにスコアを投稿してください</p>

  <div class="submit-card">
    <div id="alert"></div>
    <div class="card">
      <form id="submit-form">
        <div class="form-group">
          <label class="form-label" data-i18n="submit.event">イベント</label>
          <select class="form-select" id="event-select" required>
            <option value="" data-i18n="submit.select">選択してください</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="submit.attr">属性</label>
          <div style="display:flex;flex-wrap:wrap;gap:8px" id="attr-select">
            <!-- 属性ラジオボタン -->
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="submit.image">リザルト画像</label>
          <input class="form-input" type="file" id="image-input" accept="image/*" style="padding:8px">
          <div class="form-hint" data-i18n="submit.image_hint">JPG・PNG・WebP対応 / 最大10MB</div>
          <img id="image-preview" class="img-preview" style="display:none">
        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="submit.score">スコア</label>
          <input class="form-input" type="number" id="score-input" min="0" data-i18n-ph="submit.score_ph" placeholder="例: 12345678" required>
        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="submit.yt_url">YouTube動画URL（任意）</label>
          <input class="form-input" type="url" id="youtube-input" placeholder="例: https://www.youtube.com/watch?v=...">
          <div class="form-hint" data-i18n="submit.yt_hint">YouTubeのURLのみ入力できます</div>
        </div>

        <!-- 内部ユーザーのみ表示：投稿先選択 -->
        <div class="form-group" id="scope-group" style="display:none">
          <label class="form-label" data-i18n="scope.label">投稿先</label>
          <div style="display:flex;gap:12px;flex-wrap:wrap">
            <label style="cursor:pointer;display:flex;align-items:center;gap:6px">
              <input type="radio" name="ranking_scope" value="internal">
              <span data-i18n="scope.submit_internal">内部ランキングのみ</span>
            </label>
            <label style="cursor:pointer;display:flex;align-items:center;gap:6px">
              <input type="radio" name="ranking_scope" value="public" checked>
              <span data-i18n="scope.submit_public">内部・外部両方</span>
            </label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%" id="submit-btn" data-i18n="submit.btn">投稿する</button>
      </form>
    </div>

    <!-- 現在の投稿状況 -->
    <div id="my-scores" style="margin-top:24px"></div>
  </div>
</main>

<!-- 匿名確認モーダル -->
<div id="anon-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:2000;align-items:center;justify-content:center">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:360px;width:90%;text-align:center">
    <div style="font-weight:bold;font-size:1rem;margin-bottom:8px" data-i18n="submit.anon_title">匿名で投稿しますか？</div>
    <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:20px" data-i18n="submit.anon_desc">他ユーザーに「匿名」として表示できます。</div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button onclick="submitWithAnon(true)" class="btn btn-primary" style="flex:1" data-i18n="submit.anon_yes">匿名で投稿</button>
      <button onclick="submitWithAnon(false)" class="btn" style="flex:1;background:var(--bg-secondary);border:1px solid var(--accent);color:var(--text)" data-i18n="submit.anon_no">そのまま投稿</button>
    </div>
    <button onclick="closeAnonModal()" style="margin-top:14px;background:none;border:none;color:var(--text-muted);font-size:0.82rem;cursor:pointer" data-i18n="cancel">キャンセル</button>
  </div>
</div>


<script src="/js/common.js"></script>
<script>
renderNav();
applyI18n();
if (!requireLogin()) throw new Error('redirect');

// 内部ユーザーなら投稿先選択を表示
if (isInternal()) {
  document.getElementById('scope-group').style.display = '';
}

// 属性ラジオ生成
const attrContainer = document.getElementById('attr-select');
ATTRIBUTES.forEach(attr => {
  const label = document.createElement('label');
  label.style.cssText = 'cursor:pointer';
  label.innerHTML = `
    <input type="radio" name="attribute" value="${attr}" style="display:none">
    <span class="attr-btn attr-${attr}">${t('attr.' + attr)}</span>
  `;
  const radio = label.querySelector('input');
  radio.addEventListener('change', () => {
    attrContainer.querySelectorAll('.attr-btn').forEach(b => b.classList.remove('active'));
    if (radio.checked) label.querySelector('.attr-btn').classList.add('active');
    loadMyScores();
  });
  attrContainer.appendChild(label);
});

// 画像プレビュー
document.getElementById('image-input').addEventListener('change', e => {
  const file = e.target.files[0];
  const preview = document.getElementById('image-preview');
  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
});

// イベント一覧読み込み
async function loadEvents() {
  try {
    const events = await apiFetch('/events');
    const sel = document.getElementById('event-select');
    const now = new Date();
    const active = events.filter(e => {
      if (e.event_type === 'media_only') return false;
      if (e.submission_start && now < new Date(e.submission_start)) return false;
      if (e.submission_end && now > new Date(e.submission_end)) return false;
      return true;
    });
    if (active.length === 0) {
      sel.disabled = true;
      sel.options[0].textContent = t('submit.no_events');
    } else {
      sel.options[0].textContent = t('submit.select');
      active.forEach(e => {
        const opt = document.createElement('option');
        opt.value = e.id;
        opt.textContent = e.name;
        sel.appendChild(opt);
      });
    }
    const preselect = getParam('event_id');
    if (preselect) {
      sel.value = preselect;
      if (!sel.value) sel.value = '';
    }
    sel.addEventListener('change', loadMyScores);
    loadMyScores();
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

let myScores = [];

// 自分のスコア表示
async function loadMyScores() {
  const eventId = document.getElementById('event-select').value;
  const container = document.getElementById('my-scores');
  if (!eventId) { container.innerHTML = ''; myScores = []; return; }

  try {
    const scores = await apiFetch(`/scores/my/${eventId}`);
    myScores = scores;
    if (scores.length === 0) { container.innerHTML = ''; return; }

    container.innerHTML = `
      <h3 style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em">${t('submit.status_title')}</h3>
      <div class="card">
        <table class="ranking-table">
          <thead><tr><th>${t('submit.th_attr')}</th><th>${t('submit.th_approved')}</th><th>${t('submit.th_pending')}</th><th>${t('submit.th_status')}</th></tr></thead>
          <tbody>
            ${scores.map(s => `
              <tr>
                <td>${attrBadge(s.attribute)}</td>
                <td>${formatScore(s.approved_score)}</td>
                <td>${s.status === 'pending' ? formatScore(s.pending_score) : '-'}</td>
                <td>${statusBadge(s.status)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch {}
}

let _pendingIsAnon = false;

// フォーム送信
document.getElementById('submit-form').addEventListener('submit', async e => {
  e.preventDefault();
  clearAlert('#alert');

  const eventId = document.getElementById('event-select').value;
  const attrInput = document.querySelector('input[name="attribute"]:checked');
  const score = document.getElementById('score-input').value;

  if (!eventId) return showAlert('#alert', t('submit.err_event'));
  if (!attrInput) return showAlert('#alert', t('submit.err_attr'));
  if (!score) return showAlert('#alert', t('submit.err_score'));

  const scoreNum = parseInt(score);
  const needsAnonPrompt = scoreNum <= 139999 || (scoreNum >= 160000 && scoreNum <= 2999999);
  if (needsAnonPrompt) {
    document.getElementById('anon-modal').style.display = 'flex';
  } else {
    _pendingIsAnon = false;
    await doSubmit(_pendingIsAnon);
  }
});

function closeAnonModal() {
  document.getElementById('anon-modal').style.display = 'none';
}

async function submitWithAnon(isAnon) {
  closeAnonModal();
  _pendingIsAnon = isAnon;
  await checkYtKeepThenSubmit();
}

async function doSubmit(isAnon) {
  const eventId = document.getElementById('event-select').value;
  const attrInput = document.querySelector('input[name="attribute"]:checked');
  const score = document.getElementById('score-input').value;
  const imageFile = document.getElementById('image-input').files[0];
  const btn = document.getElementById('submit-btn');

  const scopeInput = document.querySelector('input[name="ranking_scope"]:checked');
  const rankingScope = scopeInput ? scopeInput.value : 'public';

  const formData = new FormData();
  formData.append('event_id', eventId);
  formData.append('attribute', attrInput.value);
  formData.append('score', score);
  formData.append('is_anonymous', isAnon);
  formData.append('ranking_scope', rankingScope);
  if (imageFile) formData.append('image', imageFile);
  const ytUrl = document.getElementById('youtube-input')?.value.trim();
  if (ytUrl) formData.append('youtube_url', ytUrl);

  btn.disabled = true;
  btn.textContent = t('submit.btn_loading');

  try {
    const res = await apiFormFetch('/scores', formData);
    showAlert('#alert', res.message, 'success');
    document.getElementById('score-input').value = '';
    document.getElementById('image-input').value = '';
    document.getElementById('image-preview').style.display = 'none';
    document.getElementById('youtube-input').value = '';
    loadMyScores();
  } catch (err) {
    showAlert('#alert', err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = t('submit.btn');
  }
}

loadEvents();
</script>
</body>
</html>
