<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン - HBR</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav id="nav"></nav>
<div class="auth-wrap">
  <div class="auth-card card">
    <h1 class="auth-title" data-i18n="login.title">ログイン</h1>
    <div id="alert"></div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" data-i18n="login.username">ユーザー名</label>
        <input class="form-input" type="text" id="username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="login.password">パスワード</label>
        <input class="form-input" type="password" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="submit-btn" data-i18n="login.btn">ログイン</button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--text-secondary)">
      <span data-i18n="login.no_account">アカウントがない方は</span> <a href="/register.html" data-i18n="login.register_link">新規登録</a>
    </p>
  </div>
</div>
<script src="/js/common.js"></script>
<script>
renderNav();
applyI18n();
if (getToken()) location.href = '/index.html';
if (new URLSearchParams(location.search).get('expired')) {
  showAlert('#alert', t('login.expired'));
}

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  clearAlert('#alert');
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = t('login.btn_loading');

  try {
    const data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    setAuth(data.token, data.user);
    const redirect = new URLSearchParams(location.search).get('redirect');
    location.href = redirect || '/index.html';
  } catch (err) {
    showAlert('#alert', err.message);
    btn.disabled = false;
    btn.textContent = t('login.btn');
  }
});
</script>
</body>
</html>
