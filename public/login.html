<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン - HBR</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<nav id="nav"></nav>
<div class="auth-wrap">
  <div class="auth-card card">
    <h1 class="auth-title" data-i18n="login.title">ログイン</h1>
    <div id="alert"></div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" data-i18n="login.username">ユーザー名</label>
        <input class="form-input" type="text" id="username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="login.password">パスワード</label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('password')" tabindex="-1"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="submit-btn" data-i18n="login.btn">ログイン</button>
    </form>
    <div style="display:flex;align-items:center;gap:8px;margin:16px 0">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="font-size:0.8rem;color:var(--text-muted)">または</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>
    <div id="google-btn-wrap" style="display:flex;justify-content:center"></div>
    <div id="google-client-id" data-client-id=""></div>
    <p style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--text-secondary)">
      <span data-i18n="login.no_account">アカウントがない方は</span> <a href="/register.html" data-i18n="login.register_link">新規登録</a>
    </p>
  </div>
</div>

<!-- Googleユーザー名設定モーダル -->
<div id="google-username-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:3000;align-items:center;justify-content:center">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:28px 24px;max-width:360px;width:90%">
    <h2 style="margin:0 0 6px;font-size:1.1rem">ユーザー名を設定</h2>
    <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:18px">Googleアカウントで初めてログインしました。このアプリで使うユーザー名を設定してください。</p>
    <div id="google-modal-alert" style="margin-bottom:10px"></div>
    <input class="form-input" id="google-username-input" type="text" placeholder="ユーザー名（1〜12文字）" maxlength="12" style="margin-bottom:10px">
    <select class="form-input" id="google-oshi-input" style="margin-bottom:10px">
      <option value="">推しキャラクター（任意）</option>
    </select>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
      <span style="color:var(--text-muted);font-size:0.9rem;flex-shrink:0">@</span>
      <input class="form-input" id="google-twitter-input" type="text" placeholder="X (Twitter) ID（任意）" maxlength="15" autocomplete="off" style="flex:1">
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:16px">
      <span style="color:var(--text-muted);font-size:0.9rem;flex-shrink:0">@</span>
      <input class="form-input" id="google-youtube-input" type="text" placeholder="YouTubeハンドル（任意）" maxlength="30" autocomplete="off" style="flex:1">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="submitGoogleUsername()">登録してログイン</button>
  </div>
</div>
<script src="/js/common.js"></script>
<script>
renderNav();
applyI18n();
if (getToken()) location.href = '/index.html';
if (new URLSearchParams(location.search).get('expired')) {
  showAlert('#alert', t('login.expired'));
}

let _pendingGoogleId = null;

fetch('/api/charts/game-data').then(r => r.json()).then(({ characters }) => {
  const opts = characters.map(c => `<option value="${escHtml(c.name)}">${escHtml(c.name)}</option>`).join('');
  document.getElementById('google-oshi-input').innerHTML += opts;
}).catch(() => {});

// アプリ内ブラウザ検出（LINE・X等ではGoogle OAuthがブロックされる）
function isInAppBrowser() {
  return /Line\/|FBAN|FBAV|Instagram|MicroMessenger|WebView|wv\b|Twitter|TwitterAndroid/i.test(navigator.userAgent);
}

// クライアントID取得 → Google SDK初期化
fetch('/api/auth/google/client-id')
  .then(r => r.json())
  .then(({ client_id }) => {
    if (!client_id) return;
    const wrap = document.getElementById('google-btn-wrap');
    if (isInAppBrowser()) {
      wrap.innerHTML = `<div style="font-size:0.8rem;color:var(--text-muted);text-align:center;padding:8px 0">X・LINEなどのアプリ内ブラウザではGoogleログインをご利用いただけません。<br>ブラウザアプリで開いてからお試しください。</div>`;
      return;
    }
    document.getElementById('google-client-id').dataset.clientId = client_id;
    const script = document.querySelector('script[src*="accounts.google.com"]');
    const init = () => {
      if (!window.google) return;
      google.accounts.id.initialize({ client_id, callback: handleGoogleCredential });
      google.accounts.id.renderButton(
        wrap,
        { theme: 'outline', size: 'large', width: 280, text: 'signin_with', locale: 'ja' }
      );
    };
    if (window.google) init();
    else script?.addEventListener('load', init);
  })
  .catch(() => {});

async function handleGoogleCredential(response) {
  try {
    const data = await apiFetch('/auth/google/verify', {
      method: 'POST',
      body: JSON.stringify({ credential: response.credential })
    });
    if (data.token) {
      setAuth(data.token, data.user);
      const redirect = new URLSearchParams(location.search).get('redirect');
      location.href = redirect || '/index.html';
    } else if (data.needs_username) {
      _pendingGoogleId = data.google_id;
      document.getElementById('google-username-modal').style.display = 'flex';
      document.getElementById('google-username-input').focus();
    }
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

async function submitGoogleUsername() {
  const username = document.getElementById('google-username-input').value.trim();
  if (!username) return;
  const oshi_character = document.getElementById('google-oshi-input').value.trim() || undefined;
  const twitter_username = document.getElementById('google-twitter-input').value.trim() || undefined;
  const youtube_channel = document.getElementById('google-youtube-input').value.trim() || undefined;
  try {
    const data = await apiFetch('/auth/google/register', {
      method: 'POST',
      body: JSON.stringify({ google_id: _pendingGoogleId, username, oshi_character, twitter_username, youtube_channel })
    });
    setAuth(data.token, data.user);
    const redirect = new URLSearchParams(location.search).get('redirect');
    location.href = redirect || '/index.html';
  } catch (err) {
    document.getElementById('google-modal-alert').innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  clearAlert('#alert');
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = t('login.btn_loading');

  try {
    const data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    setAuth(data.token, data.user);
    const redirect = new URLSearchParams(location.search).get('redirect');
    location.href = redirect || '/index.html';
  } catch (err) {
    showAlert('#alert', err.message);
    btn.disabled = false;
    btn.textContent = t('login.btn');
  }
});
</script>
</body>
</html>
