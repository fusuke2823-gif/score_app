<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ユーザー詳細 - HBR</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav id="nav"></nav>
<main style="position:relative">
  <a class="back-link" href="javascript:history.back()" style="color:var(--text-secondary);font-size:.85rem;display:inline-block;margin-bottom:16px" data-i18n="user.back">← 戻る</a>
  <div id="delete-btn-wrap" style="display:none;position:absolute;top:0;right:0;display:none;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
    <div id="google-link-btn-profile" style="display:none"></div>
    <button class="btn btn-sm" onclick="openDeleteModal()" style="background:rgba(200,50,50,0.15);color:#e57373;border:1px solid #e57373;font-size:0.78rem" data-i18n="user.delete">アカウント削除</button>
  </div>
  <div id="alert"></div>
  <div id="content">
    <div class="loading"><div class="spinner"></div><span data-i18n="loading">読み込み中...</span></div>
  </div>
</main>

<style>
.back-link { text-decoration:none; }
.back-link:hover { color:var(--text-primary) !important; }
.score-grid {
  display: grid;
  gap: 16px;
}
.event-score-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.event-score-header {
  padding: 12px 16px;
  background: var(--bg-card2);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.event-score-title { font-weight: bold; font-size: 0.95rem; }
.event-rank-badge {
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 0.8rem;
  font-weight: bold;
  padding: 3px 10px;
  border-radius: 12px;
}
.attr-score-list { padding: 12px 16px; display:flex; flex-wrap:wrap; gap:10px; }
.attr-score-item {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
}
.attr-score-val { font-weight: bold; font-variant-numeric: tabular-nums; }
.attr-score-img { width:32px; height:22px; object-fit:cover; border-radius:3px; cursor:pointer; border:1px solid var(--border); }
.attr-score-img.has-yt { border:2px solid #ff4444; }

.comp-rank-badge { display:inline-flex;align-items:center;justify-content:center;font-weight:bold;font-size:0.8rem;padding:2px 4px;letter-spacing:0.05em; }
.rank-C  { color:#aaa; }
.rank-B  { color:#5cb85c; }
.rank-A  { color:#5b9bd5; }
.rank-S  { color:#e6a028; }
.rank-X  { color:#f0c040; }
.rank-Ex { color:#a855f7; }
#img-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center; flex-direction:column; padding:48px 16px 24px; }
#img-modal.open { display:flex; }
#img-modal img { max-width:90vw; max-height:75vh; border-radius:8px; }
#img-modal-close { position:fixed; top:16px; right:20px; background:none; border:none; color:white; font-size:2rem; cursor:pointer; }
</style>

<div id="img-modal">
  <button id="img-modal-close" onclick="closeModal()">×</button>
  <img id="modal-img" src="" alt="">
  <div id="modal-yt" style="display:none;margin-top:12px;text-align:center">
    <div id="modal-yt-score" style="font-size:0.8rem;color:rgba(255,255,255,0.6);margin-bottom:6px"></div>
    <a id="modal-yt-link" href="" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:6px;color:#ff4444;font-size:0.95rem;font-weight:bold;text-decoration:underline">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      YouTube動画を見る
    </a>
  </div>
</div>

<!-- アカウント削除モーダル -->
<div id="delete-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center">
  <div class="card" style="width:min(360px,90vw);padding:24px">
    <div style="font-weight:bold;font-size:1rem;color:#e57373;margin-bottom:8px" data-i18n="user.delete_title">アカウント削除</div>
    <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px" data-i18n="user.delete_warn">この操作は取り消せません。パスワードを入力して確認してください。</div>
    <div id="delete-alert"></div>
    <div class="form-group">
      <label class="form-label" data-i18n="login.password">パスワード</label>
      <div class="pw-wrap">
        <input class="form-input" id="delete-pw" type="password" data-i18n-ph="user.pw_ph" placeholder="パスワードを入力">
        <button type="button" class="pw-toggle" onclick="togglePw('delete-pw')" tabindex="-1"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeDeleteModal()" data-i18n="cancel">キャンセル</button>
      <button class="btn" style="flex:1;background:#c62828;color:#fff;border:none" onclick="doDeleteAccount()" data-i18n="user.delete_btn">削除する</button>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
renderNav();
applyI18n();

const userId = getParam('id');
if (!userId) location.href = '/index.html';

function compRankBadge(rank, sRate, xRate, exRank) {
  const r = (rank || 'C').toLowerCase();
  const img = `<img src="/img/rank_${r}.png" style="width:32px;height:32px;object-fit:contain;vertical-align:middle" alt="${rank || 'C'}">`;
  const rate = rank === 'S' ? sRate : xRate;
  const rateStr = rate != null ? `<span style="font-size:0.9rem;font-weight:bold;margin-left:4px">${Math.floor(rate)}</span>` : '';
  if (!rank || rank === 'C' || rank === 'B' || rank === 'A') return `<span class="comp-rank-badge rank-${rank || 'C'}">${img}</span>`;
  if (rank === 'Ex') {
    const exStr = exRank != null ? `<span style="font-size:0.9rem;font-weight:bold;margin-left:2px">${exRank}位</span>` : '';
    return `<span class="comp-rank-badge rank-Ex">${img}${exStr}${rateStr}</span>`;
  }
  return `<span class="comp-rank-badge rank-${rank}">${img}${rateStr}</span>`;
}

function rankProgressBar(rank, rankPoints, sRate) {
  const RANKS = {
    C: { min: 0, max: 400,  next: 'B' },
    B: { min: 0, max: 1300, next: 'A' },
    A: { min: 0, max: 3000, next: 'S' },
    S: { min: 0, max: 1000, next: 'X' },
  };
  const cfg = RANKS[rank];
  if (!cfg) return '';
  const val  = rank === 'S' ? (sRate || 0) : (rankPoints || 0);
  const pct  = Math.min(100, Math.max(0, ((val - cfg.min) / (cfg.max - cfg.min)) * 100));
  const colors = { C:'#aaa', B:'#5cb85c', A:'#5b9bd5', S:'#e6a028' };
  const col = colors[rank];
  const cur  = rank === 'S' ? Math.floor(sRate || 0) : (rankPoints || 0);
  return `
    <div style="margin-top:10px;max-width:280px">
      <div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text-muted);margin-bottom:4px">
        <span>${rank}</span><span style="color:${col}">${cur} / ${cfg.max}</span><span>${cfg.next}</span>
      </div>
      <div style="height:6px;border-radius:3px;background:var(--bg-card2);overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${col};border-radius:3px;transition:width 0.8s ease"></div>
      </div>
    </div>`;
}

async function load() {
  try {
    const currentUser = getUser();
    const isMe = currentUser && String(currentUser.id) === String(userId);
    const [data, meData] = await Promise.all([
      apiFetch(`/users/${userId}`),
      isMe ? apiFetch('/auth/me').catch(() => null) : Promise.resolve(null),
    ]);
    if (meData) Object.assign(currentUser, { has_google: meData.has_google });
    document.title = `${data.username} - HBR`;

    // イベントごとにスコアをグループ化
    const eventMap = {};
    data.scores.forEach(s => {
      if (!eventMap[s.event_id]) {
        eventMap[s.event_id] = {
          event_id: s.event_id,
          event_number: s.event_number,
          event_name: s.event_name,
          scores: []
        };
      }
      s.attr_rank_ext = data.attr_ranks[`${s.event_id}_${s.attribute}`] || null;
      s.attr_rank_int = data.attr_ranks_internal?.[`${s.event_id}_${s.attribute}`] || null;
      eventMap[s.event_id].scores.push(s);
    });

    const events = Object.values(eventMap).sort((a, b) => b.event_number - a.event_number);

    if (isMe) {
      document.getElementById('delete-btn-wrap').style.display = 'flex';
      if (meData && !meData.has_google) initGoogleLinkBtn();
    }

    document.getElementById('content').innerHTML = `
      <div class="user-header">
        <div class="user-avatar" style="${data.equipped_icon_url ? 'border:none' : ''}">${data.equipped_icon_url ? `<img src="${escHtml(data.equipped_icon_url)}" alt="${escHtml(data.username)}" class="${data.equipped_icon_rarity ? `icon-rarity-${escHtml(data.equipped_icon_rarity)}` : ''}" style="width:100%;height:100%;object-fit:cover;border-radius:20%">` : escHtml(data.username.charAt(0))}</div>
        <div class="user-info">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <h2 style="margin:0">${escHtml(data.username)}</h2>
            ${compRankBadge(data.comp_rank, data.s_rate, data.x_rate, data.ex_rank)}
          </div>
          ${data.twitter_username ? `<div style="font-size:0.85rem;margin-top:2px"><a href="https://x.com/${escHtml(data.twitter_username)}" target="_blank" rel="noopener noreferrer" style="color:#1d9bf0;text-decoration:underline;display:inline-flex;align-items:center;gap:4px"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>@${escHtml(data.twitter_username)}</a></div>` : ''}
          ${data.youtube_channel ? `<div style="font-size:0.85rem;margin-top:2px"><a href="https://youtube.com/@${escHtml(data.youtube_channel)}" target="_blank" rel="noopener noreferrer" style="color:#ff4444;text-decoration:underline;display:inline-flex;align-items:center;gap:4px"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>@${escHtml(data.youtube_channel)}</a></div>` : ''}
          ${rankProgressBar(data.comp_rank, data.rank_points, data.s_rate)}
          ${data.oshi_character
            ? `<div class="user-oshi">${t('user.oshi')}${escHtml(data.oshi_character)}</div>`
            : ''}
          ${data.equipped_title
            ? `<div style="font-size:0.85rem;margin-top:4px"><span style="color:var(--text-muted)">${t('user.title_label')}</span><span class="title-tooltip-wrap" style="color:var(--accent)">「${escHtml(data.equipped_title)}」${data.equipped_title_desc ? `<span class="title-tooltip">${escHtml(data.equipped_title_desc)}</span>` : ''}</span></div>`
            : ''}
          <div style="font-size:0.8rem;color:var(--text-muted);margin-top:2px">${t('user.joined')}${formatDate(data.created_at)}</div>
          ${isMe ? `<button class="btn btn-secondary btn-sm" style="margin-top:10px" onclick="toggleEditForm()">${t('user.edit')}</button>` : ''}
        </div>
      </div>

      ${isMe ? `
      <div id="edit-form-wrap" class="card" style="display:none;margin-bottom:24px">
        <div style="font-weight:bold;margin-bottom:16px">${t('user.edit_title')}</div>
        <div id="edit-alert"></div>
        <div class="form-group">
          <label class="form-label">${t('user.username')}</label>
          <input class="form-input" id="edit-username" type="text" value="${escHtml(data.username)}" maxlength="12">
        </div>
        <div class="form-group">
          <label class="form-label">${t('user.oshi_field')}</label>
          <input class="form-input" id="edit-oshi" type="text" value="${escHtml(data.oshi_character || '')}" maxlength="50" placeholder="${t('user.oshi_ph')}">
        </div>
        <div style="font-size:0.75rem;color:var(--text-muted);background:var(--bg-card2);border-radius:8px;padding:8px 12px;margin-bottom:4px">
          ご自身のアカウントかつヘブバンのコンテンツが含まれることを条件とします。
        </div>
        <div class="form-group">
          <label class="form-label" style="display:flex;justify-content:space-between;align-items:baseline">
            <span data-i18n="user.x_id">X (Twitter) ID</span>
            <span style="font-size:0.75rem;color:var(--text-muted)" data-i18n="user.x_hint_short">英数字・アンダースコアのみ</span>
          </label>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="color:var(--text-muted);font-size:0.9rem">@</span>
            <input class="form-input" id="edit-twitter" type="text" value="${escHtml(data.twitter_username || '')}" maxlength="15" placeholder="username" style="flex:1" autocomplete="off">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" style="display:flex;justify-content:space-between;align-items:baseline">
            <span>${t('user.yt_channel_optional')}</span>
            <span style="font-size:0.75rem;color:var(--text-muted)">${t('user.yt_channel_hint')}</span>
          </label>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="color:var(--text-muted);font-size:0.9rem">@</span>
            <input class="form-input" id="edit-youtube" type="text" value="${escHtml(data.youtube_channel || '')}" maxlength="30" placeholder="handle" style="flex:1" autocomplete="off">
          </div>
        </div>
        <details style="margin-bottom:16px">
          <summary style="cursor:pointer;font-size:0.85rem;color:var(--text-secondary);margin-bottom:8px">${t('user.pw_section')}</summary>
          <div style="margin-top:12px">
            <div class="form-group">
              <label class="form-label">${t('user.pw_current')}</label>
              <div class="pw-wrap">
                <input class="form-input" id="edit-current-pw" type="password" autocomplete="current-password">
                <button type="button" class="pw-toggle" onclick="togglePw('edit-current-pw')" tabindex="-1"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">${t('user.pw_new')}</label>
              <div class="pw-wrap">
                <input class="form-input" id="edit-new-pw" type="password" autocomplete="new-password">
                <button type="button" class="pw-toggle" onclick="togglePw('edit-new-pw')" tabindex="-1"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
              </div>
            </div>
          </div>
        </details>
        <button class="btn btn-primary" onclick="saveProfile()">${t('user.save')}</button>
      </div>` : ''}

      ${events.length === 0
        ? `<div class="empty-state"><div class="empty-state-icon">📊</div><p>${t('user.no_scores')}</p></div>`
        : `<div class="score-grid">
            ${events.map(e => `
              <div class="event-score-card">
                <div class="event-score-header">
                  <div>
                    <a href="/ranking.html?id=${e.event_id}" class="event-score-title">${escHtml(e.event_name)}</a>
                  </div>
                  <div style="display:flex;gap:6px;flex-wrap:wrap">
                    ${data.ranks_internal?.[e.event_id] ? `<span class="event-rank-badge" style="font-size:0.72rem">内部 ${data.ranks_internal[e.event_id]}位</span>` : ''}
                    ${data.ranks[e.event_id] ? `<span class="event-rank-badge" style="font-size:0.72rem;background:var(--bg-secondary);color:var(--text-secondary)">${data.ranks_internal ? '外部 ' : ''}${data.ranks[e.event_id]}位</span>` : ''}
                  </div>
                </div>
                <div class="attr-score-list">
                  ${e.scores.map(s => `
                    <div class="attr-score-item">
                      ${attrBadge(s.attribute, true)}
                      <span class="attr-score-val">${formatScore(s.approved_score)}</span>
                      ${data.ranks_internal ? `
                        ${s.attr_rank_int ? `<span style="font-size:0.72rem;color:var(--accent)">内部${s.attr_rank_int}位</span>` : ''}
                        ${s.attr_rank_ext ? `<span style="font-size:0.72rem;color:var(--text-muted)">外部${s.attr_rank_ext}位</span>` : ''}
                      ` : `${s.attr_rank_ext ? `<span style="font-size:0.75rem;color:var(--text-muted)">${s.attr_rank_ext}位</span>` : ''}`}
                      ${s.approved_image_url
                        ? `<img class="attr-score-img${s.youtube_url ? ' has-yt' : ''}" src="${escHtml(s.approved_image_url)}" alt="result" onclick="openModal('${escHtml(s.approved_image_url)}','${s.youtube_url ? escHtml(s.youtube_url) : ''}',${s.youtube_score ? s.youtube_score : 'null'})">`
                        : ''}
                    </div>`).join('')}
                </div>
              </div>`).join('')}
          </div>`
      }
    `;
  } catch (err) {
    showAlert('#alert', err.message);
    document.getElementById('content').innerHTML = '';
  }
}

function toggleEditForm() {
  const wrap = document.getElementById('edit-form-wrap');
  if (wrap) wrap.style.display = wrap.style.display === 'none' ? '' : 'none';
}

async function saveProfile() {
  const username = document.getElementById('edit-username')?.value.trim();
  const oshi = document.getElementById('edit-oshi')?.value.trim();
  const twitterRaw = document.getElementById('edit-twitter')?.value.trim().replace(/^@/, '');
  const ytChannel = document.getElementById('edit-youtube')?.value.trim().replace(/^@/, '') || null;
  const currentPw = document.getElementById('edit-current-pw')?.value;
  const newPw = document.getElementById('edit-new-pw')?.value;
  const alertEl = document.getElementById('edit-alert');
  alertEl.innerHTML = '';

  if (twitterRaw && !/^[A-Za-z0-9_]{1,15}$/.test(twitterRaw)) {
    alertEl.innerHTML = `<div class="alert alert-error">${t('user.x_err')}</div>`;
    return;
  }

  const body = { username, oshi_character: oshi || null, twitter_username: twitterRaw || null, youtube_channel: ytChannel };
  if (newPw) { body.current_password = currentPw; body.new_password = newPw; }

  try {
    const res = await apiFetch('/auth/me', { method: 'PUT', body: JSON.stringify(body) });
    setAuth(res.token, res.user);
    renderNav();
    alertEl.innerHTML = `<div class="alert alert-success">${t('user.saved')}</div>`;
    const avatar = document.querySelector('.user-avatar');
    if (avatar) avatar.textContent = res.user.username.charAt(0);
    document.querySelector('.user-info h2').textContent = res.user.username;
    const oshiEl = document.querySelector('.user-oshi');
    if (res.user.oshi_character) {
      if (oshiEl) oshiEl.textContent = t('user.oshi') + res.user.oshi_character;
    } else if (oshiEl) {
      oshiEl.remove();
    }
    if (newPw) {
      document.getElementById('edit-current-pw').value = '';
      document.getElementById('edit-new-pw').value = '';
    }
  } catch (err) {
    alertEl.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

async function initGoogleLinkBtn() {
  const wrap = document.getElementById('google-link-btn-profile');
  if (!wrap) return;
  const { client_id } = await fetch('/api/auth/google/client-id').then(r => r.json()).catch(() => ({}));
  if (!client_id) return;
  wrap.style.display = '';
  const init = () => {
    if (!window.google) return;
    google.accounts.id.initialize({ client_id, callback: handleGoogleLinkProfile });
    google.accounts.id.renderButton(wrap, { theme: 'outline', size: 'small', text: 'signin_with', locale: 'ja' });
  };
  if (!document.querySelector('script[src*="accounts.google.com"]')) {
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = init;
    document.head.appendChild(s);
  } else if (window.google) {
    init();
  } else {
    document.querySelector('script[src*="accounts.google.com"]')?.addEventListener('load', init);
  }
}

async function handleGoogleLinkProfile(response) {
  try {
    await apiFetch('/auth/google/link', {
      method: 'POST',
      body: JSON.stringify({ credential: response.credential })
    });
    document.getElementById('google-link-btn-profile').style.display = 'none';
    localStorage.setItem('google_link_dismissed', '1');
    showAlert('#alert', 'Googleアカウントを連携しました', 'success');
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

function openDeleteModal() {
  document.getElementById('delete-pw').value = '';
  document.getElementById('delete-alert').innerHTML = '';
  document.getElementById('delete-modal').style.display = 'flex';
}
function closeDeleteModal() {
  document.getElementById('delete-modal').style.display = 'none';
}
async function doDeleteAccount() {
  const pw = document.getElementById('delete-pw').value;
  const alertEl = document.getElementById('delete-alert');
  alertEl.innerHTML = '';
  try {
    await apiFetch('/auth/me', { method: 'DELETE', body: JSON.stringify({ password: pw }) });
    logout();
    location.href = '/login.html';
  } catch (err) {
    alertEl.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

function openModal(url, ytUrl, ytScore) {
  document.getElementById('modal-img').src = url;
  const ytDiv = document.getElementById('modal-yt');
  const ytLink = document.getElementById('modal-yt-link');
  if (ytUrl) {
    ytLink.href = ytUrl;
    const scoreEl = document.getElementById('modal-yt-score');
    scoreEl.textContent = ytScore ? `動画投稿時のスコア: ${formatScore(ytScore)}` : '';
    ytDiv.style.display = '';
  } else {
    ytDiv.style.display = 'none';
  }
  document.getElementById('img-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('img-modal').classList.remove('open');
}
document.getElementById('img-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// 称号ツールチップ（タップ）
document.addEventListener('click', e => {
  const wrap = e.target.closest('.title-tooltip-wrap');
  document.querySelectorAll('.title-tooltip-wrap.tt-open').forEach(el => {
    if (el !== wrap) el.classList.remove('tt-open');
  });
  if (wrap && wrap.querySelector('.title-tooltip')) {
    wrap.classList.toggle('tt-open');
    e.stopPropagation();
  }
});

load();
</script>
