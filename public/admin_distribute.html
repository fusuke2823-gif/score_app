<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配布管理 - HBR</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.section-title { font-size:1rem; font-weight:bold; margin-bottom:16px; color:var(--text-primary); }
.enemy-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:600px){ .enemy-form-grid{grid-template-columns:1fr;} }
.event-list-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 16px; border-bottom:1px solid var(--border);
}
.event-list-item:last-child { border-bottom:none; }
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap">
    <h1 class="page-title" style="margin:0">配布管理</h1>
    <div style="display:flex;gap:5px;flex-wrap:wrap">
      <a href="/admin_scores.html" class="btn btn-sm btn-secondary">スコア</a>
      <a href="/admin_events.html" class="btn btn-sm btn-secondary">イベント</a>
      <a href="/admin_users.html" class="btn btn-sm btn-secondary">ユーザー</a>
      <a href="/admin_shop.html" class="btn btn-sm btn-secondary">ショップ</a>
      <span class="btn btn-sm btn-primary" style="cursor:default">配布</span>
      <a href="/admin_settings.html" class="btn btn-sm btn-secondary">設定</a>
    </div>
  </div>
  <div id="alert"></div>

  <div class="tabs" style="margin-bottom:0">
    <button class="tab-btn active" onclick="switchTab('points')">ポイント配布</button>
    <button class="tab-btn" onclick="switchTab('history')">ポイント履歴</button>
  </div>

  <!-- ポイント配布タブ -->
  <div class="tab-content active" id="tab-points">
    <div class="card" style="margin-bottom:20px">
      <div class="section-title">手動ポイント付与</div>
      <div id="grant-alert" style="margin-bottom:12px"></div>
      <div class="form-group">
        <label class="form-label">対象プレイヤー</label>
        <select class="form-input" id="grant-user"><option value="">全員</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">付与ポイント数</label>
        <input class="form-input" id="grant-amount" type="number" min="1" placeholder="例: 50">
      </div>
      <div class="form-group">
        <label class="form-label">理由（任意）</label>
        <input class="form-input" id="grant-reason" type="text" placeholder="例: キャンペーン報酬" maxlength="100">
      </div>
      <button class="btn btn-primary" onclick="grantPoints()">付与する</button>
    </div>

    <!-- 内部ランクポイント設定 -->
    <div class="card" style="margin-bottom:20px">
      <div class="section-title">内部 順位ポイント設定</div>
      <div id="rank-pts-alert" style="margin-bottom:12px"></div>
      <div class="enemy-form-grid">
        <div class="form-group"><label class="form-label">1位</label><input class="form-input" type="number" id="rp-1" min="0" placeholder="100"></div>
        <div class="form-group"><label class="form-label">2位</label><input class="form-input" type="number" id="rp-2" min="0" placeholder="95"></div>
        <div class="form-group"><label class="form-label">3位</label><input class="form-input" type="number" id="rp-3" min="0" placeholder="95"></div>
        <div class="form-group"><label class="form-label">4位</label><input class="form-input" type="number" id="rp-4" min="0" placeholder="90"></div>
        <div class="form-group"><label class="form-label">5位</label><input class="form-input" type="number" id="rp-5" min="0" placeholder="90"></div>
        <div class="form-group"><label class="form-label">6位</label><input class="form-input" type="number" id="rp-6" min="0" placeholder="80"></div>
        <div class="form-group"><label class="form-label">7位</label><input class="form-input" type="number" id="rp-7" min="0" placeholder="80"></div>
        <div class="form-group"><label class="form-label">8位</label><input class="form-input" type="number" id="rp-8" min="0" placeholder="80"></div>
        <div class="form-group"><label class="form-label">9位</label><input class="form-input" type="number" id="rp-9" min="0" placeholder="80"></div>
        <div class="form-group"><label class="form-label">10位</label><input class="form-input" type="number" id="rp-10" min="0" placeholder="80"></div>
        <div class="form-group"><label class="form-label">11〜15位</label><input class="form-input" type="number" id="rp-11-15" min="0" placeholder="60"></div>
        <div class="form-group"><label class="form-label">16〜20位</label><input class="form-input" type="number" id="rp-16-20" min="0" placeholder="50"></div>
        <div class="form-group"><label class="form-label">21〜25位</label><input class="form-input" type="number" id="rp-21-25" min="0" placeholder="30"></div>
        <div class="form-group"><label class="form-label">26〜30位</label><input class="form-input" type="number" id="rp-26-30" min="0" placeholder="20"></div>
        <div class="form-group"><label class="form-label">31位以降</label><input class="form-input" type="number" id="rp-31plus" min="0" placeholder="10"></div>
      </div>
      <button class="btn btn-primary" onclick="saveRankPts()">保存する</button>
    </div>

    <!-- 外部ランクポイント設定 -->
    <div class="card" style="margin-bottom:20px">
      <div class="section-title">外部 順位ポイント設定</div>
      <div id="ext-rank-pts-alert" style="margin-bottom:12px"></div>
      <div class="enemy-form-grid">
        <div class="form-group"><label class="form-label">1〜5位</label><input class="form-input" type="number" id="erp-1-5" min="0" placeholder="100"></div>
        <div class="form-group"><label class="form-label">6〜10位</label><input class="form-input" type="number" id="erp-6-10" min="0" placeholder="80"></div>
        <div class="form-group"><label class="form-label">11〜20位</label><input class="form-input" type="number" id="erp-11-20" min="0" placeholder="60"></div>
        <div class="form-group"><label class="form-label">21〜30位</label><input class="form-input" type="number" id="erp-21-30" min="0" placeholder="40"></div>
        <div class="form-group"><label class="form-label">31〜50位</label><input class="form-input" type="number" id="erp-31-50" min="0" placeholder="20"></div>
        <div class="form-group"><label class="form-label">51〜100位</label><input class="form-input" type="number" id="erp-51-100" min="0" placeholder="10"></div>
        <div class="form-group"><label class="form-label">101位以降</label><input class="form-input" type="number" id="erp-101plus" min="0" placeholder="5"></div>
      </div>
      <button class="btn btn-primary" onclick="saveExtRankPts()">保存する</button>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="section-title" style="margin:0 0 4px">内部 中間配布（開催中イベント）</div>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px">イベント終了前に現在のランキングでポイントを配布します。何度でも実行可能です。</p>
      <div id="interim-alert" style="margin-bottom:12px"></div>
      <div id="interim-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="section-title" style="margin:0 0 4px">外部 中間配布（開催中イベント）</div>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px">外部公開スコア（public）のみで現在のランキングでポイントを配布します。何度でも実行可能です。称号は付与されません。</p>
      <div id="ext-interim-alert" style="margin-bottom:12px"></div>
      <div id="ext-interim-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="section-title" style="margin:0 0 4px">内部 最終配布（終了済みイベント）</div>
      <p id="rank-pts-summary" style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px"></p>
      <div id="points-alert" style="margin-bottom:12px"></div>
      <div id="distributable-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <div class="card">
      <div class="section-title" style="margin:0 0 4px">外部 最終配布（終了済みイベント）</div>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px">外部公開スコアでポイント・称号を配布します。1回のみ実行可能です。</p>
      <div id="ext-points-alert" style="margin-bottom:12px"></div>
      <div id="ext-distributable-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- ポイント履歴タブ -->
  <div class="tab-content" id="tab-history">
    <div class="card">
      <div class="section-title">ポイント履歴</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px">
        <select class="form-input" id="ph-user" style="max-width:220px" onchange="loadHistory(true)">
          <option value="">全ユーザー</option>
        </select>
        <span id="ph-total" style="font-size:0.82rem;color:var(--text-muted)"></span>
      </div>
      <div style="overflow-x:auto">
        <table class="table" id="ph-table">
          <thead><tr><th>日時</th><th>ユーザー</th><th style="text-align:right">pt</th><th>理由</th></tr></thead>
          <tbody id="ph-body"></tbody>
        </table>
      </div>
      <div id="ph-more" style="text-align:center;margin-top:16px;display:none">
        <button class="btn btn-secondary" onclick="loadHistoryMore()">さらに読み込む</button>
      </div>
    </div>
  </div>
</main>

<script src="/js/common.js"></script>
<script>
renderNav();
if (!requireAdmin()) throw new Error('redirect');

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['points','history'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'points') { loadRankPts(); loadExtRankPts(); loadInterimDistributable(); loadDistributable(); loadExtInterim(); loadExtDistributable(); loadGrantUsers(); }
  if (name === 'history') { loadHistoryUsers(); loadHistory(true); }
}

// ===== 手動ポイント付与 =====
async function loadGrantUsers() {
  try {
    const users = await apiFetch('/admin/users');
    const sel = document.getElementById('grant-user');
    sel.innerHTML = '<option value="">全員</option>' +
      users.map(u => `<option value="${u.id}">${escHtml(u.username)}（${u.points}pt）</option>`).join('');
  } catch {}
}

async function grantPoints() {
  const userId = document.getElementById('grant-user').value || null;
  const amount = document.getElementById('grant-amount').value;
  const reason = document.getElementById('grant-reason').value.trim();
  if (!amount || Number(amount) < 1) { showAlert('#grant-alert', '付与ポイント数を入力してください'); return; }
  const target = userId ? document.getElementById('grant-user').selectedOptions[0].text : '全員';
  if (!confirm(`${target} に ${amount}pt を付与しますか？`)) return;
  try {
    const res = await apiFetch('/admin/points/grant', {
      method: 'POST',
      body: JSON.stringify({ user_id: userId ? Number(userId) : null, amount: Number(amount), reason })
    });
    showAlert('#grant-alert', res.message, 'success');
    document.getElementById('grant-amount').value = '';
    document.getElementById('grant-reason').value = '';
    loadGrantUsers();
  } catch (err) { showAlert('#grant-alert', err.message); }
}

// ===== 順位ポイント設定 =====
async function loadRankPts() {
  try {
    const result = await apiFetch('/admin/settings/rank-pts');
    document.getElementById('rp-1').value      = result.rank_pts_1;
    document.getElementById('rp-2').value      = result.rank_pts_2;
    document.getElementById('rp-3').value      = result.rank_pts_3;
    document.getElementById('rp-4').value      = result.rank_pts_4;
    document.getElementById('rp-5').value      = result.rank_pts_5;
    document.getElementById('rp-6').value      = result.rank_pts_6;
    document.getElementById('rp-7').value      = result.rank_pts_7;
    document.getElementById('rp-8').value      = result.rank_pts_8;
    document.getElementById('rp-9').value      = result.rank_pts_9;
    document.getElementById('rp-10').value     = result.rank_pts_10;
    document.getElementById('rp-11-15').value  = result.rank_pts_11_15;
    document.getElementById('rp-16-20').value  = result.rank_pts_16_20;
    document.getElementById('rp-21-25').value  = result.rank_pts_21_25;
    document.getElementById('rp-26-30').value  = result.rank_pts_26_30;
    document.getElementById('rp-31plus').value = result.rank_pts_31plus;
    updateRankPtsSummary(result);
  } catch (err) { showAlert('#rank-pts-alert', err.message); }
}

let _rankPtsCache = null;
function updateRankPtsSummary(r) {
  _rankPtsCache = r;
  document.getElementById('rank-pts-summary').textContent =
    `1位: ${r.rank_pts_1}pt / 2位: ${r.rank_pts_2}pt / 3位: ${r.rank_pts_3}pt / 4位: ${r.rank_pts_4}pt / 5位: ${r.rank_pts_5}pt / 6位: ${r.rank_pts_6}pt / 7位: ${r.rank_pts_7}pt / 8位: ${r.rank_pts_8}pt / 9位: ${r.rank_pts_9}pt / 10位: ${r.rank_pts_10}pt / 11〜15位: ${r.rank_pts_11_15}pt / 16〜20位: ${r.rank_pts_16_20}pt / 21〜25位: ${r.rank_pts_21_25}pt / 26〜30位: ${r.rank_pts_26_30}pt / 31位以降: ${r.rank_pts_31plus}pt`;
}

async function saveRankPts() {
  const body = {
    rank_pts_1:      parseInt(document.getElementById('rp-1').value),
    rank_pts_2:      parseInt(document.getElementById('rp-2').value),
    rank_pts_3:      parseInt(document.getElementById('rp-3').value),
    rank_pts_4:      parseInt(document.getElementById('rp-4').value),
    rank_pts_5:      parseInt(document.getElementById('rp-5').value),
    rank_pts_6:      parseInt(document.getElementById('rp-6').value),
    rank_pts_7:      parseInt(document.getElementById('rp-7').value),
    rank_pts_8:      parseInt(document.getElementById('rp-8').value),
    rank_pts_9:      parseInt(document.getElementById('rp-9').value),
    rank_pts_10:     parseInt(document.getElementById('rp-10').value),
    rank_pts_11_15:  parseInt(document.getElementById('rp-11-15').value),
    rank_pts_16_20:  parseInt(document.getElementById('rp-16-20').value),
    rank_pts_21_25:  parseInt(document.getElementById('rp-21-25').value),
    rank_pts_26_30:  parseInt(document.getElementById('rp-26-30').value),
    rank_pts_31plus: parseInt(document.getElementById('rp-31plus').value)
  };
  try {
    await apiFetch('/admin/settings/rank-pts', { method: 'PUT', body: JSON.stringify(body) });
    showAlert('#rank-pts-alert', '保存しました', 'success');
    updateRankPtsSummary(body);
  } catch (err) { showAlert('#rank-pts-alert', err.message); }
}

async function loadExtRankPts() {
  try {
    const r = await apiFetch('/admin/settings/ext-rank-pts');
    document.getElementById('erp-1-5').value    = r.ext_rank_pts_1_5    ?? '';
    document.getElementById('erp-6-10').value   = r.ext_rank_pts_6_10   ?? '';
    document.getElementById('erp-11-20').value  = r.ext_rank_pts_11_20  ?? '';
    document.getElementById('erp-21-30').value  = r.ext_rank_pts_21_30  ?? '';
    document.getElementById('erp-31-50').value  = r.ext_rank_pts_31_50  ?? '';
    document.getElementById('erp-51-100').value = r.ext_rank_pts_51_100 ?? '';
    document.getElementById('erp-101plus').value= r.ext_rank_pts_101plus ?? '';
  } catch (err) { showAlert('#ext-rank-pts-alert', err.message); }
}

async function saveExtRankPts() {
  const body = {
    ext_rank_pts_1_5:    parseInt(document.getElementById('erp-1-5').value),
    ext_rank_pts_6_10:   parseInt(document.getElementById('erp-6-10').value),
    ext_rank_pts_11_20:  parseInt(document.getElementById('erp-11-20').value),
    ext_rank_pts_21_30:  parseInt(document.getElementById('erp-21-30').value),
    ext_rank_pts_31_50:  parseInt(document.getElementById('erp-31-50').value),
    ext_rank_pts_51_100: parseInt(document.getElementById('erp-51-100').value),
    ext_rank_pts_101plus:parseInt(document.getElementById('erp-101plus').value),
  };
  try {
    await apiFetch('/admin/settings/ext-rank-pts', { method: 'PUT', body: JSON.stringify(body) });
    showAlert('#ext-rank-pts-alert', '保存しました', 'success');
  } catch (err) { showAlert('#ext-rank-pts-alert', err.message); }
}

// ===== ポイント配布 =====
async function loadInterimDistributable() {
  const el = document.getElementById('interim-list');
  try {
    const events = await apiFetch('/admin/events/interim-distributable');
    if (events.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>開催中のイベントがありません</p></div>';
      return;
    }
    el.innerHTML = events.map(e => {
      const history = (e.interim_history || []).map(d =>
        `<span style="font-size:0.75rem;color:var(--text-muted)">${new Date(d.distributed_at).toLocaleString('ja-JP')}（${d.distributed_count}名）</span>`
      ).join('<br>');
      return `
        <div class="event-list-item" style="flex-direction:column;align-items:stretch;gap:8px">
          <div>
            <span style="color:var(--accent);font-size:0.85rem;margin-right:8px">第${e.event_number}回</span>
            <strong>${escHtml(e.name)}</strong>
          </div>
          ${history ? `<div style="line-height:1.6">${history}</div>` : ''}
          <div style="text-align:right">
            <button class="btn btn-secondary btn-sm" onclick="distributeInterim(${e.id})">内部中間配布する</button>
          </div>
        </div>`;
    }).join('');
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

async function distributeInterim(id) {
  if (!confirm('現在のランキングで中間配布しますか？\nこの操作は取り消せません。')) return;
  try {
    const res = await apiFetch(`/admin/events/${id}/distribute-interim`, { method: 'POST' });
    showAlert('#interim-alert', res.message, 'success');
    loadInterimDistributable();
  } catch (err) { showAlert('#interim-alert', err.message); }
}

const AWARD_ATTRS = ['火', '氷', '雷', '光', '闇', '無'];

async function loadDistributable() {
  const el = document.getElementById('distributable-list');
  try {
    const events = await apiFetch('/admin/events/distributable');
    if (events.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>配布可能なイベントがありません</p></div>';
      return;
    }
    el.innerHTML = events.map(e => `
      <div class="event-list-item" style="flex-direction:column;align-items:stretch;gap:10px">
        <div>
          <span style="color:var(--accent);font-size:0.85rem;margin-right:8px">第${e.event_number}回</span>
          <strong>${escHtml(e.name)}</strong>
        </div>
        <div style="font-size:0.82rem;color:var(--text-muted)">称号付与（任意）</div>
        <div style="display:flex;flex-wrap:wrap;gap:10px;font-size:0.85rem">
          <label><input type="checkbox" id="t-r1-${e.id}" checked> 優勝（1位）</label>
          <label><input type="checkbox" id="t-r2-${e.id}"> 準優勝（2位）</label>
          <label><input type="checkbox" id="t-r3-${e.id}"> 3位</label>
          <span style="color:var(--border);margin:0 4px">|</span>
          ${AWARD_ATTRS.map(a => `<label><input type="checkbox" id="t-a${a}-${e.id}"> ${a}属性1位</label>`).join('')}
        </div>
        <div style="text-align:right">
          <button class="btn btn-primary btn-sm" onclick="distributePoints(${e.id})">内部最終配布する</button>
        </div>
      </div>`).join('');
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

async function distributePoints(id) {
  if (!confirm('ポイントを配布しますか？\nこの操作は取り消せません。')) return;
  const award_titles = {
    rank1: document.getElementById(`t-r1-${id}`)?.checked || false,
    rank2: document.getElementById(`t-r2-${id}`)?.checked || false,
    rank3: document.getElementById(`t-r3-${id}`)?.checked || false,
  };
  for (const a of AWARD_ATTRS) {
    award_titles[`attr_${a}`] = document.getElementById(`t-a${a}-${id}`)?.checked || false;
  }
  try {
    const res = await apiFetch(`/admin/events/${id}/distribute-points`, {
      method: 'POST',
      body: JSON.stringify({ award_titles })
    });
    showAlert('#points-alert', res.message, 'success');
    loadDistributable();
  } catch (err) { showAlert('#points-alert', err.message); }
}

async function loadExtInterim() {
  const el = document.getElementById('ext-interim-list');
  try {
    const events = await apiFetch('/admin/events/interim-distributable-external');
    if (events.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>対象イベントがありません</p></div>';
      return;
    }
    el.innerHTML = events.map(e => {
      const history = (e.interim_history || []).map(d =>
        `<span style="font-size:0.75rem;color:var(--text-muted)">${new Date(d.distributed_at).toLocaleString('ja-JP')}（${d.distributed_count}名）</span>`
      ).join('<br>');
      return `
        <div class="event-list-item" style="flex-direction:column;align-items:stretch;gap:8px">
          <div>
            <span style="color:var(--accent);font-size:0.85rem;margin-right:8px">第${e.event_number}回</span>
            <strong>${escHtml(e.name)}</strong>
          </div>
          ${history ? `<div style="line-height:1.6">${history}</div>` : ''}
          <div style="text-align:right">
            <button class="btn btn-secondary btn-sm" onclick="distributeExtInterim(${e.id})">外部中間配布する</button>
          </div>
        </div>`;
    }).join('');
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

async function distributeExtInterim(id) {
  if (!confirm('外部中間配布を実行しますか？')) return;
  try {
    const res = await apiFetch(`/admin/events/${id}/distribute-interim-external`, { method: 'POST' });
    showAlert('#ext-interim-alert', res.message, 'success');
    loadExtInterim();
  } catch (err) { showAlert('#ext-interim-alert', err.message); }
}

async function loadExtDistributable() {
  const el = document.getElementById('ext-distributable-list');
  try {
    const events = await apiFetch('/admin/events/distributable-external');
    if (events.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>対象イベントがありません</p></div>';
      return;
    }
    el.innerHTML = events.map(e => `
      <div class="event-list-item" style="flex-direction:column;align-items:stretch;gap:10px">
        <div>
          <span style="color:var(--accent);font-size:0.85rem;margin-right:8px">第${e.event_number}回</span>
          <strong>${escHtml(e.name)}</strong>
        </div>
        <div style="font-size:0.82rem;color:var(--text-muted)">称号付与（任意）</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:0.82rem">
          <label><input type="checkbox" id="et-r1-${e.id}" checked> 優勝</label>
          <label><input type="checkbox" id="et-r2-${e.id}"> 準優勝</label>
          <label><input type="checkbox" id="et-r3-${e.id}"> 3位</label>
          <label><input type="checkbox" id="et-top10-${e.id}"> TOP10</label>
          <label><input type="checkbox" id="et-top30-${e.id}"> TOP30</label>
          <label><input type="checkbox" id="et-top50-${e.id}"> TOP50</label>
        </div>
        <div style="font-size:0.78rem;color:var(--text-muted)">属性別称号（1位/2位/3位/TOP5）</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;font-size:0.78rem">
          ${AWARD_ATTRS.map(a => `
            <span style="display:inline-flex;gap:4px;align-items:center;background:var(--bg-primary);padding:3px 8px;border-radius:6px">
              <b>${a}</b>
              <label><input type="checkbox" id="et-a1-${a}-${e.id}"> 1位</label>
              <label><input type="checkbox" id="et-a2-${a}-${e.id}"> 2位</label>
              <label><input type="checkbox" id="et-a3-${a}-${e.id}"> 3位</label>
              <label><input type="checkbox" id="et-a5-${a}-${e.id}"> TOP5</label>
            </span>`).join('')}
        </div>
        <div style="text-align:right">
          <button class="btn btn-primary btn-sm" onclick="distributeExtPoints(${e.id})">外部最終配布する</button>
        </div>
      </div>`).join('');
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

async function distributeExtPoints(id) {
  if (!confirm('外部最終ポイントを配布しますか？この操作は1回のみ実行できます。')) return;
  const award_titles = {
    ext_rank1:  document.getElementById(`et-r1-${id}`)?.checked || false,
    ext_rank2:  document.getElementById(`et-r2-${id}`)?.checked || false,
    ext_rank3:  document.getElementById(`et-r3-${id}`)?.checked || false,
    ext_top10:  document.getElementById(`et-top10-${id}`)?.checked || false,
    ext_top30:  document.getElementById(`et-top30-${id}`)?.checked || false,
    ext_top50:  document.getElementById(`et-top50-${id}`)?.checked || false,
  };
  for (const a of AWARD_ATTRS) {
    award_titles[`ext_attr1_${a}`] = document.getElementById(`et-a1-${a}-${id}`)?.checked || false;
    award_titles[`ext_attr2_${a}`] = document.getElementById(`et-a2-${a}-${id}`)?.checked || false;
    award_titles[`ext_attr3_${a}`] = document.getElementById(`et-a3-${a}-${id}`)?.checked || false;
    award_titles[`ext_attr_top5_${a}`] = document.getElementById(`et-a5-${a}-${id}`)?.checked || false;
  }
  try {
    const res = await apiFetch(`/admin/events/${id}/distribute-points-external`, {
      method: 'POST',
      body: JSON.stringify({ award_titles })
    });
    showAlert('#ext-points-alert', res.message, 'success');
    loadExtDistributable();
  } catch (err) { showAlert('#ext-points-alert', err.message); }
}

// ===== ポイント履歴 =====
let _phOffset = 0;
const PH_LIMIT = 50;

async function loadHistoryUsers() {
  try {
    const users = await apiFetch('/admin/users');
    const sel = document.getElementById('ph-user');
    const cur = sel.value;
    sel.innerHTML = '<option value="">全ユーザー</option>' +
      users.map(u => `<option value="${u.id}"${String(u.id) === cur ? ' selected' : ''}>${escHtml(u.username)}</option>`).join('');
  } catch {}
}

async function loadHistory(reset = false) {
  if (reset) _phOffset = 0;
  const userId = document.getElementById('ph-user').value;
  const params = new URLSearchParams({ limit: PH_LIMIT, offset: _phOffset });
  if (userId) params.set('user_id', userId);
  try {
    const data = await apiFetch('/admin/point-history?' + params);
    const tbody = document.getElementById('ph-body');
    if (reset) tbody.innerHTML = '';
    tbody.innerHTML += data.rows.map(r => `
      <tr>
        <td style="white-space:nowrap;font-size:0.82rem">${escHtml(new Date(r.created_at).toLocaleString('ja-JP'))}</td>
        <td><a href="/user.html?id=${r.user_id}" style="color:var(--accent)">${escHtml(r.username)}</a></td>
        <td style="text-align:right;font-weight:bold;color:${r.amount >= 0 ? 'var(--accent)' : '#f87171'}">${r.amount >= 0 ? '+' : ''}${r.amount}</td>
        <td style="font-size:0.85rem;color:var(--text-muted)">${escHtml(r.reason || '')}</td>
      </tr>`).join('');
    document.getElementById('ph-total').textContent = `全 ${data.total} 件`;
    _phOffset += data.rows.length;
    document.getElementById('ph-more').style.display =
      _phOffset < data.total ? 'block' : 'none';
  } catch (err) { showAlert('#alert', err.message); }
}

function loadHistoryMore() { loadHistory(false); }
