<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ショップ管理 - HBR</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.section-title { font-size:1rem; font-weight:bold; margin-bottom:16px; color:var(--text-primary); }
.enemy-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:600px){ .enemy-form-grid{grid-template-columns:1fr;} }
.event-list-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 16px; border-bottom:1px solid var(--border);
}
.event-list-item:last-child { border-bottom:none; }

/* アイコングリッド */
.admin-icon-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:12px; }
.admin-icon-card {
  background:var(--bg-primary); border:1px solid var(--border); border-radius:10px;
  padding:12px 8px; text-align:center;
}
.admin-icon-card img { width:60px; height:60px; border-radius:20%; object-fit:cover; border:2px solid var(--border); }
.admin-icon-card .iname { font-size:0.75rem; margin-top:6px; word-break:break-all; }
.admin-icon-card .ibtns { display:flex; gap:4px; justify-content:center; margin-top:8px; flex-wrap:wrap; }
.rarity-badge { font-size:0.68rem; font-weight:bold; padding:2px 7px; border-radius:4px; display:inline-block; margin-bottom:4px; }
.rarity-badge-SS { background:#ffd700; color:#000; }
.rarity-badge-S  { background:#e0c060; color:#000; }
.rarity-badge-A  { background:#4fc3f7; color:#000; }

/* Canvas cropper */
#crop-wrap { position:relative; }
#crop-canvas { display:block; max-width:100%; border-radius:8px; cursor:crosshair; touch-action:none; }
#crop-section { margin-top:16px; display:none; }
.crop-row { display:flex; gap:16px; align-items:flex-start; flex-wrap:wrap; margin-bottom:12px; }
#crop-preview { border-radius:20%; border:3px solid var(--accent); display:block; flex-shrink:0; }
.crop-controls { display:flex; align-items:center; gap:10px; margin-top:8px; }
.crop-controls label { font-size:0.82rem; color:var(--text-muted); white-space:nowrap; }
</style>
</head>
<body>
<nav id="nav"></nav>

<!-- プール編集モーダル -->
<div id="pool-edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:3000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 12px">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:640px;width:100%;margin:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:16px">
      <div style="font-weight:bold;font-size:1rem" id="pool-edit-modal-title">プール編集</div>
      <button onclick="closePoolEditModal()" style="background:none;border:none;font-size:1.4rem;color:var(--text-muted);cursor:pointer;line-height:1;padding:0 4px">×</button>
    </div>
    <div style="display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)">
      <button id="tab-btn-basic" onclick="switchEditTab('basic')" style="padding:7px 18px;border:none;border-bottom:2px solid #4fc3f7;background:none;color:var(--text);font-size:0.88rem;cursor:pointer;font-weight:bold">基本設定</button>
      <button id="tab-btn-period" onclick="switchEditTab('period')" style="padding:7px 18px;border:none;border-bottom:2px solid transparent;background:none;color:var(--text-muted);font-size:0.88rem;cursor:pointer">期間設定</button>
      <button id="tab-btn-icons" onclick="switchEditTab('icons')" style="padding:7px 18px;border:none;border-bottom:2px solid transparent;background:none;color:var(--text-muted);font-size:0.88rem;cursor:pointer">アイコン設定</button>
    </div>
    <div id="pool-edit-alert" style="margin-bottom:10px"></div>

    <!-- 基本設定タブ -->
    <div id="tab-content-basic">
      <div id="pool-stats-row" style="display:flex;gap:16px;margin-bottom:16px;padding:12px;background:var(--bg-primary);border-radius:8px;font-size:0.85rem">
        <div style="text-align:center;flex:1"><div style="color:var(--text-muted);font-size:0.75rem;margin-bottom:2px">単発</div><div id="stat-single" style="font-weight:bold">-</div></div>
        <div style="text-align:center;flex:1"><div style="color:var(--text-muted);font-size:0.75rem;margin-bottom:2px">10連</div><div id="stat-multi" style="font-weight:bold">-</div></div>
        <div style="text-align:center;flex:1"><div style="color:var(--text-muted);font-size:0.75rem;margin-bottom:2px">合計回数</div><div id="stat-total" style="font-weight:bold;color:#4fc3f7">-</div></div>
      </div>
      <div class="form-group">
        <label class="form-label">ガチャ名</label>
        <input class="form-input" id="edit-pool-name">
      </div>
      <div class="form-group">
        <label class="form-label">説明（任意）</label>
        <input class="form-input" id="edit-pool-desc" placeholder="例: SSレアリティ強化！">
      </div>
      <div class="enemy-form-grid">
        <div class="form-group">
          <label class="form-label">表示順</label>
          <input class="form-input" type="number" id="edit-pool-order" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">表/裏</label>
          <select class="form-input" id="edit-pool-side">
            <option value="表">表</option>
            <option value="裏">裏</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="display:flex;align-items:center">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="edit-pool-active" style="width:18px;height:18px">
          <span style="font-size:0.9rem">表示する</span>
        </label>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
        <button class="btn btn-secondary" onclick="closePoolEditModal()">閉じる</button>
        <button class="btn btn-primary" onclick="saveBasicSettings()">保存する</button>
      </div>
    </div>

    <!-- 期間設定タブ -->
    <div id="tab-content-period" style="display:none">
      <div class="form-group">
        <label class="form-label">開始日時<span style="font-size:0.75rem;color:var(--text-muted);margin-left:6px">空欄で制限なし</span></label>
        <input class="form-input" type="datetime-local" id="edit-period-start">
      </div>
      <div class="form-group">
        <label class="form-label">終了日時<span style="font-size:0.75rem;color:var(--text-muted);margin-left:6px">空欄で制限なし</span></label>
        <input class="form-input" type="datetime-local" id="edit-period-end">
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
        <button class="btn btn-secondary" onclick="closePoolEditModal()">閉じる</button>
        <button class="btn btn-primary" onclick="savePeriodSettings()">保存する</button>
      </div>
    </div>

    <!-- アイコン設定タブ -->
    <div id="tab-content-icons" style="display:none">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px">
        <p style="font-size:0.82rem;color:var(--text-muted);margin:0;flex:1">このガチャに含めるアイコンを選択してください（レアリティ別に表示）</p>
        <button class="btn btn-secondary btn-sm" id="btn-toggle-ss" onclick="toggleAllSS()">SS全選択</button>
        <button class="btn btn-secondary btn-sm" id="btn-toggle-as" onclick="toggleAllAS()">A・S全選択</button>
      </div>
      <div id="pool-modal-icons"></div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
        <button class="btn btn-secondary" onclick="closePoolEditModal()">閉じる</button>
        <button class="btn btn-primary" onclick="savePoolIcons()">保存する</button>
      </div>
    </div>
  </div>
</div>

<!-- プール統計モーダル -->
<div id="pool-stats-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:3000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 12px">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:560px;width:100%;margin:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-weight:bold;font-size:1rem">ガチャプール統計</div>
      <button onclick="closePoolStatsModal()" style="background:none;border:none;font-size:1.4rem;color:var(--text-muted);cursor:pointer;line-height:1;padding:0 4px">×</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <span style="font-size:0.82rem;color:var(--text-muted)">並び替え:</span>
      <button id="stats-sort-btn-order" onclick="setStatsSort('order')" style="padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--accent);color:#fff;font-size:0.8rem;cursor:pointer">実装順</button>
      <button id="stats-sort-btn-total" onclick="setStatsSort('total')" style="padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text-muted);font-size:0.8rem;cursor:pointer">合計回数順</button>
      <button id="stats-sort-btn-single" onclick="setStatsSort('single')" style="padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text-muted);font-size:0.8rem;cursor:pointer">単発順</button>
      <button id="stats-sort-btn-multi" onclick="setStatsSort('multi')" style="padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text-muted);font-size:0.8rem;cursor:pointer">10連順</button>
    </div>
    <div id="pool-stats-table"></div>
    <div style="display:flex;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-secondary" onclick="closePoolStatsModal()">閉じる</button>
    </div>
  </div>
</div>

<main>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap">
    <h1 class="page-title" style="margin:0">ショップ管理</h1>
    <div style="display:flex;gap:5px;flex-wrap:wrap">
      <a href="/admin_scores.html" class="btn btn-sm btn-secondary">スコア</a>
      <a href="/admin_events.html" class="btn btn-sm btn-secondary">イベント</a>
      <a href="/admin_users.html" class="btn btn-sm btn-secondary">ユーザー</a>
      <span class="btn btn-sm btn-primary" style="cursor:default">ショップ</span>
      <a href="/admin_distribute.html" class="btn btn-sm btn-secondary">配布</a>
      <a href="/admin_settings.html" class="btn btn-sm btn-secondary">設定</a>
    </div>
  </div>
  <div id="alert"></div>

  <div class="tabs" style="margin-bottom:0">
    <button class="tab-btn active" onclick="switchTab('titles')">称号</button>
    <button class="tab-btn" onclick="switchTab('frames')">フレーム</button>
    <button class="tab-btn" onclick="switchTab('gacha')">ガチャ</button>
  </div>

  <!-- 称号タブ -->
  <div class="tab-content active" id="tab-titles">
    <div class="card" style="margin-bottom:24px">
      <div class="section-title">称号を追加</div>
      <div id="title-create-alert" style="margin-bottom:12px"></div>
      <div class="enemy-form-grid">
        <div class="form-group">
          <label class="form-label">称号名</label>
          <input class="form-input" type="text" id="title-name" placeholder="例: 猛者">
        </div>
        <div class="form-group">
          <label class="form-label">価格（pt）※空欄=ランク賞のみ</label>
          <input class="form-input" type="number" id="title-cost" min="1" placeholder="例: 100">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">説明（任意）</label>
        <input class="form-input" type="text" id="title-desc">
      </div>
      <button class="btn btn-primary" onclick="createTitle()">追加する</button>
    </div>
    <div class="card" style="margin-bottom:24px">
      <div class="section-title">ユーザーに称号を付与</div>
      <div id="grant-title-alert" style="margin-bottom:12px"></div>
      <div class="enemy-form-grid">
        <div class="form-group">
          <label class="form-label">対象ユーザー</label>
          <select class="form-input" id="grant-title-user"></select>
        </div>
        <div class="form-group">
          <label class="form-label">称号</label>
          <select class="form-input" id="grant-title-id"></select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="grantTitleToUser()">付与する</button>
    </div>
    <div class="card">
      <div class="section-title">称号一覧</div>
      <div id="title-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- フレームタブ -->
  <div class="tab-content" id="tab-frames">
    <div class="card" style="margin-bottom:24px">
      <div class="section-title">フレームを追加</div>
      <div id="frame-create-alert" style="margin-bottom:12px"></div>
      <div class="enemy-form-grid">
        <div class="form-group">
          <label class="form-label">フレーム名</label>
          <input class="form-input" type="text" id="frame-name" placeholder="例: ゴールドフレーム">
        </div>
        <div class="form-group">
          <label class="form-label">価格（pt）</label>
          <input class="form-input" type="number" id="frame-cost" min="1" placeholder="例: 200">
        </div>
      </div>
      <div class="enemy-form-grid">
        <div class="form-group">
          <label class="form-label">スタイル</label>
          <select class="form-input" id="frame-class">
            <option value="frame-gold">ゴールド</option>
            <option value="frame-silver">シルバー</option>
            <option value="frame-neon-blue">ネオンブルー</option>
            <option value="frame-neon-pink">ネオンピンク</option>
            <option value="frame-fire">ファイア</option>
            <option value="frame-rainbow">レインボー</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">説明（任意）</label>
          <input class="form-input" type="text" id="frame-desc">
        </div>
      </div>
      <button class="btn btn-primary" onclick="createFrame()">追加する</button>
    </div>
    <div class="card">
      <div class="section-title">フレーム一覧</div>
      <div id="frame-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- ガチャタブ -->
  <div class="tab-content" id="tab-gacha">

    <!-- ガチャプール管理 -->
    <div class="card" style="margin-bottom:24px">
      <div class="section-title">ガチャプール管理</div>
      <div id="pool-alert" style="margin-bottom:12px"></div>
      <div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px">
        <div style="font-size:0.85rem;font-weight:bold;margin-bottom:10px;color:var(--text-muted)">新規プール作成</div>
        <div class="enemy-form-grid">
          <div class="form-group">
            <label class="form-label">ガチャ名</label>
            <input class="form-input" id="pool-name" placeholder="例: 年末スペシャルガチャ">
          </div>
          <div class="form-group">
            <label class="form-label">表示順</label>
            <input class="form-input" type="number" id="pool-order" value="0" min="0">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">表/裏</label>
          <select class="form-input" id="pool-side" style="max-width:120px">
            <option value="表">表</option>
            <option value="裏">裏</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">説明（任意）</label>
          <input class="form-input" id="pool-desc" placeholder="例: SSレアリティ強化！">
        </div>
        <div class="enemy-form-grid">
          <div class="form-group">
            <label class="form-label">開始日時（任意）</label>
            <input class="form-input" type="datetime-local" id="pool-start">
          </div>
          <div class="form-group">
            <label class="form-label">終了日時（任意）</label>
            <input class="form-input" type="datetime-local" id="pool-end">
          </div>
        </div>
        <button class="btn btn-primary" onclick="createPool()">作成する</button>
      </div>
      <div style="display:flex;align-items:center;margin-bottom:12px;border-bottom:1px solid var(--border)">
        <button id="pool-tab-btn-表" onclick="switchPoolTab('表')" style="padding:7px 24px;border:none;border-bottom:2px solid #4fc3f7;background:none;color:var(--text);font-size:0.9rem;cursor:pointer;font-weight:bold">表</button>
        <button id="pool-tab-btn-裏" onclick="switchPoolTab('裏')" style="padding:7px 24px;border:none;border-bottom:2px solid transparent;background:none;color:var(--text-muted);font-size:0.9rem;cursor:pointer">裏</button>
        <div style="flex:1"></div>
        <button onclick="openPoolStatsModal()" style="padding:5px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg-primary);color:var(--text);font-size:0.8rem;cursor:pointer;margin-bottom:4px">統計</button>
      </div>
      <div id="pool-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <!-- ガチャ設定 -->
    <div class="card" style="margin-bottom:24px">
      <div class="section-title">ガチャ設定</div>
      <div id="gacha-settings-alert" style="margin-bottom:12px"></div>
      <div class="enemy-form-grid">
        <div class="form-group">
          <label class="form-label">SS確率（%）</label>
          <input class="form-input" type="number" id="gs-ss" min="0" max="100" step="0.1" placeholder="例: 3">
        </div>
        <div class="form-group">
          <label class="form-label">S確率（%）</label>
          <input class="form-input" type="number" id="gs-s" min="0" max="100" step="0.1" placeholder="例: 15">
        </div>
        <div class="form-group">
          <label class="form-label">A確率（%）<span style="font-size:0.75rem;color:var(--text-muted);margin-left:4px">自動計算</span></label>
          <input class="form-input" type="number" id="gs-a" readonly style="background:var(--bg-primary);color:var(--text-muted)">
        </div>
        <div class="form-group">
          <label class="form-label">単発コスト（pt）</label>
          <input class="form-input" type="number" id="gs-single" min="1" placeholder="例: 50">
        </div>
        <div class="form-group">
          <label class="form-label">10連コスト（pt）</label>
          <input class="form-input" type="number" id="gs-multi" min="1" placeholder="例: 450">
        </div>
      </div>
      <div class="enemy-form-grid" style="margin-top:4px">
        <div class="form-group">
          <label class="form-label">SS重複補償（pt）</label>
          <input class="form-input" type="number" id="gs-dup-ss" min="0" placeholder="例: 30">
        </div>
        <div class="form-group">
          <label class="form-label">S重複補償（pt）</label>
          <input class="form-input" type="number" id="gs-dup-s" min="0" placeholder="例: 10">
        </div>
        <div class="form-group">
          <label class="form-label">A重複補償（pt）</label>
          <input class="form-input" type="number" id="gs-dup-a" min="0" placeholder="例: 3">
        </div>
      </div>
      <div class="form-group" style="margin-top:4px">
        <label style="display:flex;align-items:center;gap:12px;cursor:pointer">
          <input type="checkbox" id="gs-show-nav" style="width:18px;height:18px">
          <span>ナビゲーションバーにガチャを表示する</span>
        </label>
      </div>
      <button class="btn btn-primary" style="margin-top:8px" onclick="saveGachaSettings()">保存する</button>
    </div>

    <!-- アイコン追加 -->
    <div class="card" style="margin-bottom:24px">
      <div class="section-title">アイコン追加</div>
      <div id="gacha-icon-alert" style="margin-bottom:12px"></div>
      <div class="form-group">
        <label class="form-label">画像を選択</label>
        <input class="form-input" type="file" id="icon-file" accept="image/*" style="padding:8px" onchange="handleIconFile(this)">
      </div>

      <!-- キャンバスクロッパー -->
      <div id="crop-section">
        <div class="crop-row">
          <div style="flex:1;min-width:200px">
            <canvas id="crop-canvas"></canvas>
            <div class="crop-controls">
              <label>サイズ</label>
              <input type="range" id="crop-size-slider" min="20" max="100" value="80" style="flex:1" oninput="onCropSizeChange(this.value)">
            </div>
          </div>
          <div style="text-align:center">
            <p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:6px">プレビュー</p>
            <canvas id="crop-preview" width="80" height="80"></canvas>
          </div>
        </div>
        <p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:12px">
          白い枠をドラッグして切り取り位置を調整してください
        </p>
      </div>

      <div class="enemy-form-grid">
        <div class="form-group">
          <label class="form-label">アイコン名</label>
          <input class="form-input" type="text" id="icon-name" placeholder="例: ハルカ">
        </div>
        <div class="form-group">
          <label class="form-label">レアリティ</label>
          <select class="form-input" id="icon-rarity">
            <option value="SS">SS</option>
            <option value="S" selected>S</option>
            <option value="A">A</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" id="add-icon-btn" onclick="addGachaIcon()">追加する</button>
    </div>

    <!-- アイコン一覧 -->
    <div class="card">
      <div class="section-title">アイコン一覧</div>
      <div id="gacha-icon-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>
</main>

<script src="/js/common.js"></script>
<script>
renderNav();
if (!requireAdmin()) throw new Error('redirect');

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['titles','frames','gacha'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'titles') { loadTitles(); loadGrantTitleSelectors(); }
  if (name === 'frames') loadFrames();
  if (name === 'gacha') { loadGachaSettings(); loadGachaIcons(); loadPools(); }
}

// ===== 称号付与 =====
async function loadGrantTitleSelectors() {
  try {
    const [users, titles] = await Promise.all([
      apiFetch('/admin/users'),
      apiFetch('/admin/titles')
    ]);
    document.getElementById('grant-title-user').innerHTML =
      users.map(u => `<option value="${u.id}">${escHtml(u.username)}</option>`).join('');
    document.getElementById('grant-title-id').innerHTML =
      titles.map(t => `<option value="${t.id}">「${escHtml(t.name)}」</option>`).join('');
  } catch {}
}

async function grantTitleToUser() {
  const userId = document.getElementById('grant-title-user').value;
  const titleId = document.getElementById('grant-title-id').value;
  if (!userId || !titleId) return;
  try {
    const res = await apiFetch(`/admin/users/${userId}/grant-title`, {
      method: 'POST',
      body: JSON.stringify({ title_id: Number(titleId) })
    });
    showAlert('#grant-title-alert', res.message, 'success');
  } catch (err) {
    showAlert('#grant-title-alert', err.message);
  }
}

// ===== 称号管理 =====
async function loadTitles() {
  const el = document.getElementById('title-list');
  try {
    const titles = await apiFetch('/admin/titles');
    if (titles.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>称号がありません</p></div>';
      return;
    }
    el.innerHTML = titles.map(t => `
      <div>
        <div class="event-list-item">
          <div>
            <strong>「${escHtml(t.name)}」</strong>
            ${t.point_cost ? `<span style="font-size:0.8rem;color:var(--accent);margin-left:8px">${t.point_cost}pt</span>` : '<span style="font-size:0.8rem;color:var(--text-muted);margin-left:8px">ランク賞</span>'}
            ${!t.is_active ? '<span class="status-badge status-rejected" style="margin-left:8px">非表示</span>' : ''}
            ${t.description ? `<div style="font-size:0.8rem;color:var(--text-muted);margin-top:2px">${escHtml(t.description)}</div>` : ''}
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary btn-sm" onclick="toggleTitleHolders(${t.id})">所持者</button>
            <button class="btn btn-secondary btn-sm" onclick="toggleDescEdit(${t.id})">説明編集</button>
            <button class="btn btn-secondary btn-sm" onclick="toggleTitleVisibility(${t.id}, ${!t.is_active})">${t.is_active ? '非表示' : '表示'}</button>
            <button class="btn btn-danger btn-sm" onclick="deleteTitle(${t.id})">削除</button>
          </div>
        </div>
        <div id="holders-${t.id}" style="display:none;padding:12px 16px;border-top:1px solid var(--border);background:var(--bg-primary)">
          <div id="holders-content-${t.id}" style="font-size:0.85rem;color:var(--text-muted)">読み込み中...</div>
        </div>
        <div id="desc-edit-${t.id}" style="display:none;padding:12px 16px;border-top:1px solid var(--border);background:var(--bg-primary)">
          <div style="display:flex;gap:8px;align-items:center">
            <input class="form-input" id="desc-input-${t.id}" type="text" value="${escHtml(t.description || '')}" placeholder="説明文を入力" maxlength="200" style="flex:1">
            <button class="btn btn-primary btn-sm" onclick="saveDesc(${t.id})">保存</button>
          </div>
        </div>
      </div>`).join('');
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

async function createTitle() {
  const name = document.getElementById('title-name').value.trim();
  const cost = document.getElementById('title-cost').value;
  const desc = document.getElementById('title-desc').value.trim();
  if (!name) return showAlert('#title-create-alert', '称号名を入力してください');
  try {
    await apiFetch('/admin/titles', {
      method: 'POST',
      body: JSON.stringify({ name, description: desc, point_cost: cost ? parseInt(cost) : null })
    });
    document.getElementById('title-name').value = '';
    document.getElementById('title-cost').value = '';
    document.getElementById('title-desc').value = '';
    showAlert('#title-create-alert', '追加しました', 'success');
    loadTitles();
  } catch (err) {
    showAlert('#title-create-alert', err.message);
  }
}

function toggleDescEdit(id) {
  const el = document.getElementById(`desc-edit-${id}`);
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

async function saveDesc(id) {
  const desc = document.getElementById(`desc-input-${id}`).value.trim();
  try {
    await apiFetch(`/admin/titles/${id}/description`, {
      method: 'PATCH',
      body: JSON.stringify({ description: desc })
    });
    showAlert('#alert', '説明を更新しました', 'success');
    loadTitles();
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

async function toggleTitleVisibility(id, makeActive) {
  try {
    const res = await apiFetch(`/admin/titles/${id}/visibility`, {
      method: 'PATCH',
      body: JSON.stringify({ is_active: makeActive })
    });
    showAlert('#alert', res.message, 'success');
    loadTitles();
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

async function toggleTitleHolders(id) {
  const panel = document.getElementById(`holders-${id}`);
  const content = document.getElementById(`holders-content-${id}`);
  const isOpen = panel.style.display !== 'none';
  if (isOpen) { panel.style.display = 'none'; return; }
  panel.style.display = '';
  try {
    const holders = await apiFetch(`/admin/titles/${id}/holders`);
    if (holders.length === 0) {
      content.innerHTML = '<span>所持者なし</span>';
      return;
    }
    content.innerHTML = `<div style="display:flex;flex-direction:column;gap:6px">` +
      holders.map(h => `
        <div style="display:flex;align-items:center;gap:8px">
          <a href="/user.html?id=${h.id}" style="font-size:0.85rem;color:var(--text);text-decoration:none">${escHtml(h.username)}</a>
          ${h.is_equipped ? '<span style="font-size:0.65rem;color:var(--accent)">装備中</span>' : ''}
          <button onclick="revokeTitle(${id},${h.id},this)" style="margin-left:auto;font-size:0.72rem;padding:2px 8px;border:1px solid var(--error,#ef5350);border-radius:4px;background:none;color:var(--error,#ef5350);cursor:pointer">回収</button>
        </div>`).join('') +
      `</div><div style="margin-top:6px;font-size:0.75rem;color:var(--text-muted)">${holders.length}人</div>`;
  } catch (err) {
    content.innerHTML = `<span style="color:var(--error)">${escHtml(err.message)}</span>`;
  }
}

async function revokeTitle(titleId, userId, btn) {
  if (!confirm('この称号を回収しますか？')) return;
  try {
    await apiFetch(`/admin/titles/${titleId}/holders/${userId}`, { method: 'DELETE' });
    btn.closest('div[style]').remove();
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

async function deleteTitle(id) {
  if (!confirm('この称号を完全削除しますか？購入済みユーザーからも削除されます。')) return;
  try {
    await apiFetch(`/admin/titles/${id}`, { method: 'DELETE' });
    loadTitles();
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

// ===== フレーム管理 =====
const FRAME_LABELS = { 'frame-gold':'ゴールド','frame-silver':'シルバー','frame-neon-blue':'ネオンブルー','frame-neon-pink':'ネオンピンク','frame-fire':'ファイア','frame-rainbow':'レインボー' };

async function loadFrames() {
  const el = document.getElementById('frame-list');
  try {
    const frames = await apiFetch('/admin/frames');
    if (frames.length === 0) { el.innerHTML = '<div class="empty-state"><p>フレームがありません</p></div>'; return; }
    el.innerHTML = frames.map(f => `
      <div class="event-list-item">
        <div>
          <strong>${escHtml(f.name)}</strong>
          <span style="font-size:0.8rem;color:var(--accent);margin-left:8px">${f.point_cost}pt</span>
          <span style="font-size:0.8rem;color:var(--text-muted);margin-left:8px">${FRAME_LABELS[f.css_class] || f.css_class}</span>
          ${!f.is_active ? '<span class="status-badge status-rejected" style="margin-left:8px">非表示</span>' : ''}
          ${f.description ? `<div style="font-size:0.8rem;color:var(--text-muted);margin-top:2px">${escHtml(f.description)}</div>` : ''}
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="toggleFrameVisibility(${f.id},${!f.is_active})">${f.is_active ? '非表示' : '表示'}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteFrame(${f.id})">削除</button>
        </div>
      </div>`).join('');
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

async function createFrame() {
  const name = document.getElementById('frame-name').value.trim();
  const cost = document.getElementById('frame-cost').value;
  const css_class = document.getElementById('frame-class').value;
  const desc = document.getElementById('frame-desc').value.trim();
  if (!name || !cost) return showAlert('#frame-create-alert', '名前と価格は必須です');
  try {
    await apiFetch('/admin/frames', { method: 'POST', body: JSON.stringify({ name, description: desc, point_cost: parseInt(cost), css_class }) });
    document.getElementById('frame-name').value = '';
    document.getElementById('frame-cost').value = '';
    document.getElementById('frame-desc').value = '';
    showAlert('#frame-create-alert', '追加しました', 'success');
    loadFrames();
  } catch (err) { showAlert('#frame-create-alert', err.message); }
}

async function toggleFrameVisibility(id, makeActive) {
  try {
    const res = await apiFetch(`/admin/frames/${id}/visibility`, { method: 'PATCH', body: JSON.stringify({ is_active: makeActive }) });
    showAlert('#alert', res.message, 'success');
    loadFrames();
  } catch (err) { showAlert('#alert', err.message); }
}

async function deleteFrame(id) {
  if (!confirm('このフレームを削除しますか？所持ユーザーからも削除されます。')) return;
  try {
    await apiFetch(`/admin/frames/${id}`, { method: 'DELETE' });
    loadFrames();
  } catch (err) { showAlert('#alert', err.message); }
}

// ===== ガチャプール管理 =====
let _poolIconModalId = null;
let _allIcons = [];
let _pickupSet = new Set();
let _currentPoolTab = '表';
let _editPoolId = null;

function switchPoolTab(side) {
  _currentPoolTab = side;
  ['表', '裏'].forEach(s => {
    const btn = document.getElementById(`pool-tab-btn-${s}`);
    btn.style.borderBottom = s === side ? '2px solid #4fc3f7' : '2px solid transparent';
    btn.style.color = s === side ? 'var(--text)' : 'var(--text-muted)';
    btn.style.fontWeight = s === side ? 'bold' : 'normal';
  });
  loadPools();
}

async function loadPools() {
  try {
    const allPools = await apiFetch('/admin/gacha/pools');
    const pools = allPools.filter(p => (p.side || '表') === _currentPoolTab);
    const el = document.getElementById('pool-list');
    if (pools.length === 0) {
      el.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem">プールがありません</div>';
      return;
    }
    el.innerHTML = pools.map(p => `
      <div style="border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;background:var(--bg-primary)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">
          <div style="min-width:0">
            <div style="font-weight:bold;font-size:0.95rem">${escHtml(p.name)}
              ${p.is_active ? '' : '<span style="font-size:0.72rem;color:var(--text-muted);margin-left:6px">非表示</span>'}
              <span style="font-size:0.72rem;font-weight:normal;margin-left:6px;padding:1px 6px;border-radius:4px;${poolStatusStyle(p.start_at, p.end_at)}">${poolStatusLabel(p.start_at, p.end_at)}</span>
            </div>
            ${p.description ? `<div style="font-size:0.8rem;color:var(--text-muted);margin-top:2px">${escHtml(p.description)}</div>` : ''}
            <div style="font-size:0.78rem;color:var(--text-muted);margin-top:4px">アイコン ${p.icon_count}枚　順 ${p.order_index}</div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px">${formatPeriod(p.start_at, p.end_at)}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap">
            <button class="btn btn-secondary btn-sm" onclick="openPoolEditModal(${p.id})">編集</button>
            <button class="btn btn-danger btn-sm" onclick="deletePool(${p.id},'${escHtml(p.name).replace(/'/g,"\\'")}')">削除</button>
          </div>
        </div>
      </div>`).join('');
  } catch (err) {
    showAlert('#pool-alert', err.message);
  }
}

function formatDatetimeJST(dt) {
  if (!dt) return null;
  return new Date(dt).toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}
function formatPeriod(start_at, end_at) {
  if (!start_at && !end_at) return '期間: 常時開催';
  const s = start_at ? formatDatetimeJST(start_at) : '〜';
  const e = end_at   ? formatDatetimeJST(end_at)   : '〜';
  return `期間: ${start_at ? s : '制限なし'} 〜 ${end_at ? e : '制限なし'}`;
}
function poolStatusLabel(start_at, end_at) {
  const now = Date.now();
  if (end_at && new Date(end_at) <= now) return '終了';
  if (start_at && new Date(start_at) > now) return '開催前';
  return '開催中';
}
function poolStatusStyle(start_at, end_at) {
  const label = poolStatusLabel(start_at, end_at);
  if (label === '終了')   return 'background:#444;color:var(--text-muted)';
  if (label === '開催前') return 'background:#2a3a4a;color:#4fc3f7';
  return 'background:#1a3a1a;color:#66bb6a';
}
function toDatetimeLocal(dt) {
  if (!dt) return '';
  const d = new Date(dt);
  return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
}

async function createPool() {
  const name = document.getElementById('pool-name').value.trim();
  const desc = document.getElementById('pool-desc').value.trim();
  const order = document.getElementById('pool-order').value;
  const toUTC = v => v ? new Date(v).toISOString() : null;
  const start_at = toUTC(document.getElementById('pool-start').value);
  const end_at   = toUTC(document.getElementById('pool-end').value);
  if (!name) { showAlert('#pool-alert', 'ガチャ名を入力してください'); return; }
  try {
    const side = document.getElementById('pool-side').value;
    await apiFetch('/admin/gacha/pools', { method: 'POST', body: JSON.stringify({ name, description: desc, order_index: parseInt(order)||0, start_at, end_at, side }) });
    showAlert('#pool-alert', '作成しました', 'success');
    document.getElementById('pool-name').value = '';
    document.getElementById('pool-desc').value = '';
    document.getElementById('pool-order').value = '0';
    document.getElementById('pool-start').value = '';
    document.getElementById('pool-end').value = '';
    loadPools();
  } catch (err) { showAlert('#pool-alert', err.message); }
}

async function openPoolEditModal(poolId, tab = 'basic') {
  _editPoolId = poolId;
  _poolIconModalId = poolId;
  _pickupSet = new Set();
  document.getElementById('pool-edit-alert').innerHTML = '';
  document.getElementById('stat-single').textContent = '-';
  document.getElementById('stat-multi').textContent = '-';
  document.getElementById('stat-total').textContent = '-';
  document.getElementById('pool-edit-modal').style.display = 'flex';
  switchEditTab(tab);
  try {
    const [pools, stats] = await Promise.all([
      apiFetch('/admin/gacha/pools'),
      apiFetch('/admin/gacha/pools/stats')
    ]);
    const p = pools.find(x => x.id === poolId);
    if (p) {
      document.getElementById('pool-edit-modal-title').textContent = escHtml(p.name);
      document.getElementById('edit-pool-name').value = p.name;
      document.getElementById('edit-pool-desc').value = p.description || '';
      document.getElementById('edit-pool-order').value = p.order_index;
      document.getElementById('edit-pool-active').checked = p.is_active;
      document.getElementById('edit-pool-side').value = p.side || '表';
      document.getElementById('edit-period-start').value = toDatetimeLocal(p.start_at);
      document.getElementById('edit-period-end').value   = toDatetimeLocal(p.end_at);
    }
    const s = stats.find(x => x.id === poolId);
    if (s) {
      document.getElementById('stat-single').textContent = s.single_count.toLocaleString('ja-JP') + '回';
      document.getElementById('stat-multi').textContent  = s.multi_count.toLocaleString('ja-JP') + '回';
      document.getElementById('stat-total').textContent  = s.total_pulls.toLocaleString('ja-JP') + '回';
    }
  } catch (err) { showAlert('#pool-edit-alert', err.message); }
  if (tab === 'icons') loadIconsTab();
}

function switchEditTab(tab) {
  ['basic', 'period', 'icons'].forEach(t => {
    document.getElementById(`tab-content-${t}`).style.display = t === tab ? '' : 'none';
    const btn = document.getElementById(`tab-btn-${t}`);
    btn.style.borderBottom = t === tab ? '2px solid #4fc3f7' : '2px solid transparent';
    btn.style.color = t === tab ? 'var(--text)' : 'var(--text-muted)';
    btn.style.fontWeight = t === tab ? 'bold' : 'normal';
  });
  if (tab === 'icons') loadIconsTab();
}

function closePoolEditModal() {
  document.getElementById('pool-edit-modal').style.display = 'none';
  _editPoolId = null;
  _poolIconModalId = null;
}

// ===== プール統計モーダル =====
let _statsData = [];
let _statsSort = 'order';

async function openPoolStatsModal() {
  document.getElementById('pool-stats-modal').style.display = 'flex';
  document.getElementById('pool-stats-table').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    _statsData = await apiFetch('/admin/gacha/pools/stats');
    renderPoolStats();
  } catch (err) {
    document.getElementById('pool-stats-table').innerHTML = `<div style="color:var(--danger)">${escHtml(err.message)}</div>`;
  }
}

function closePoolStatsModal() {
  document.getElementById('pool-stats-modal').style.display = 'none';
}

function setStatsSort(key) {
  _statsSort = key;
  ['order','total','single','multi'].forEach(k => {
    const btn = document.getElementById(`stats-sort-btn-${k}`);
    btn.style.background = k === key ? 'var(--accent)' : 'none';
    btn.style.color = k === key ? '#fff' : 'var(--text-muted)';
  });
  renderPoolStats();
}

function renderPoolStats() {
  const data = [..._statsData];
  if (_statsSort === 'total') data.sort((a, b) => b.total_pulls - a.total_pulls);
  else if (_statsSort === 'single') data.sort((a, b) => b.single_count - a.single_count);
  else if (_statsSort === 'multi') data.sort((a, b) => b.multi_count - a.multi_count);

  if (data.length === 0) {
    document.getElementById('pool-stats-table').innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem">データがありません</div>';
    return;
  }
  const maxTotal = Math.max(...data.map(d => d.total_pulls), 1);
  document.getElementById('pool-stats-table').innerHTML = `
    <table style="width:100%;border-collapse:collapse;font-size:0.85rem">
      <thead>
        <tr style="border-bottom:1px solid var(--border);color:var(--text-muted);font-size:0.78rem">
          <th style="text-align:left;padding:6px 8px;font-weight:normal">プール名</th>
          <th style="text-align:right;padding:6px 8px;font-weight:normal">単発</th>
          <th style="text-align:right;padding:6px 8px;font-weight:normal">10連</th>
          <th style="text-align:right;padding:6px 8px;font-weight:normal;color:#4fc3f7">合計</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(d => `
          <tr style="border-bottom:1px solid var(--border)">
            <td style="padding:8px 8px">
              <div style="font-size:0.82rem;margin-bottom:4px">${escHtml(d.name)}</div>
              <div style="height:4px;background:var(--border);border-radius:2px">
                <div style="height:4px;background:#4fc3f7;border-radius:2px;width:${Math.round(d.total_pulls / maxTotal * 100)}%"></div>
              </div>
            </td>
            <td style="text-align:right;padding:8px 8px;font-variant-numeric:tabular-nums">${d.single_count.toLocaleString()}</td>
            <td style="text-align:right;padding:8px 8px;font-variant-numeric:tabular-nums">${d.multi_count.toLocaleString()}</td>
            <td style="text-align:right;padding:8px 8px;font-weight:bold;color:#4fc3f7;font-variant-numeric:tabular-nums">${d.total_pulls.toLocaleString()}</td>
          </tr>`).join('')}
      </tbody>
      <tfoot>
        <tr style="border-top:2px solid var(--border);font-weight:bold">
          <td style="padding:8px 8px;font-size:0.82rem;color:var(--text-muted)">合計</td>
          <td style="text-align:right;padding:8px 8px;font-variant-numeric:tabular-nums">${data.reduce((s,d)=>s+d.single_count,0).toLocaleString()}</td>
          <td style="text-align:right;padding:8px 8px;font-variant-numeric:tabular-nums">${data.reduce((s,d)=>s+d.multi_count,0).toLocaleString()}</td>
          <td style="text-align:right;padding:8px 8px;color:#4fc3f7;font-variant-numeric:tabular-nums">${data.reduce((s,d)=>s+d.total_pulls,0).toLocaleString()}</td>
        </tr>
      </tfoot>
    </table>`;
}

async function saveBasicSettings() {
  if (!_editPoolId) return;
  const name = document.getElementById('edit-pool-name').value.trim();
  if (!name) { showAlert('#pool-edit-alert', 'ガチャ名を入力してください'); return; }
  const desc = document.getElementById('edit-pool-desc').value.trim();
  const order = parseInt(document.getElementById('edit-pool-order').value) || 0;
  const is_active = document.getElementById('edit-pool-active').checked;
  const side = document.getElementById('edit-pool-side').value;
  try {
    await apiFetch(`/admin/gacha/pools/${_editPoolId}`, {
      method: 'PUT',
      body: JSON.stringify({ name, description: desc || null, is_active, order_index: order, side })
    });
    document.getElementById('pool-edit-modal-title').textContent = escHtml(name);
    showAlert('#pool-edit-alert', '更新しました', 'success');
    loadPools();
  } catch (err) { showAlert('#pool-edit-alert', err.message); }
}

async function savePeriodSettings() {
  if (!_editPoolId) return;
  const toUTC = v => v ? new Date(v).toISOString() : null;
  const start_at = toUTC(document.getElementById('edit-period-start').value);
  const end_at   = toUTC(document.getElementById('edit-period-end').value);
  if (start_at && end_at && new Date(start_at) >= new Date(end_at)) {
    showAlert('#pool-edit-alert', '終了日時は開始日時より後にしてください');
    return;
  }
  try {
    await apiFetch(`/admin/gacha/pools/${_editPoolId}/period`, { method: 'PATCH', body: JSON.stringify({ start_at, end_at }) });
    showAlert('#pool-edit-alert', '期間を更新しました', 'success');
    loadPools();
  } catch (err) { showAlert('#pool-edit-alert', err.message); }
}

async function deletePool(id, name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  try {
    await apiFetch(`/admin/gacha/pools/${id}`, { method: 'DELETE' });
    showAlert('#pool-alert', '削除しました', 'success');
    loadPools();
  } catch (err) { showAlert('#pool-alert', err.message); }
}

async function loadIconsTab() {
  if (!_editPoolId) return;
  document.getElementById('pool-modal-icons').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  document.getElementById('btn-toggle-ss').textContent = 'SS全選択';
  document.getElementById('btn-toggle-as').textContent = 'A・S全選択';
  try {
    const [allIcons, currentIds, pickupIds] = await Promise.all([
      apiFetch('/admin/gacha/icons'),
      apiFetch(`/admin/gacha/pools/${_editPoolId}/icons`),
      apiFetch(`/admin/gacha/pools/${_editPoolId}/pickups`)
    ]);
    _allIcons = allIcons;
    const selectedSet = new Set(currentIds);
    _pickupSet = new Set();
    pickupIds.forEach(id => _pickupSet.add(id));
    const rarityOrder = ['SS', 'S', 'A'];
    const grouped = { SS: [], S: [], A: [] };
    allIcons.forEach(ic => { if (grouped[ic.rarity]) grouped[ic.rarity].push(ic); });
    const rarityColors = { SS: '#ffd700', S: '#e0c060', A: '#4fc3f7' };
    document.getElementById('pool-modal-icons').innerHTML = rarityOrder.map(r => {
      if (!grouped[r].length) return '';
      return `
        <div style="margin-bottom:18px">
          <div style="font-size:0.82rem;font-weight:bold;color:${rarityColors[r]};margin-bottom:8px">${r}レア${r === 'SS' ? '<span style="font-size:0.7rem;color:var(--text-muted);margin-left:8px">★ = ピックアップ（各0.75%）</span>' : ''}</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px">
            ${grouped[r].map(ic => `
              <label style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px;border-radius:8px;border:2px solid ${selectedSet.has(ic.id) ? rarityColors[r] : 'var(--border)'};background:var(--bg-primary);transition:border-color 0.15s;position:relative" onclick="toggleIconCard(this,${ic.id},'${rarityColors[r]}')">
                <input type="checkbox" data-icon-id="${ic.id}" ${selectedSet.has(ic.id) ? 'checked' : ''} style="display:none">
                <img src="${escHtml(ic.image_url)}" style="width:52px;height:52px;border-radius:20%;object-fit:cover">
                <div style="font-size:0.65rem;text-align:center;word-break:break-all;line-height:1.2">${escHtml(ic.name)}</div>
                ${r === 'SS' ? `<button type="button" data-pu-id="${ic.id}"
                  onclick="event.stopPropagation();togglePickup(this,${ic.id})"
                  style="margin-top:2px;padding:1px 6px;border-radius:4px;font-size:0.68rem;cursor:pointer;border:1px solid ${_pickupSet.has(ic.id)?'#ffd700':'var(--border)'};background:none;color:${_pickupSet.has(ic.id)?'#ffd700':'var(--text-muted)'}">
                  ${_pickupSet.has(ic.id)?'★PU':'☆PU'}
                </button>` : ''}
              </label>`).join('')}
          </div>
        </div>`;
    }).join('');
  } catch (err) {
    document.getElementById('pool-modal-icons').innerHTML = `<div style="color:var(--danger)">${escHtml(err.message)}</div>`;
  }
}

function toggleIconCard(labelEl, iconId, color) {
  const cb = labelEl.querySelector('input[type=checkbox]');
  cb.checked = !cb.checked;
  labelEl.style.borderColor = cb.checked ? color : 'var(--border)';
}

const _rarityColors = { SS: '#ffd700', S: '#e0c060', A: '#4fc3f7' };
function toggleAllSS() {
  const labels = document.querySelectorAll('#pool-modal-icons label');
  const ssIcons = Array.from(labels).filter(label => {
    const cb = label.querySelector('input[type=checkbox]');
    const icon = _allIcons.find(i => i.id === parseInt(cb?.dataset.iconId));
    return icon && icon.rarity === 'SS';
  });
  const allChecked = ssIcons.every(label => label.querySelector('input[type=checkbox]').checked);
  ssIcons.forEach(label => {
    const cb = label.querySelector('input[type=checkbox]');
    cb.checked = !allChecked;
    label.style.borderColor = (!allChecked) ? _rarityColors['SS'] : 'var(--border)';
  });
  document.getElementById('btn-toggle-ss').textContent = allChecked ? 'SS全選択' : 'SS全解除';
}

function toggleAllAS() {
  const labels = document.querySelectorAll('#pool-modal-icons label');
  const asIcons = Array.from(labels).filter(label => {
    const cb = label.querySelector('input[type=checkbox]');
    const icon = _allIcons.find(i => i.id === parseInt(cb?.dataset.iconId));
    return icon && (icon.rarity === 'A' || icon.rarity === 'S');
  });
  const allChecked = asIcons.every(label => label.querySelector('input[type=checkbox]').checked);
  asIcons.forEach(label => {
    const cb = label.querySelector('input[type=checkbox]');
    const icon = _allIcons.find(i => i.id === parseInt(cb.dataset.iconId));
    cb.checked = !allChecked;
    label.style.borderColor = (!allChecked) ? (_rarityColors[icon.rarity]) : 'var(--border)';
  });
  document.getElementById('btn-toggle-as').textContent = allChecked ? 'A・S全選択' : 'A・S全解除';
}

function togglePickup(btn, iconId) {
  if (_pickupSet.has(iconId)) {
    _pickupSet.delete(iconId);
    btn.textContent = '☆PU';
    btn.style.borderColor = 'var(--border)';
    btn.style.color = 'var(--text-muted)';
  } else {
    _pickupSet.add(iconId);
    btn.textContent = '★PU';
    btn.style.borderColor = '#ffd700';
    btn.style.color = '#ffd700';
  }
}

async function savePoolIcons() {
  if (!_editPoolId) return;
  const checkboxes = document.querySelectorAll('#pool-modal-icons input[type=checkbox]');
  const icon_ids = Array.from(checkboxes).filter(cb => cb.checked).map(cb => parseInt(cb.dataset.iconId));
  const pickup_ids = [..._pickupSet].filter(id => icon_ids.includes(id));
  try {
    await Promise.all([
      apiFetch(`/admin/gacha/pools/${_editPoolId}/icons`, { method: 'PUT', body: JSON.stringify({ icon_ids }) }),
      apiFetch(`/admin/gacha/pools/${_editPoolId}/pickups`, { method: 'PUT', body: JSON.stringify({ icon_ids: pickup_ids }) })
    ]);
    showAlert('#pool-edit-alert', 'アイコン設定を保存しました', 'success');
    loadPools();
  } catch (err) {
    showAlert('#pool-edit-alert', err.message);
  }
}

// ===== ガチャ設定 =====
async function loadGachaSettings() {
  try {
    const s = await apiFetch('/admin/gacha/settings');
    document.getElementById('gs-ss').value = s.ss_rate;
    document.getElementById('gs-s').value = s.s_rate;
    document.getElementById('gs-a').value = (100 - parseFloat(s.ss_rate) - parseFloat(s.s_rate)).toFixed(1);
    document.getElementById('gs-single').value = s.single_cost;
    document.getElementById('gs-multi').value = s.multi_cost;
    document.getElementById('gs-show-nav').checked = s.show_nav;
    document.getElementById('gs-dup-ss').value = s.dup_ss_pts;
    document.getElementById('gs-dup-s').value  = s.dup_s_pts;
    document.getElementById('gs-dup-a').value  = s.dup_a_pts;
  } catch (err) { showAlert('#gacha-settings-alert', err.message); }
}

['gs-ss', 'gs-s'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    const ss = parseFloat(document.getElementById('gs-ss').value) || 0;
    const s  = parseFloat(document.getElementById('gs-s').value) || 0;
    document.getElementById('gs-a').value = Math.max(0, 100 - ss - s).toFixed(1);
  });
});

async function saveGachaSettings() {
  const ss = parseFloat(document.getElementById('gs-ss').value);
  const s  = parseFloat(document.getElementById('gs-s').value);
  if (isNaN(ss) || isNaN(s) || ss < 0 || s < 0 || ss + s > 100) {
    showAlert('#gacha-settings-alert', '確率の合計が100%を超えています');
    return;
  }
  const a = 100 - ss - s;
  try {
    await apiFetch('/admin/gacha/settings', {
      method: 'PUT',
      body: JSON.stringify({
        ss_rate: ss, s_rate: s, a_rate: parseFloat(a.toFixed(1)),
        single_cost: parseInt(document.getElementById('gs-single').value),
        multi_cost: parseInt(document.getElementById('gs-multi').value),
        show_nav: document.getElementById('gs-show-nav').checked,
        dup_ss_pts: parseInt(document.getElementById('gs-dup-ss').value) || 0,
        dup_s_pts:  parseInt(document.getElementById('gs-dup-s').value)  || 0,
        dup_a_pts:  parseInt(document.getElementById('gs-dup-a').value)  || 0
      })
    });
    showAlert('#gacha-settings-alert', '設定を保存しました', 'success');
    localStorage.removeItem('gacha_show_nav');
  } catch (err) { showAlert('#gacha-settings-alert', err.message); }
}

// ===== キャンバスクロッパー =====
let cropState = { img: null, x: 0, y: 0, size: 100, scale: 1, dragging: false, dx: 0, dy: 0 };

function handleIconFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      cropState.img = img;
      const maxD = Math.min(img.width, img.height);
      cropState.size = maxD * 0.8;
      cropState.x = (img.width - cropState.size) / 2;
      cropState.y = (img.height - cropState.size) / 2;
      const slider = document.getElementById('crop-size-slider');
      slider.max = maxD;
      slider.min = Math.max(20, Math.floor(maxD * 0.1));
      slider.value = Math.floor(cropState.size);
      document.getElementById('crop-section').style.display = '';
      drawCrop();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function drawCrop() {
  const canvas = document.getElementById('crop-canvas');
  const ctx = canvas.getContext('2d');
  const img = cropState.img;
  const container = canvas.parentElement.clientWidth || 360;
  const maxW = Math.min(img.width, container - 16);
  const scale = maxW / img.width;
  cropState.scale = scale;
  canvas.width  = img.width  * scale;
  canvas.height = img.height * scale;
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const sx = cropState.x * scale, sy = cropState.y * scale, ss = cropState.size * scale;
  ctx.save();
  ctx.beginPath(); ctx.rect(sx, sy, ss, ss); ctx.clip();
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  ctx.restore();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.strokeRect(sx, sy, ss, ss);
  const hw = 9;
  ctx.fillStyle = '#fff';
  [[sx, sy], [sx+ss-hw, sy], [sx, sy+ss-hw], [sx+ss-hw, sy+ss-hw]]
    .forEach(([cx, cy]) => ctx.fillRect(cx, cy, hw, hw));
  drawPreview();
}

function drawPreview() {
  const c = document.getElementById('crop-preview');
  const ctx = c.getContext('2d');
  c.width = 80; c.height = 80;
  ctx.clearRect(0, 0, 80, 80);
  ctx.beginPath(); ctx.arc(40, 40, 40, 0, Math.PI * 2); ctx.clip();
  ctx.drawImage(cropState.img, cropState.x, cropState.y, cropState.size, cropState.size, 0, 0, 80, 80);
}

function getCanvasXY(e) {
  const rect = document.getElementById('crop-canvas').getBoundingClientRect();
  const clientX = e.clientX ?? e.touches[0].clientX;
  const clientY = e.clientY ?? e.touches[0].clientY;
  return { x: (clientX - rect.left) / cropState.scale, y: (clientY - rect.top) / cropState.scale };
}

const cc = document.getElementById('crop-canvas');
cc.addEventListener('mousedown',  e => startDrag(getCanvasXY(e)));
cc.addEventListener('mousemove',  e => { if (cropState.dragging) moveDrag(getCanvasXY(e)); });
cc.addEventListener('mouseup',    () => { cropState.dragging = false; });
cc.addEventListener('mouseleave', () => { cropState.dragging = false; });
cc.addEventListener('touchstart', e => { e.preventDefault(); startDrag(getCanvasXY(e)); }, { passive: false });
cc.addEventListener('touchmove',  e => { e.preventDefault(); if (cropState.dragging) moveDrag(getCanvasXY(e)); }, { passive: false });
cc.addEventListener('touchend',   () => { cropState.dragging = false; });

function startDrag(p) {
  if (p.x >= cropState.x && p.x <= cropState.x + cropState.size &&
      p.y >= cropState.y && p.y <= cropState.y + cropState.size) {
    cropState.dragging = true;
    cropState.dx = p.x - cropState.x;
    cropState.dy = p.y - cropState.y;
  }
}
function moveDrag(p) {
  const img = cropState.img;
  cropState.x = Math.max(0, Math.min(img.width  - cropState.size, p.x - cropState.dx));
  cropState.y = Math.max(0, Math.min(img.height - cropState.size, p.y - cropState.dy));
  drawCrop();
}

function onCropSizeChange(val) {
  if (!cropState.img) return;
  cropState.size = Number(val);
  cropState.x = Math.min(cropState.x, cropState.img.width  - cropState.size);
  cropState.y = Math.min(cropState.y, cropState.img.height - cropState.size);
  cropState.x = Math.max(0, cropState.x);
  cropState.y = Math.max(0, cropState.y);
  drawCrop();
}

function getCroppedDataUrl() {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const ctx = c.getContext('2d');
  const r = 51;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(256 - r, 0);
  ctx.arcTo(256, 0, 256, r, r);
  ctx.lineTo(256, 256 - r);
  ctx.arcTo(256, 256, 256 - r, 256, r);
  ctx.lineTo(r, 256);
  ctx.arcTo(0, 256, 0, 256 - r, r);
  ctx.lineTo(0, r);
  ctx.arcTo(0, 0, r, 0, r);
  ctx.closePath();
  ctx.clip();
  ctx.drawImage(cropState.img, cropState.x, cropState.y, cropState.size, cropState.size, 0, 0, 256, 256);
  return c.toDataURL('image/png');
}

async function addGachaIcon() {
  if (!cropState.img) { showAlert('#gacha-icon-alert', '画像を選択してください'); return; }
  const name = document.getElementById('icon-name').value.trim();
  const rarity = document.getElementById('icon-rarity').value;
  if (!name) { showAlert('#gacha-icon-alert', 'アイコン名を入力してください'); return; }
  const btn = document.getElementById('add-icon-btn');
  btn.disabled = true;
  try {
    const image_base64 = getCroppedDataUrl();
    await apiFetch('/admin/gacha/icons', {
      method: 'POST',
      body: JSON.stringify({ name, rarity, image_base64 })
    });
    showAlert('#gacha-icon-alert', '追加しました', 'success');
    document.getElementById('icon-name').value = '';
    document.getElementById('icon-file').value = '';
    document.getElementById('crop-section').style.display = 'none';
    cropState.img = null;
    loadGachaIcons();
  } catch (err) {
    showAlert('#gacha-icon-alert', err.message);
  } finally {
    btn.disabled = false;
  }
}

// ===== アイコン一覧 =====
async function loadGachaIcons() {
  const el = document.getElementById('gacha-icon-list');
  try {
    const icons = await apiFetch('/admin/gacha/icons');
    if (icons.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>アイコンがありません</p></div>';
      return;
    }
    const UNITS = ['','31A','31B','31C','31D','31E','31F','30G','31X'];
    el.innerHTML = `<div class="admin-icon-grid">${icons.map(icon => `
      <div class="admin-icon-card">
        <span class="rarity-badge rarity-badge-${escHtml(icon.rarity)}">${escHtml(icon.rarity)}</span><br>
        <img src="${escHtml(icon.image_url)}" alt="${escHtml(icon.name)}"
             ${!icon.is_active ? 'style="opacity:0.4"' : ''}>
        <div class="iname">${escHtml(icon.name)}</div>
        <select class="form-input" style="font-size:0.75rem;padding:3px 6px;margin-top:6px"
          onchange="setIconUnit(${icon.id}, this.value)">
          ${UNITS.map(u => `<option value="${u}" ${icon.unit === u || (!icon.unit && u === '') ? 'selected' : ''}>${u || '部隊なし'}</option>`).join('')}
        </select>
        <div class="ibtns">
          <button class="btn btn-secondary btn-sm" onclick="toggleIconVisibility(${icon.id}, ${!icon.is_active})">
            ${icon.is_active ? '非表示' : '表示'}
          </button>
          <button class="btn btn-danger btn-sm" onclick="deleteGachaIcon(${icon.id})">削除</button>
        </div>
      </div>`).join('')}</div>`;
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

async function setIconUnit(id, unit) {
  try {
    await apiFetch(`/admin/gacha/icons/${id}/unit`, { method: 'PATCH', body: JSON.stringify({ unit }) });
  } catch (err) { showAlert('#alert', err.message); }
}

async function toggleIconVisibility(id, makeActive) {
  try {
    const res = await apiFetch(`/admin/gacha/icons/${id}/visibility`, {
      method: 'PATCH', body: JSON.stringify({ is_active: makeActive })
    });
    showAlert('#alert', res.message, 'success');
    loadGachaIcons();
  } catch (err) { showAlert('#alert', err.message); }
}

async function deleteGachaIcon(id) {
  if (!confirm('このアイコンを削除しますか？所持ユーザーからも削除されます。')) return;
  try {
    await apiFetch(`/admin/gacha/icons/${id}`, { method: 'DELETE' });
    loadGachaIcons();
  } catch (err) { showAlert('#alert', err.message); }
}
