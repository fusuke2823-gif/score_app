<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面 - HBR</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.section-title { font-size:1rem; font-weight:bold; margin-bottom:16px; color:var(--text-primary); }
.pending-score { font-size:1.1rem; font-weight:bold; color:var(--accent); }
.note-input { width:100%; margin-top:6px; }
.enemy-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:600px){ .enemy-form-grid{grid-template-columns:1fr;} .hide-mobile{display:none;} }
.user-name-cell{ white-space:nowrap; }
#users-table td,#users-table th{ padding:6px 4px; }
#users-table td:nth-child(1),#users-table th:nth-child(1){ white-space:nowrap; }
#users-table td:nth-child(2),#users-table th:nth-child(2){ white-space:nowrap; width:1%; }
#users-table td:nth-child(3),#users-table th:nth-child(3){ white-space:nowrap; width:1%; }
#users-table td:nth-child(4),#users-table th:nth-child(4){ white-space:nowrap; width:1%; font-size:0.8rem; }
#users-table td:nth-child(5),#users-table th:nth-child(5){ white-space:nowrap; font-size:0.8rem; }
#users-table td:nth-child(6),#users-table th:nth-child(6){ white-space:nowrap; width:1%; font-size:0.8rem; }
#users-table td:last-child,#users-table th:last-child{ width:1%; }
@media(max-width:600px){
  #users-table .user-name-cell{ white-space:normal; word-break:break-all; }
  #users-table td:nth-child(2),#users-table th:nth-child(2){ font-size:0.72rem; }
  #users-table td:nth-child(3),#users-table th:nth-child(3){ font-size:0.72rem; }
  #users-table .btn-sm{ font-size:0.68rem; padding:2px 5px; white-space:nowrap; }
}
.rule-item { display:flex; gap:8px; margin-bottom:8px; }
.rule-item input { flex:1; }
.rule-item button { flex-shrink:0; }
.event-list-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 16px; border-bottom:1px solid var(--border);
}
.event-list-item:last-child { border-bottom:none; }
.collapse-toggle { cursor:pointer; user-select:none; }
.collapse-content { display:none; padding:16px; border-top:1px solid var(--border); background:var(--bg-primary); border-radius:0 0 10px 10px; }
.collapse-content.open { display:block; }
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
    <h1 class="page-title" style="margin:0">管理画面</h1>
    <div style="display:flex;gap:6px;flex-shrink:0">
      <button class="btn btn-sm btn-primary" disabled style="cursor:default">1</button>
      <a href="/admin2.html" class="btn btn-secondary btn-sm">2</a>
      <a href="/admin3.html" class="btn btn-secondary btn-sm">3</a>
    </div>
  </div>
  <div id="alert"></div>

  <div class="tabs" style="margin-bottom:0">
    <button class="tab-btn active" onclick="switchTab('pending')">承認待ち <span id="pending-count"></span></button>
    <button class="tab-btn" onclick="switchTab('events')">イベント管理</button>
    <button class="tab-btn" onclick="switchTab('all-scores')">全スコア一覧</button>
    <button class="tab-btn" onclick="switchTab('titles')">装備管理</button>
    <button class="tab-btn" onclick="switchTab('users')">ユーザー管理</button>
    <button class="tab-btn hide-mobile" onclick="switchTab('settings')">設定</button>
  </div>

  <!-- 承認待ち -->
  <div class="tab-content active" id="tab-pending">
    <div id="pending-list">
      <div class="loading"><div class="spinner"></div>読み込み中...</div>
    </div>
  </div>

  <!-- イベント管理 -->
  <div class="tab-content" id="tab-events">
    <div class="card" style="margin-bottom:24px">
      <div class="section-title">新規イベント作成</div>
      <form id="create-event-form">
        <div class="enemy-form-grid">
          <div class="form-group">
            <label class="form-label">イベント番号</label>
            <input class="form-input" type="number" id="event-number" min="1" required>
          </div>
          <div class="form-group">
            <label class="form-label">イベント名</label>
            <input class="form-input" type="text" id="event-name" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">説明（任意）</label>
          <textarea class="form-textarea" id="event-desc" rows="2"></textarea>
        </div>
        <div class="enemy-form-grid">
          <div class="form-group">
            <label class="form-label">投稿開始日時（任意）</label>
            <input class="form-input" type="datetime-local" id="event-start">
          </div>
          <div class="form-group">
            <label class="form-label">投稿終了日時（任意）</label>
            <input class="form-input" type="datetime-local" id="event-end">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">作成</button>
      </form>
      <div id="create-event-alert" style="margin-top:12px"></div>
    </div>

    <div class="card">
      <div class="section-title">イベント一覧</div>
      <div id="event-list">
        <div class="loading"><div class="spinner"></div>読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- 装備管理 -->
  <div class="tab-content" id="tab-titles">
    <div class="card" style="margin-bottom:24px">
      <div class="section-title">称号を追加</div>
      <div id="title-create-alert" style="margin-bottom:12px"></div>
      <div class="enemy-form-grid">
        <div class="form-group">
          <label class="form-label">称号名</label>
          <input class="form-input" type="text" id="title-name" placeholder="例: 猛者">
        </div>
        <div class="form-group">
          <label class="form-label">価格（pt）※空欄=ランク賞のみ</label>
          <input class="form-input" type="number" id="title-cost" min="1" placeholder="例: 100">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">説明（任意）</label>
        <input class="form-input" type="text" id="title-desc">
      </div>
      <button class="btn btn-primary" onclick="createTitle()">追加する</button>
    </div>
    <div class="card" style="margin-bottom:24px">
      <div class="section-title">ユーザーに称号を付与</div>
      <div id="grant-title-alert" style="margin-bottom:12px"></div>
      <div class="enemy-form-grid">
        <div class="form-group">
          <label class="form-label">対象ユーザー</label>
          <select class="form-input" id="grant-title-user"></select>
        </div>
        <div class="form-group">
          <label class="form-label">称号</label>
          <select class="form-input" id="grant-title-id"></select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="grantTitleToUser()">付与する</button>
    </div>
    <div class="card">
      <div class="section-title">称号一覧</div>
      <div id="title-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <div class="card" style="margin-top:24px;margin-bottom:24px">
      <div class="section-title">フレームを追加</div>
      <div id="frame-create-alert" style="margin-bottom:12px"></div>
      <div class="enemy-form-grid">
        <div class="form-group">
          <label class="form-label">フレーム名</label>
          <input class="form-input" type="text" id="frame-name" placeholder="例: ゴールドフレーム">
        </div>
        <div class="form-group">
          <label class="form-label">価格（pt）</label>
          <input class="form-input" type="number" id="frame-cost" min="1" placeholder="例: 200">
        </div>
      </div>
      <div class="enemy-form-grid">
        <div class="form-group">
          <label class="form-label">スタイル</label>
          <select class="form-input" id="frame-class">
            <option value="frame-gold">ゴールド</option>
            <option value="frame-silver">シルバー</option>
            <option value="frame-neon-blue">ネオンブルー</option>
            <option value="frame-neon-pink">ネオンピンク</option>
            <option value="frame-fire">ファイア</option>
            <option value="frame-rainbow">レインボー</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">説明（任意）</label>
          <input class="form-input" type="text" id="frame-desc">
        </div>
      </div>
      <button class="btn btn-primary" onclick="createFrame()">追加する</button>
    </div>
    <div class="card">
      <div class="section-title">フレーム一覧</div>
      <div id="frame-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- ユーザー管理 -->
  <div class="tab-content" id="tab-users">
    <div class="card">
      <div class="section-title">ユーザー一覧</div>
      <div id="users-alert" style="margin-bottom:12px"></div>
      <div id="users-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- 設定 -->
  <div class="tab-content" id="tab-settings">
    <div class="card" style="margin-bottom:16px">
      <div class="section-title">バージョン表示</div>
      <div id="version-alert" style="margin-bottom:12px"></div>
      <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
          <div style="display:flex;align-items:center;gap:6px">
            <button class="btn btn-secondary btn-sm" onclick="changeVer(0,-1)">－</button>
            <span id="ver0" style="min-width:28px;text-align:center;font-size:1.1rem;font-weight:bold">0</span>
            <button class="btn btn-secondary btn-sm" onclick="changeVer(0,1)">＋</button>
          </div>
          <button class="btn btn-sm" style="font-size:0.7rem;padding:2px 8px;background:var(--bg-card2);color:var(--text-muted);border:1px solid var(--border)" onclick="resetVer(0)">0に戻す</button>
        </div>
        <span style="color:var(--text-muted);font-size:1.2rem">.</span>
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
          <div style="display:flex;align-items:center;gap:6px">
            <button class="btn btn-secondary btn-sm" onclick="changeVer(1,-1)">－</button>
            <span id="ver1" style="min-width:28px;text-align:center;font-size:1.1rem;font-weight:bold">00</span>
            <button class="btn btn-secondary btn-sm" onclick="changeVer(1,1)">＋</button>
          </div>
          <button class="btn btn-sm" style="font-size:0.7rem;padding:2px 8px;background:var(--bg-card2);color:var(--text-muted);border:1px solid var(--border)" onclick="resetVer(1)">0に戻す</button>
        </div>
        <span style="color:var(--text-muted);font-size:1.2rem">.</span>
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
          <div style="display:flex;align-items:center;gap:6px">
            <button class="btn btn-secondary btn-sm" onclick="changeVer(2,-1)">－</button>
            <span id="ver2" style="min-width:28px;text-align:center;font-size:1.1rem;font-weight:bold">00</span>
            <button class="btn btn-secondary btn-sm" onclick="changeVer(2,1)">＋</button>
          </div>
          <button class="btn btn-sm" style="font-size:0.7rem;padding:2px 8px;background:var(--bg-card2);color:var(--text-muted);border:1px solid var(--border)" onclick="resetVer(2)">0に戻す</button>
        </div>
        <button class="btn btn-primary btn-sm" onclick="saveVersion()">保存</button>
      </div>
      <p style="font-size:0.8rem;color:var(--text-muted);margin-top:10px">
        トップページのタイトル下に表示されるバージョン番号を設定します。
      </p>
    </div>
    <div class="card">
      <div class="section-title">通知設定</div>
      <div id="settings-alert" style="margin-bottom:12px"></div>
      <label style="display:flex;align-items:center;gap:12px;cursor:pointer">
        <input type="checkbox" id="notify-toggle" onchange="saveNotifySetting()" style="width:18px;height:18px">
        <span>スコアが投稿されたらメールで通知する</span>
      </label>
      <p style="font-size:0.8rem;color:var(--text-muted);margin-top:10px">
        送信先: <code id="notify-email-display"></code><br>
        環境変数 <code>ADMIN_NOTIFY_EMAIL</code> / <code>GMAIL_USER</code> / <code>GMAIL_APP_PASSWORD</code> が設定されている場合のみ機能します。
      </p>
    </div>
  </div>

  <!-- 全スコア一覧 -->
  <div class="tab-content" id="tab-all-scores">
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
      <select class="form-select" id="filter-event" style="max-width:260px">
        <option value="">全イベント</option>
      </select>
      <select class="form-select" id="filter-status" style="max-width:160px">
        <option value="">全ステータス</option>
        <option value="pending">承認待ち</option>
        <option value="approved">承認済み</option>
        <option value="rejected">却下</option>
      </select>
      <button class="btn btn-secondary" onclick="loadAllScores()">絞り込み</button>
    </div>
    <div class="card">
      <div id="all-scores-list">
        <div class="loading"><div class="spinner"></div>読み込み中...</div>
      </div>
    </div>
  </div>
</main>

<!-- 敵追加モーダル -->
<div id="enemy-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;overflow-y:auto">
  <div style="max-width:600px;margin:40px auto;padding:16px">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h3 id="enemy-modal-title">敵を追加</h3>
        <button class="btn btn-secondary btn-sm" onclick="closeEnemyModal()">×</button>
      </div>
      <form id="enemy-form">
        <input type="hidden" id="enemy-event-id">
        <input type="hidden" id="enemy-id">
        <div class="enemy-form-grid">
          <div class="form-group">
            <label class="form-label">敵名</label>
            <input class="form-input" type="text" id="enemy-name" required>
          </div>
          <div class="form-group">
            <label class="form-label">表示順</label>
            <input class="form-input" type="number" id="enemy-order" value="0" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">HP</label>
            <input class="form-input" type="number" id="enemy-hp" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">破壊率</label>
            <input class="form-input" type="number" id="enemy-dest" min="0" max="9999" placeholder="例: 100">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">DP / EP の選択</label>
          <div style="display:flex;gap:16px">
            <label style="cursor:pointer"><input type="radio" name="dpep" value="dp" checked> DP</label>
            <label style="cursor:pointer"><input type="radio" name="dpep" value="ep"> EP</label>
          </div>
        </div>
        <div class="enemy-form-grid">
          <div class="form-group" id="dp-group">
            <label class="form-label">DP</label>
            <input class="form-input" type="number" id="enemy-dp" min="0">
          </div>
          <div class="form-group" id="ep-group" style="display:none">
            <label class="form-label">EP</label>
            <input class="form-input" type="number" id="enemy-ep" min="0">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">弱点属性（任意・複数選択可）</label>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">
            <label style="cursor:pointer"><input type="checkbox" name="weak-attr" value="火"> 火</label>
            <label style="cursor:pointer"><input type="checkbox" name="weak-attr" value="氷"> 氷</label>
            <label style="cursor:pointer"><input type="checkbox" name="weak-attr" value="雷"> 雷</label>
            <label style="cursor:pointer"><input type="checkbox" name="weak-attr" value="光"> 光</label>
            <label style="cursor:pointer"><input type="checkbox" name="weak-attr" value="闇"> 闇</label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">敵画像（任意）</label>
          <input class="form-input" type="file" id="enemy-img" accept="image/*" style="padding:8px">
        </div>
        <div id="enemy-form-alert" style="margin-top:12px"></div>
        <button type="submit" class="btn btn-primary" id="enemy-submit-btn">追加する</button>
      </form>
    </div>
  </div>
</div>

<!-- イベント編集モーダル -->
<div id="event-edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;overflow-y:auto">
  <div style="max-width:500px;margin:40px auto;padding:16px">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h3>イベント編集</h3>
        <button class="btn btn-secondary btn-sm" onclick="closeEventEditModal()">×</button>
      </div>
      <form id="event-edit-form">
        <input type="hidden" id="edit-event-id">
        <div class="form-group">
          <label class="form-label">イベント名</label>
          <input class="form-input" type="text" id="edit-event-name" required>
        </div>
        <div class="form-group">
          <label class="form-label">説明（任意）</label>
          <textarea class="form-textarea" id="edit-event-desc" rows="2"></textarea>
        </div>
        <div class="enemy-form-grid">
          <div class="form-group">
            <label class="form-label">投稿開始日時</label>
            <input class="form-input" type="datetime-local" id="edit-event-start">
          </div>
          <div class="form-group">
            <label class="form-label">投稿終了日時</label>
            <input class="form-input" type="datetime-local" id="edit-event-end">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">ルール</label>
          <div id="edit-rules-container"></div>
          <button type="button" class="btn btn-secondary btn-sm" onclick="addEditRule()">+ ルール追加</button>
        </div>
        <div class="form-group">
          <label style="cursor:pointer;display:flex;align-items:center;gap:8px">
            <input type="checkbox" id="edit-event-active">
            <span>ランキングに表示する</span>
          </label>
        </div>
        <div id="event-edit-alert" style="margin-top:12px"></div>
        <button type="submit" class="btn btn-primary">保存する</button>
      </form>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
renderNav();
if (!requireAdmin()) throw new Error('redirect');

let currentEvents = [];

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const tabs = ['pending','events','all-scores','titles','users','settings'];
    b.classList.toggle('active', tabs[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'pending') loadPending();
  if (name === 'events') loadEvents();
  if (name === 'all-scores') { loadAllScores(); populateEventFilter(); }
  if (name === 'titles') { loadTitles(); loadGrantTitleSelectors(); loadFrames(); }
  if (name === 'users') loadUsers();
  if (name === 'settings') loadSettings();
}

// DP/EP切り替え
document.querySelectorAll('input[name="dpep"]').forEach(r => {
  r.addEventListener('change', () => {
    const isEp = document.querySelector('input[name="dpep"]:checked').value === 'ep';
    document.getElementById('dp-group').style.display = isEp ? 'none' : '';
    document.getElementById('ep-group').style.display = isEp ? '' : 'none';
  });
});

// ===== 承認待ち =====
async function loadPending() {
  const el = document.getElementById('pending-list');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';
  try {
    const items = await apiFetch('/admin/pending');
    document.getElementById('pending-count').textContent = items.length > 0 ? `(${items.length})` : '';

    if (items.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✅</div><p>承認待ちのスコアはありません</p></div>';
      return;
    }

    el.innerHTML = items.map(item => `
      <div class="pending-item" id="pending-${item.id}">
        <div class="pending-info">
          <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:4px">
            第${item.event_number}回 ${escHtml(item.event_name)}
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
            ${attrBadge(item.attribute)}
            <a href="/user.html?id=${item.user_id}" target="_blank" style="font-weight:bold">${escHtml(item.username)}</a>
            ${item.is_duplicate ? `<span style="background:#f39c12;color:#000;font-size:0.72rem;font-weight:bold;padding:2px 7px;border-radius:4px;letter-spacing:.03em">⚠ 既存スコアと一致</span>` : ''}
          </div>
          <div class="pending-score">${formatScore(item.pending_score)}</div>
          ${item.approved_score ? `<div style="font-size:0.8rem;color:var(--text-muted);margin-top:2px">現在の承認済み: ${formatScore(item.approved_score)}</div>` : ''}
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">${formatDate(item.updated_at)}</div>
          <div style="margin-top:8px">
            <input class="form-input" type="text" placeholder="却下理由（任意）" id="note-${item.id}" style="font-size:0.85rem">
          </div>
        </div>
        ${item.pending_image_url
          ? `<div class="pending-img-wrap">
               <img src="${escHtml(item.pending_image_url)}" alt="リザルト" style="cursor:pointer" onclick="window.open('${escHtml(item.pending_image_url)}','_blank')">
             </div>` : ''}
        <div class="pending-actions">
          <button class="btn btn-success btn-sm" onclick="approveScore(${item.id})">承認</button>
          <button class="btn btn-danger btn-sm" onclick="rejectScore(${item.id})">却下</button>
        </div>
      </div>`).join('');
  } catch (err) {

// ===== イベント編集モーダル =====
function toLocalDatetime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

let editRulesCount = 0;

function addEditRule(text = '') {
  editRulesCount++;
  const id = `edit-rule-${editRulesCount}`;
  const div = document.createElement('div');
  div.className = 'rule-item';
  div.id = `edit-rule-wrap-${editRulesCount}`;
  div.innerHTML = `
    <input class="form-input" type="text" id="${id}" value="${escHtml(text)}" placeholder="ルール内容">
    <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('edit-rule-wrap-${editRulesCount}').remove()">×</button>
  `;
  document.getElementById('edit-rules-container').appendChild(div);
}

async function openEditEvent(id) {
  const e = currentEvents.find(ev => ev.id === id);
  if (!e) return;
  document.getElementById('edit-event-id').value = e.id;
  document.getElementById('edit-event-name').value = e.name;
  document.getElementById('edit-event-desc').value = e.description || '';
  document.getElementById('edit-event-start').value = toLocalDatetime(e.submission_start);
  document.getElementById('edit-event-end').value = toLocalDatetime(e.submission_end);
  document.getElementById('edit-event-active').checked = e.is_active !== false;
  document.getElementById('event-edit-alert').innerHTML = '';
  document.getElementById('edit-rules-container').innerHTML = '';
  editRulesCount = 0;

  // 既存ルールを読み込む
  try {
    const detail = await apiFetch(`/events/${id}`);
    (detail.rules || []).forEach(r => addEditRule(r.rule_text));
  } catch {}
  if (document.getElementById('edit-rules-container').children.length === 0) addEditRule();

  document.getElementById('event-edit-modal').style.display = '';
}

function closeEventEditModal() {
  document.getElementById('event-edit-modal').style.display = 'none';
}

document.getElementById('event-edit-form').addEventListener('submit', async e => {
  e.preventDefault();
  const id = document.getElementById('edit-event-id').value;

  alertEl.innerHTML = '';
  try {

    const rules = [...document.querySelectorAll('#edit-rules-container input[type="text"]')]
      .map(i => i.value).filter(v => v.trim());
    await apiFetch(`/admin/events/${id}`, {

}

async function deleteUser(id, name) {
  if (!confirm(`「${name}」を削除しますか？スコアや称号履歴も全て削除されます。`)) return;
  try {
    const res = await apiFetch(`/admin/users/${id}`, { method: 'DELETE' });
    showAlert('#users-alert', res.message, 'success');
    loadUsers();
  } catch (err) {
    showAlert('#users-alert', err.message);
  }
}

// ===== フレーム管理 =====
const FRAME_LABELS = { 'frame-gold':'ゴールド','frame-silver':'シルバー','frame-neon-blue':'ネオンブルー','frame-neon-pink':'ネオンピンク','frame-fire':'ファイア','frame-rainbow':'レインボー' };

async function loadFrames() {
  const el = document.getElementById('frame-list');
  try {
    const frames = await apiFetch('/admin/frames');
    if (frames.length === 0) { el.innerHTML = '<div class="empty-state"><p>フレームがありません</p></div>'; return; }
    el.innerHTML = frames.map(f => `
      <div class="event-list-item">
        <div>
          <strong>${escHtml(f.name)}</strong>
          <span style="font-size:0.8rem;color:var(--accent);margin-left:8px">${f.point_cost}pt</span>
          <span style="font-size:0.8rem;color:var(--text-muted);margin-left:8px">${FRAME_LABELS[f.css_class] || f.css_class}</span>
          ${!f.is_active ? '<span class="status-badge status-rejected" style="margin-left:8px">非表示</span>' : ''}
          ${f.description ? `<div style="font-size:0.8rem;color:var(--text-muted);margin-top:2px">${escHtml(f.description)}</div>` : ''}
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="toggleFrameVisibility(${f.id},${!f.is_active})">${f.is_active ? '非表示' : '表示'}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteFrame(${f.id})">削除</button>
        </div>
      </div>`).join('');
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

async function createFrame() {
  const name = document.getElementById('frame-name').value.trim();
  const cost = document.getElementById('frame-cost').value;
  const css_class = document.getElementById('frame-class').value;
  const desc = document.getElementById('frame-desc').value.trim();
  if (!name || !cost) return showAlert('#frame-create-alert', '名前と価格は必須です');
  try {
    await apiFetch('/admin/frames', { method: 'POST', body: JSON.stringify({ name, description: desc, point_cost: parseInt(cost), css_class }) });
    document.getElementById('frame-name').value = '';
    document.getElementById('frame-cost').value = '';
    document.getElementById('frame-desc').value = '';
    showAlert('#frame-create-alert', '追加しました', 'success');
    loadFrames();
  } catch (err) { showAlert('#frame-create-alert', err.message); }
}

async function toggleFrameVisibility(id, makeActive) {
  try {
    const res = await apiFetch(`/admin/frames/${id}/visibility`, { method: 'PATCH', body: JSON.stringify({ is_active: makeActive }) });
    showAlert('#alert', res.message, 'success');
    loadFrames();
  } catch (err) { showAlert('#alert', err.message); }
}

async function deleteFrame(id) {
  if (!confirm('このフレームを削除しますか？所持ユーザーからも削除されます。')) return;
  try {
    await apiFetch(`/admin/frames/${id}`, { method: 'DELETE' });
    loadFrames();
  } catch (err) { showAlert('#alert', err.message); }
}

// ===== 設定 =====
async function loadSettings() {
  try {
    const s = await apiFetch('/admin/settings');
    document.getElementById('notify-toggle').checked = s.notify_on_submit;
    document.getElementById('notify-email-display').textContent = s.notify_email || '（環境変数で設定）';
    setVersionFields(s.app_version || '4.00.65');
  } catch (err) {
    showAlert('#settings-alert', err.message);
  }
}

let verNums = [4, 0, 65];

function setVersionFields(str) {
  const parts = String(str).split('.');
  verNums = [
    parseInt(parts[0]) || 0,
    parseInt(parts[1]) || 0,
    parseInt(parts[2]) || 0
  ];
  renderVersionFields();
}

function renderVersionFields() {
  document.getElementById('ver0').textContent = verNums[0];
  document.getElementById('ver1').textContent = String(verNums[1]).padStart(2, '0');
  document.getElementById('ver2').textContent = String(verNums[2]).padStart(2, '0');
}

function changeVer(idx, delta) {
  verNums[idx] = Math.max(0, verNums[idx] + delta);
  renderVersionFields();
}

function resetVer(idx) {
  const labels = ['第1', '第2', '第3'];
  if (!confirm(`${labels[idx]}の数字を 0 に戻しますか？`)) return;
  verNums[idx] = 0;
  renderVersionFields();
}

async function saveVersion() {
  const v = `${verNums[0]}.${String(verNums[1]).padStart(2,'0')}.${String(verNums[2]).padStart(2,'0')}`;
  try {
    await apiFetch('/admin/settings', { method: 'PUT', body: JSON.stringify({ app_version: v }) });
    showAlert('#version-alert', `バージョンを ${v} に更新しました`, 'success');
  } catch (err) {
    showAlert('#version-alert', err.message);
  }
}

async function saveNotifySetting() {
  const enabled = document.getElementById('notify-toggle').checked;
  try {
    await apiFetch('/admin/settings', {
      method: 'PUT',
      body: JSON.stringify({ notify_on_submit: enabled })
    });
    showAlert('#settings-alert', enabled ? '通知をオンにしました' : '通知をオフにしました', 'success');
  } catch (err) {
    showAlert('#settings-alert', err.message);
  }
}

// 初期ロード
loadPending();
</script>
