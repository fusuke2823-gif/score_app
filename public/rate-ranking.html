<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レートランキング - HBR</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.scope-toggle {
  display: inline-flex;
  border: 1px solid var(--accent);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 16px;
}
.scope-toggle button {
  padding: 6px 20px;
  font-size: 0.85rem;
  background: var(--bg-card);
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-weight: bold;
  transition: background 0.15s, color 0.15s;
}
.scope-toggle button.active { background: var(--accent); color: #fff; }

.my-rate-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px 18px;
  margin-bottom: 16px;
}
.my-rate-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 2px; }
.my-rate-name { font-weight: bold; font-size: 0.95rem; }
.rate-rank-badge { font-weight: bold; font-size: 1.1rem; min-width: 36px; text-align: center; }
.rate-rank-badge.rank-X  { color: #f0c040; }
.rate-rank-badge.rank-Ex { color: #a855f7; }
.rate-val { font-size: 1.4rem; font-weight: bold; }

.rank-X  { color: #f0c040; }
.rank-Ex { color: #a855f7; }
.rate-score { font-size: 0.95rem; font-weight: bold; text-align: right; }
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <a href="/index.html" class="back-link" data-i18n="rate.back">← トップ</a>
  <h2 class="page-title" style="margin-bottom:4px" data-i18n="rate.title">レートランキング</h2>
  <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:16px" data-i18n="rate.subtitle">X・Exランクユーザーのレート順</p>

  <div id="scope-area"></div>
  <div id="my-rate-area"></div>

  <div class="card">
    <div id="rate-ranking-content">
      <div class="loading"><div class="spinner"></div><span data-i18n="loading">読み込み中...</span></div>
    </div>
  </div>
</main>

<script src="/js/common.js"></script>
<script>
renderNav();
applyI18n();

const me = getUser();
let currentScope = 'external';

function renderScopeToggle(showInternal) {
  const area = document.getElementById('scope-area');
  if (!showInternal) { area.innerHTML = ''; return; }
  area.innerHTML = `
    <div class="scope-toggle">
      <button id="scope-ext" onclick="setScope('external')" class="${currentScope === 'external' ? 'active' : ''}">${t('rate.scope_ext')}</button>
      <button id="scope-int" onclick="setScope('internal')" class="${currentScope === 'internal' ? 'active' : ''}">${t('rate.scope_int')}</button>
    </div>`;
}

function setScope(s) {
  currentScope = s;
  document.querySelectorAll('.scope-toggle button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(s === 'internal' ? 'scope-int' : 'scope-ext');
  if (btn) btn.classList.add('active');
  load();
}

function renderMyCard(rows) {
  const area = document.getElementById('my-rate-area');
  if (!me) { area.innerHTML = ''; return; }
  const my = rows.find(r => String(r.id) === String(me.id));
  if (!my) { area.innerHTML = ''; return; }
  const rateDisp = my.x_rate != null ? Math.floor(my.x_rate) : '-';
  const exStr = my.comp_rank === 'Ex' && my.ex_rank != null ? `<span style="font-size:1.2rem;font-weight:700;color:#a855f7">${my.ex_rank}位</span>` : '';
  area.innerHTML = `
    <div class="my-rate-card">
      <div style="font-size:0.72rem;color:var(--text-muted);margin-bottom:8px">${t('rate.my_label')}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
        <span style="font-weight:bold;font-size:1.1rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(my.username)}</span>
        <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
          <img src="/img/rank_${my.comp_rank.toLowerCase()}.png" style="width:72px;height:72px;object-fit:contain" alt="${my.comp_rank}">
          ${exStr}
          <span style="font-size:2rem;font-weight:bold">${rateDisp}</span>
        </div>
      </div>
    </div>`;
}

function renderTable(rows) {
  if (rows.length === 0) {
    return `<div class="empty-state"><div class="empty-state-icon">📊</div><p>${t('rate.empty')}</p></div>`;
  }
  const meId = me ? me.id : null;
  const rowsHtml = rows.map((r, i) => {
    const pos = i + 1;
    const isSelf = meId && r.id === meId;
    const rateDisp = r.x_rate != null ? Math.floor(r.x_rate) : '-';
    const fc = r.equipped_frame || '';
    const fr = fc ? `has-frame ${fc}` : '';
    const rankLabel = `<span style="display:inline-flex;align-items:center;gap:4px">
      <img src="/img/rank_${r.comp_rank.toLowerCase()}.png" style="width:28px;height:28px;object-fit:contain" alt="${r.comp_rank}">
      ${r.comp_rank === 'Ex' && r.ex_rank != null ? `<span style="font-weight:700;font-size:0.9rem;color:#a855f7">${r.ex_rank}位</span>` : ''}
    </span>`;
    const avatarInner = r.equipped_icon_url
      ? `<img src="${escHtml(r.equipped_icon_url)}" alt="${escHtml(r.username)}" style="width:100%;height:100%;object-fit:cover;border-radius:20%" class="${r.equipped_icon_rarity ? `icon-rarity-${escHtml(r.equipped_icon_rarity)}` : ''}">`
      : escHtml(r.username.charAt(0));
    return `
      <tr class="${fr}${isSelf ? ' is-me' : ''}">
        <td><span class="rank-num">${pos}</span></td>
        <td class="col-avatar"><a class="rank-avatar" href="/user.html?id=${r.id}">${avatarInner}</a></td>
        <td class="${fc ? 'frame-name' : ''}" style="text-align:center"><a href="/user.html?id=${r.id}" style="color:var(--text-primary);text-decoration:none;font-weight:bold">${escHtml(r.username)}</a></td>
        <td style="text-align:center">${rankLabel}</td>
        <td class="rate-score"><span class="score-val">${rateDisp}</span></td>
      </tr>`;
  }).join('');
  return `
    <table class="ranking-table">
      <thead>
        <tr>
          <th>${t('ranking.th_rank')}</th>
          <th class="col-avatar"></th>
          <th>${t('rate.th_player')}</th>
          <th style="text-align:center">${t('rate.th_rank')}</th>
          <th style="text-align:right">${t('rate.th_rate')}</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
}

async function load() {
  const el = document.getElementById('rate-ranking-content');
  el.innerHTML = `<div class="loading"><div class="spinner"></div><span>${t('loading')}</span></div>`;
  try {
    const rows = await apiFetch(`/users/rate-ranking?scope=${currentScope}`);
    renderMyCard(rows);
    el.innerHTML = renderTable(rows);
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

async function init() {
  let isInternal = false;
  if (me) {
    try {
      const meData = await apiFetch('/auth/me');
      isInternal = !!(meData && meData.is_internal);
    } catch {}
  }
  if (isInternal) currentScope = 'internal';
  renderScopeToggle(isInternal);
  load();
}

init();
</script>
</body>
</html>
