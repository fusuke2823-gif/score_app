<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お便り箱 - HBR</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav id="nav"></nav>
<main>
  <h1 class="page-title">お便り箱</h1>
  <p class="page-subtitle">機能要望・バグ報告・その他ご意見をお送りください</p>
  <div style="max-width:520px;margin:0 auto">
    <div id="alert"></div>
    <div class="card">
      <div class="form-group">
        <label class="form-label">カテゴリ</label>
        <select class="form-select" id="category">
          <option value="機能要望">機能要望</option>
          <option value="バグ報告">バグ報告</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">内容</label>
        <textarea class="form-input" id="body" rows="6" maxlength="1000" placeholder="ご意見・ご要望をご記入ください（1000文字以内）" style="resize:vertical"></textarea>
        <div class="form-hint"><span id="char-count">0</span> / 1000文字</div>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="submitFeedback()" id="submit-btn">送信する</button>
    </div>
    <p style="font-size:0.78rem;color:var(--text-muted);margin-top:12px;text-align:center">送信内容はユーザー名と共に管理者のみ確認できます</p>

    <h2 style="font-size:1rem;font-weight:bold;margin:28px 0 12px">送信済みのお便り</h2>
    <div id="my-feedback-list"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</main>
<script src="/js/common.js"></script>
<script>
renderNav();
if (!requireLogin()) throw new Error('redirect');

document.getElementById('body').addEventListener('input', function() {
  document.getElementById('char-count').textContent = this.value.length;
});

async function submitFeedback() {
  const category = document.getElementById('category').value;
  const body = document.getElementById('body').value.trim();
  if (!body) return showAlert('#alert', '内容を入力してください');
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';
  try {
    const res = await apiFetch('/feedback', {
      method: 'POST',
      body: JSON.stringify({ category, body })
    });
    showAlert('#alert', res.message, 'success');
    document.getElementById('body').value = '';
    document.getElementById('char-count').textContent = '0';
    loadMyFeedback();
  } catch (err) {
    showAlert('#alert', err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '送信する';
  }
}

const CAT_COLORS = { '機能要望': '#4fc3f7', 'バグ報告': '#ef5350', 'その他': '#9e9e9e' };

async function loadMyFeedback() {
  const el = document.getElementById('my-feedback-list');
  try {
    const list = await apiFetch('/feedback/my');
    // 未読返信を既読にする
    if (list.some(f => f.reply && !f.reply_read)) {
      apiFetch('/feedback/mark-replies-read', { method: 'PATCH' });
    }
    if (list.length === 0) {
      el.innerHTML = '<div style="color:var(--text-muted);font-size:0.88rem">まだ送信したお便りはありません</div>';
      return;
    }
    el.innerHTML = list.map(f => `
      <div style="border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
          <span style="font-size:0.72rem;font-weight:bold;padding:2px 8px;border-radius:4px;background:${CAT_COLORS[f.category] || '#9e9e9e'}22;color:${CAT_COLORS[f.category] || '#9e9e9e'}">${escHtml(f.category)}</span>
          <span style="font-size:0.72rem;color:var(--text-muted)">${new Date(f.created_at).toLocaleString('ja-JP')}</span>
          ${f.reply ? '<span style="font-size:0.72rem;font-weight:bold;color:var(--accent)">返信あり</span>' : ''}
        </div>
        <div style="font-size:0.88rem;white-space:pre-wrap;word-break:break-all;color:var(--text-muted)">${escHtml(f.body)}</div>
        ${f.reply ? `
        <div style="margin-top:10px;padding:8px 12px;border-left:3px solid var(--accent);background:var(--bg-primary);border-radius:0 6px 6px 0">
          <div style="font-size:0.7rem;color:var(--accent);margin-bottom:3px">管理者の返信 · ${new Date(f.replied_at).toLocaleString('ja-JP')}</div>
          <div style="font-size:0.85rem;white-space:pre-wrap;word-break:break-all">${escHtml(f.reply)}</div>
        </div>` : ''}
      </div>`).join('');
  } catch (err) {
    el.innerHTML = `<div style="color:var(--error);font-size:0.88rem">${escHtml(err.message)}</div>`;
  }
}

loadMyFeedback();
</script>
</body>
</html>
