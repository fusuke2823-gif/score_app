<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ランキング - HBR</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav id="nav"></nav>
<main>
  <div id="event-header"></div>
  <div id="alert"></div>

  <!-- 敵情報 -->
  <div id="enemy-section"></div>

  <!-- 属性フィルター -->
  <div id="filter-section" style="display:none;position:sticky;top:56px;z-index:50;background:var(--bg-primary);padding:8px 0;margin:0 -24px;padding-left:24px;padding-right:24px;border-bottom:1px solid var(--border)">
    <div id="filter-title-row" style="display:none;font-size:0.9rem;font-weight:bold;color:var(--text);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap">
      <div id="scope-toggle" style="display:none;gap:0;border:1px solid var(--accent);border-radius:8px;overflow:hidden">
        <button id="scope-btn-internal" onclick="setScope('internal')" style="padding:4px 10px;font-size:0.78rem;background:var(--accent);color:#fff;font-weight:bold;border:none;cursor:pointer" data-i18n="scope.internal">内部</button>
        <button id="scope-btn-public" onclick="setScope('public')" style="padding:4px 10px;font-size:0.78rem;background:var(--bg-card);color:var(--text-muted);border:none;cursor:pointer" data-i18n="scope.public">外部</button>
      </div>
      <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="goSubmit()" data-i18n="ranking.submit_btn">スコア投稿</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
      <button class="attr-btn" onclick="selectAllAttrs()" style="color:#e8e8e8;border-color:#e8e8e8;opacity:1" data-i18n="ranking.all_on">全属性ON</button>
      <button class="attr-btn" onclick="deselectAllAttrs()" style="color:#e8e8e8;border-color:#e8e8e8;opacity:1" data-i18n="ranking.all_off">全属性OFF</button>
    </div>
    <div class="attr-filter" id="attr-filter" style="margin-bottom:4px">
      <button class="attr-btn attr-火 active" data-attr="火" data-i18n="attr.火">火</button>
      <button class="attr-btn attr-氷 active" data-attr="氷" data-i18n="attr.氷">氷</button>
      <button class="attr-btn attr-雷 active" data-attr="雷" data-i18n="attr.雷">雷</button>
      <button class="attr-btn attr-光 active" data-attr="光" data-i18n="attr.光">光</button>
      <button class="attr-btn attr-闇 active" data-attr="闇" data-i18n="attr.闇">闇</button>
      <button class="attr-btn attr-無 active" data-attr="無" data-i18n="attr.無">無</button>
    </div>
  </div>

  <!-- ランキング -->
  <div class="card">
    <div id="col-toggle">
      <button class="active" onclick="setColMode('score')" data-i18n="ranking.col_score">スコア</button>
      <button onclick="setColMode('title')" data-i18n="ranking.col_title">称号</button>
      <button onclick="setColMode('rank')">ランク</button>
    </div>
    <div id="ranking-updated" style="font-size:0.75rem;color:var(--text-muted);text-align:right;margin-bottom:4px"></div>
    <div id="ranking-content">
      <div class="loading"><div class="spinner"></div><span data-i18n="loading">読み込み中...</span></div>
    </div>
  </div>
</main>

<style>
.section-toggle-btn {
  display:flex; justify-content:space-between; align-items:center;
  width:100%; background:none; border:none; border-bottom:1px solid var(--border);
  padding:10px 4px; cursor:pointer; font-size:0.9rem; font-weight:bold;
  color:var(--text); text-align:left; gap:8px;
}
.section-toggle-btn:hover { color:var(--accent); }
.toggle-arrow { font-size:0.72rem; color:var(--text-muted); transition:transform 0.2s; }
.section-toggle-btn[aria-expanded="true"] .toggle-arrow { transform:rotate(90deg); }
.back-link { color: var(--text-secondary); font-size:0.85rem; margin-bottom:16px; display:inline-block; }
.back-link:hover { color: var(--text-primary); }
.result-thumb { width:40px; height:28px; object-fit:cover; border-radius:3px; cursor:pointer; border:1px solid var(--border); vertical-align:middle; }
.result-thumb.has-yt { border:2px solid #ff4444; }

/* モーダル */
#img-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center; }
#img-modal.open { display:flex; }
#img-modal img { max-width:90vw; max-height:90vh; border-radius:8px; }
#img-modal-close { position:fixed; top:16px; right:20px; background:none; border:none; color:white; font-size:2rem; cursor:pointer; }
@media (max-width: 640px) {
  .oshi-tag { display: none; }
}
/* 称号列はスマホのみ */
.col-title { display: none; }
/* ランク列: PCは常時表示、スマホはトグル */
.col-rank  { display: table-cell; }
@media (max-width: 640px) {
  .col-rank { display: none; }
}
/* スマホ表示切替 */
#col-toggle { display:none; }
.rank-C  { color:#aaa; }
.rank-B  { color:#5cb85c; }
.rank-A  { color:#5b9bd5; }
.rank-S  { color:#e6a028; }
.rank-X  { color:#a855f7; }
.rank-Ex { color:#f0c040; }
@media (max-width: 640px) {
  #col-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    width: fit-content;
  }
  #col-toggle button {
    padding: 5px 14px;
    font-size: 0.8rem;
    background: var(--bg-card);
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
  }
  #col-toggle button.active {
    background: var(--accent);
    color: #fff;
    font-weight: bold;
  }
  .col-title { display: none; }
  .col-rank  { display: none; }
  .ranking-table.show-title .col-score,
  .ranking-table.show-title .col-img { display: none; }
  .ranking-table.show-title .col-title { display: table-cell; }
  .ranking-table.show-rank .col-score,
  .ranking-table.show-rank .col-img { display: none; }
  .ranking-table.show-rank .col-rank { display: table-cell; }
}
</style>

<div id="img-modal">
  <button id="img-modal-close" onclick="closeModal()">×</button>
  <img id="modal-img" src="" alt="">
  <div id="modal-yt" style="display:none;margin-top:12px;text-align:center">
    <div id="modal-yt-score" style="font-size:0.8rem;color:rgba(255,255,255,0.6);margin-bottom:6px"></div>
    <a id="modal-yt-link" href="" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:6px;color:#ff4444;font-size:0.95rem;font-weight:bold;text-decoration:underline">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      <span data-i18n="ranking.yt_watch">YouTube動画を見る</span>
    </a>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
renderNav();
applyI18n();

const eventId = getParam('id');
if (!eventId) location.href = '/index.html';

let selectedAttrs = new Set(ATTRIBUTES);
let _eventData = null;
let _rankingScope = isInternal() ? 'internal' : 'public';

// 内部ユーザーならスコープ切替ボタンを表示
if (isInternal()) {
  document.getElementById('scope-toggle').style.display = 'flex';
}

function setScope(scope) {
  _rankingScope = scope;
  document.getElementById('scope-btn-internal').style.background = scope === 'internal' ? 'var(--accent)' : 'var(--bg-card)';
  document.getElementById('scope-btn-internal').style.color = scope === 'internal' ? '#fff' : 'var(--text-muted)';
  document.getElementById('scope-btn-internal').style.fontWeight = scope === 'internal' ? 'bold' : 'normal';
  document.getElementById('scope-btn-public').style.background = scope === 'public' ? 'var(--accent)' : 'var(--bg-card)';
  document.getElementById('scope-btn-public').style.color = scope === 'public' ? '#fff' : 'var(--text-muted)';
  document.getElementById('scope-btn-public').style.fontWeight = scope === 'public' ? 'bold' : 'normal';
  loadRanking();
}

function updateFilterUI() {
  document.querySelectorAll('#attr-filter .attr-btn').forEach(b => {
    b.classList.toggle('active', selectedAttrs.has(b.dataset.attr));
  });
}

function selectAllAttrs() {
  selectedAttrs = new Set(ATTRIBUTES);
  updateFilterUI();
  loadRanking();
}

function deselectAllAttrs() {
  selectedAttrs = new Set();
  updateFilterUI();
  loadRanking();
}

// 属性フィルターの初期化
document.querySelectorAll('#attr-filter .attr-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const attr = btn.dataset.attr;
    if (selectedAttrs.has(attr)) {
      selectedAttrs.delete(attr);
    } else {
      selectedAttrs.add(attr);
    }
    updateFilterUI();
    loadRanking();
  });
});

// イベント詳細
async function loadEvent() {
  try {
    const event = await apiFetch(`/events/${eventId}`);
    _eventData = event;
    document.title = `${event.name} - HBR`;

    document.getElementById('event-header').innerHTML = `
      <a class="back-link" href="/index.html">${t('event.back')}</a>
      <h1 class="page-title">${escHtml(event.name)}</h1>
      ${event.description ? `<p class="page-subtitle">${escHtml(event.description)}</p>` : ''}
      ${renderSubmissionPeriod(event)}
    `;

    let enemySectionHtml = '';
    if (event.enemies && event.enemies.length > 0) {
      enemySectionHtml += `
        <div class="enemy-section">
          <button class="section-toggle-btn" onclick="toggleSection('enemy-content')" aria-expanded="false">
            <span>${t('ranking.enemies')}</span><span class="toggle-arrow">▶</span>
          </button>
          <div id="enemy-content" style="display:none">
            <div class="enemy-cards">
              ${event.enemies.map(enemy => renderEnemy(enemy)).join('')}
            </div>
          </div>
        </div>`;
    }
    if (event.rules && event.rules.length > 0) {
      enemySectionHtml += `
        <div class="enemy-section" style="margin-top:8px">
          <button class="section-toggle-btn" onclick="toggleSection('rules-content')" aria-expanded="false">
            <span>${t('ranking.rules')}</span><span class="toggle-arrow">▶</span>
          </button>
          <div id="rules-content" style="display:none">
            <ul class="enemy-rules" style="margin:12px 0 0 0;padding-left:20px">
              ${event.rules.map(r => `<li style="margin-bottom:6px">${escHtml(r.rule_text)}</li>`).join('')}
            </ul>
          </div>
        </div>`;
    }
    if (enemySectionHtml) {
      document.getElementById('enemy-section').innerHTML = enemySectionHtml;
    }

    document.getElementById('filter-section').style.display = '';
    initStickyTitle(event.name);
    updateTheadTop();
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

function renderEnemy(enemy) {
  const hpDpEp = enemy.use_ep
    ? `<span class="enemy-stat"><span class="enemy-stat-label">HP</span><span class="enemy-stat-val">${enemy.hp ? Number(enemy.hp).toLocaleString() : '-'}</span></span>
       <span class="enemy-stat"><span class="enemy-stat-label">EP</span><span class="enemy-stat-val">${enemy.ep ? Number(enemy.ep).toLocaleString() : '-'}</span></span>`
    : `<span class="enemy-stat"><span class="enemy-stat-label">HP</span><span class="enemy-stat-val">${enemy.hp ? Number(enemy.hp).toLocaleString() : '-'}</span></span>
       <span class="enemy-stat"><span class="enemy-stat-label">DP</span><span class="enemy-stat-val">${enemy.dp ? Number(enemy.dp).toLocaleString() : '-'}</span></span>`;

  const weakBadges = enemy.weak_attributes
    ? enemy.weak_attributes.split(',').filter(Boolean).map(a => attrBadge(a)).join('')
    : '';

  return `<div class="enemy-card">
    ${enemy.image_url ? `<img class="enemy-img" src="${escHtml(enemy.image_url)}" alt="${escHtml(enemy.name)}">` : ''}
    <div class="enemy-name">${escHtml(enemy.name)}</div>
    <div class="enemy-stats">
      ${hpDpEp}
      ${enemy.destruction_rate != null ? `<span class="enemy-stat"><span class="enemy-stat-label">破壊率</span><span class="enemy-stat-val">${enemy.destruction_rate}%</span></span>` : ''}
    </div>
    ${weakBadges ? `<div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap"><span style="font-size:0.75rem;color:var(--text-muted);margin-right:2px">${t('ranking.weak')}</span>${weakBadges}</div>` : ''}
  </div>`;
}

// ランキング
async function loadRanking() {
  const rankEl = document.getElementById('ranking-content');
  rankEl.innerHTML = `<div class="loading"><div class="spinner"></div>${t('loading')}</div>`;

  try {
    const attrs = [...selectedAttrs].join(',');
    const ranking = await apiFetch(`/events/${eventId}/ranking?attributes=${encodeURIComponent(attrs)}&scope=${_rankingScope}`);
    const updatedEl = document.getElementById('ranking-updated');
    if (ranking.length > 0 && ranking[0].last_updated_at) {
      updatedEl.textContent = t('ranking.last_updated') + new Date(ranking[0].last_updated_at).toLocaleString(getLangLocale(), { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    } else {
      updatedEl.textContent = '';
    }

    if (ranking.length === 0) {
      rankEl.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">📊</div>
        <p>${t('ranking.empty')}</p>
      </div>`;
      return;
    }

    rankEl.innerHTML = `
      <table class="ranking-table">
        <thead>
          <tr>
            <th>${t('ranking.th_rank')}</th>
            <th>${t('ranking.th_attr')}</th>
            <th class="col-avatar"></th>
            <th>${t('ranking.th_player')}</th>
            <th class="col-score" style="text-align:right">${t('ranking.th_score')}</th>
            <th class="col-img"></th>
            <th class="col-title" style="font-size:0.8rem">${t('ranking.th_title')}</th>
            <th class="col-rank" style="font-size:0.8rem">ランク</th>
          </tr>
        </thead>
        <tbody>
          ${(() => { const _me = getUser(); const _isAdmin = _me && _me.role === 'admin'; return ranking.map(r => {
            const fc = r.equipped_frame || '';
            const fr = fc ? `has-frame ${fc}` : '';
            const isSelf = _me && r.user_id === _me.id;
            const showAnon = r.is_anonymous && !isSelf && !_isAdmin;
            return `
            <tr class="rank-${r.rank} ${fr}">
              <td><span class="rank-num">${r.rank}</span></td>
              <td class="${fc ? 'frame-start' : ''}">${attrBadge(r.attribute)}</td>
              <td class="col-avatar">${showAnon ? `<span class="rank-avatar" style="display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:#e8e8e8">${t('ranking.anonymous').charAt(0)}</span>` : `<a class="rank-avatar" href="/user.html?id=${r.user_id}">${r.equipped_icon_url ? `<img src="${escHtml(r.equipped_icon_url)}" alt="${escHtml(r.username)}" class="${r.equipped_icon_rarity ? `icon-rarity-${escHtml(r.equipped_icon_rarity)}` : ''}" style="width:100%;height:100%;object-fit:cover;border-radius:20%">` : escHtml(r.username.charAt(0))}</a>`}</td>
              <td class="${fc ? 'frame-name' : ''}">
                ${showAnon ? `<span style="color:#e8e8e8">${t('ranking.anonymous')}</span>` : r.is_anonymous ? `<a href="/user.html?id=${r.user_id}" style="color:#e8e8e8">${escHtml(r.username)}</a>` : `<a href="/user.html?id=${r.user_id}">${escHtml(r.username)}</a>`}
                ${!showAnon && r.equipped_title ? `<span class="oshi-tag title-tooltip-wrap" style="font-size:0.75rem;color:#fff;margin-left:6px">「${escHtml(r.equipped_title)}」${r.equipped_title_desc ? `<span class="title-tooltip">${escHtml(r.equipped_title_desc)}</span>` : ''}</span>` : ''}
              </td>
              <td class="col-score ${fc ? 'frame-score' : ''}" style="text-align:right"><span class="score-val">${formatScore(r.approved_score)}</span></td>
              <td class="col-img img-col ${fc ? 'frame-img' : ''}" style="text-align:center">
                ${r.approved_image_url
                  ? `<img class="result-thumb${r.youtube_url ? ' has-yt' : ''}" src="${escHtml(r.approved_image_url)}" alt="result" onclick="openModal('${escHtml(r.approved_image_url)}','${r.youtube_url ? escHtml(r.youtube_url) : ''}',${r.youtube_score ? r.youtube_score : 'null'})">`
                  : ''}
              </td>
              <td class="col-title ${fc ? 'frame-title' : ''}" style="font-size:0.8rem;color:#fff">${r.equipped_title ? `<span class="title-tooltip-wrap">「${escHtml(r.equipped_title)}」${r.equipped_title_desc ? `<span class="title-tooltip">${escHtml(r.equipped_title_desc)}</span>` : ''}</span>` : '-'}</td>
              <td class="col-rank ${fc ? 'frame-title' : ''}" style="text-align:center">${renderCompRank(r.comp_rank, r.s_rate, r.x_rate, r.ex_rank)}</td>
            </tr>`;
          }).join(''); })()}
        </tbody>
      </table>`;
    updateTheadTop();
  } catch (err) {
    rankEl.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

function setColMode(mode) {
  const table = document.querySelector('.ranking-table');
  if (table) {
    table.classList.toggle('show-title', mode === 'title');
    table.classList.toggle('show-rank', mode === 'rank');
  }
  document.querySelectorAll('#col-toggle button').forEach((b, i) => {
    b.classList.toggle('active', ['score', 'title', 'rank'][i] === mode);
  });
}

function renderCompRank(rank, sRate, xRate, exRank) {
  if (!rank || rank === 'C') return `<span class="rank-C" style="font-weight:bold">C</span>`;
  if (rank === 'B') return `<span class="rank-B" style="font-weight:bold">B</span>`;
  if (rank === 'A') return `<span class="rank-A" style="font-weight:bold">A</span>`;
  const rate = rank === 'S' ? sRate : xRate;
  const rateStr = rate != null ? `<span style="display:block;font-size:0.7rem;font-weight:normal;line-height:1.1">${Math.floor(rate)}</span>` : '';
  if (rank === 'Ex') {
    const exStr = exRank != null ? `${exRank}位` : '';
    return `<span class="rank-Ex" style="font-weight:bold;display:inline-block;line-height:1.2">Ex${exStr}${rateStr}</span>`;
  }
  return `<span class="rank-${rank}" style="font-weight:bold;display:inline-block;line-height:1.2">${rank}${rateStr}</span>`;
}

function openModal(url, ytUrl, ytScore) {
  document.getElementById('modal-img').src = url;
  const ytDiv = document.getElementById('modal-yt');
  const ytLink = document.getElementById('modal-yt-link');
  if (ytUrl) {
    ytLink.href = ytUrl;
    const scoreEl = document.getElementById('modal-yt-score');
    scoreEl.textContent = ytScore ? `動画投稿時のスコア: ${formatScore(ytScore)}` : '';
    ytDiv.style.display = '';
  } else {
    ytDiv.style.display = 'none';
  }
  document.getElementById('img-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('img-modal').classList.remove('open');
}
document.getElementById('img-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// 称号ツールチップ（タップ）
document.addEventListener('click', e => {
  const wrap = e.target.closest('.title-tooltip-wrap');
  document.querySelectorAll('.title-tooltip-wrap.tt-open').forEach(el => {
    if (el !== wrap) el.classList.remove('tt-open');
  });
  if (wrap && wrap.querySelector('.title-tooltip')) {
    wrap.classList.toggle('tt-open');
    e.stopPropagation();
  }
});

function toggleSection(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  const open = el.style.display === 'none';
  el.style.display = open ? '' : 'none';
  btn.setAttribute('aria-expanded', open ? 'true' : 'false');
}

function showRankingToast(msg) {
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:3000;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px 22px;font-size:0.9rem;box-shadow:0 4px 18px rgba(0,0,0,0.5);text-align:center;max-width:90vw;pointer-events:none;white-space:nowrap';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function goSubmit() {
  if (!getUser()) {
    location.href = `/login.html?redirect=${encodeURIComponent(`/submit.html?event_id=${eventId}`)}`;
    return;
  }
  if (_eventData) {
    const now = new Date();
    if (_eventData.submission_start && now < new Date(_eventData.submission_start)) {
      showRankingToast(t('ranking.not_started'));
      return;
    }
    if (_eventData.submission_end && now > new Date(_eventData.submission_end)) {
      showRankingToast(t('ranking.period_ended'));
      return;
    }
  }
  location.href = `/submit.html?event_id=${encodeURIComponent(eventId)}`;
}

function updateTheadTop() {
  requestAnimationFrame(() => {
    const nav = document.querySelector('nav');
    const filter = document.getElementById('filter-section');
    if (!filter || filter.style.display === 'none') return;
    const navH = nav ? nav.getBoundingClientRect().height : 56;
    filter.style.top = navH + 'px';
    const filterH = filter.getBoundingClientRect().height;
    document.querySelectorAll('.ranking-table thead th').forEach(th => {
      th.style.top = (navH + filterH) + 'px';
    });
  });
}

function initStickyTitle(eventName) {
  const titleRow = document.getElementById('filter-title-row');
  if (titleRow) titleRow.textContent = eventName;

  const observer = new IntersectionObserver(([entry]) => {
    const titleRow = document.getElementById('filter-title-row');
    if (!titleRow) return;
    const visible = !entry.isIntersecting;
    titleRow.style.display = visible ? '' : 'none';
    updateTheadTop();
  }, { threshold: 0, rootMargin: '-56px 0px 0px 0px' });

  const header = document.getElementById('event-header');
  if (header) observer.observe(header);
}

window.addEventListener('resize', updateTheadTop);

loadEvent();
updateFilterUI();
loadRanking();
</script>
</body>
