<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ランキング - HBR</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav id="nav"></nav>
<main>
  <div id="event-header"></div>
  <div id="alert"></div>

  <!-- 敵情報 -->
  <div id="enemy-section"></div>

  <!-- 属性フィルター -->
  <div id="filter-section" style="display:none">
    <div class="attr-filter" id="attr-filter">
      <button class="attr-btn attr-btn-all active" data-attr="all">全属性</button>
      <button class="attr-btn attr-火" data-attr="火">火</button>
      <button class="attr-btn attr-氷" data-attr="氷">氷</button>
      <button class="attr-btn attr-雷" data-attr="雷">雷</button>
      <button class="attr-btn attr-光" data-attr="光">光</button>
      <button class="attr-btn attr-闇" data-attr="闇">闇</button>
      <button class="attr-btn attr-無" data-attr="無">無</button>
    </div>
  </div>

  <!-- ランキング -->
  <div class="card">
    <div id="col-toggle">
      <button class="active" onclick="setColMode('score')">スコア</button>
      <button onclick="setColMode('title')">称号</button>
    </div>
    <div id="ranking-content">
      <div class="loading"><div class="spinner"></div>読み込み中...</div>
    </div>
  </div>
</main>

<style>
.back-link { color: var(--text-secondary); font-size:0.85rem; margin-bottom:16px; display:inline-block; }
.back-link:hover { color: var(--text-primary); }
.result-thumb { width:40px; height:28px; object-fit:cover; border-radius:3px; cursor:pointer; border:1px solid var(--border); vertical-align:middle; }

/* モーダル */
#img-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center; }
#img-modal.open { display:flex; }
#img-modal img { max-width:90vw; max-height:90vh; border-radius:8px; }
#img-modal-close { position:fixed; top:16px; right:20px; background:none; border:none; color:white; font-size:2rem; cursor:pointer; }
@media (max-width: 640px) {
  .oshi-tag { display: none; }
}
/* 称号列はスマホのみ（PC非表示） */
.col-title { display: none; }
/* スマホ表示切替 */
#col-toggle { display:none; }
@media (max-width: 640px) {
  #col-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    width: fit-content;
  }
  #col-toggle button {
    padding: 5px 14px;
    font-size: 0.8rem;
    background: var(--bg-card);
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
  }
  #col-toggle button.active {
    background: var(--accent);
    color: #fff;
    font-weight: bold;
  }
  .col-title { display: none; }
  .ranking-table.show-title .col-score,
  .ranking-table.show-title .col-img { display: none; }
  .ranking-table.show-title .col-title { display: table-cell; }
}
</style>

<div id="img-modal">
  <button id="img-modal-close" onclick="closeModal()">×</button>
  <img id="modal-img" src="" alt="">
</div>

<script src="/js/common.js"></script>
<script>
renderNav();

const eventId = getParam('id');
if (!eventId) location.href = '/index.html';

let selectedAttrs = new Set(ATTRIBUTES);

function updateFilterUI() {
  const isAll = selectedAttrs.size === ATTRIBUTES.length;
  document.querySelectorAll('#attr-filter .attr-btn').forEach(b => {
    const a = b.dataset.attr;
    if (a === 'all') {
      b.classList.toggle('active', isAll);
    } else {
      b.classList.toggle('active', isAll || selectedAttrs.has(a));
    }
  });
}

// 属性フィルターの初期化
document.querySelectorAll('#attr-filter .attr-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const attr = btn.dataset.attr;
    if (attr === 'all') {
      selectedAttrs = new Set(ATTRIBUTES);
    } else {
      if (selectedAttrs.has(attr)) {
        selectedAttrs.delete(attr);
      } else {
        selectedAttrs.add(attr);
      }
      if (selectedAttrs.size === 0) selectedAttrs = new Set(ATTRIBUTES);
    }
    updateFilterUI();
    loadRanking();
  });
});

// イベント詳細
async function loadEvent() {
  try {
    const event = await apiFetch(`/events/${eventId}`);
    document.title = `${event.name} - HBR`;

    document.getElementById('event-header').innerHTML = `
      <a class="back-link" href="/index.html">← イベント一覧</a>
      <h1 class="page-title">${escHtml(event.name)}</h1>
      ${event.description ? `<p class="page-subtitle">${escHtml(event.description)}</p>` : ''}
      ${renderSubmissionPeriod(event)}
    `;

    let enemySectionHtml = '';
    if (event.enemies && event.enemies.length > 0) {
      enemySectionHtml += `
        <div class="enemy-section">
          <div class="enemy-section-title">出現する敵</div>
          <div class="enemy-cards">
            ${event.enemies.map(enemy => renderEnemy(enemy)).join('')}
          </div>
        </div>`;
    }
    if (event.rules && event.rules.length > 0) {
      enemySectionHtml += `
        <div class="enemy-section" style="margin-top:16px">
          <div class="enemy-section-title">イベントルール</div>
          <ul class="enemy-rules" style="margin:12px 0 0 0;padding-left:20px">
            ${event.rules.map(r => `<li style="margin-bottom:6px">${escHtml(r.rule_text)}</li>`).join('')}
          </ul>
        </div>`;
    }
    if (enemySectionHtml) {
      document.getElementById('enemy-section').innerHTML = enemySectionHtml;
    }

    document.getElementById('filter-section').style.display = '';
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

function renderEnemy(enemy) {
  const hpDpEp = enemy.use_ep
    ? `<span class="enemy-stat"><span class="enemy-stat-label">HP</span><span class="enemy-stat-val">${enemy.hp ? Number(enemy.hp).toLocaleString() : '-'}</span></span>
       <span class="enemy-stat"><span class="enemy-stat-label">EP</span><span class="enemy-stat-val">${enemy.ep ? Number(enemy.ep).toLocaleString() : '-'}</span></span>`
    : `<span class="enemy-stat"><span class="enemy-stat-label">HP</span><span class="enemy-stat-val">${enemy.hp ? Number(enemy.hp).toLocaleString() : '-'}</span></span>
       <span class="enemy-stat"><span class="enemy-stat-label">DP</span><span class="enemy-stat-val">${enemy.dp ? Number(enemy.dp).toLocaleString() : '-'}</span></span>`;

  const weakBadges = enemy.weak_attributes
    ? enemy.weak_attributes.split(',').filter(Boolean).map(a => attrBadge(a)).join('')
    : '';

  return `<div class="enemy-card">
    ${enemy.image_url ? `<img class="enemy-img" src="${escHtml(enemy.image_url)}" alt="${escHtml(enemy.name)}">` : ''}
    <div class="enemy-name">${escHtml(enemy.name)}</div>
    <div class="enemy-stats">
      ${hpDpEp}
      ${enemy.destruction_rate ? `<span class="enemy-stat"><span class="enemy-stat-label">破壊率</span><span class="enemy-stat-val">${escHtml(enemy.destruction_rate)}</span></span>` : ''}
    </div>
    ${weakBadges ? `<div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap"><span style="font-size:0.75rem;color:var(--text-muted);margin-right:2px">弱点</span>${weakBadges}</div>` : ''}
  </div>`;
}

// ランキング
async function loadRanking() {
  const rankEl = document.getElementById('ranking-content');
  rankEl.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';

  try {
    const attrs = [...selectedAttrs].join(',');
    const ranking = await apiFetch(`/events/${eventId}/ranking?attributes=${encodeURIComponent(attrs)}`);

    if (ranking.length === 0) {
      rankEl.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">📊</div>
        <p>選択した属性のスコアデータがありません</p>
      </div>`;
      return;
    }

    rankEl.innerHTML = `
      <table class="ranking-table">
        <thead>
          <tr>
            <th>順位</th>
            <th>属性</th>
            <th class="col-avatar"></th>
            <th>プレイヤー</th>
            <th class="col-score" style="text-align:right">スコア</th>
            <th class="col-img"></th>
            <th class="col-title" style="font-size:0.8rem">称号</th>
          </tr>
        </thead>
        <tbody>
          ${(() => { const _me = getUser(); const _isAdmin = _me && _me.role === 'admin'; return ranking.map(r => {
            const fc = r.equipped_frame || '';
            const fr = fc ? `has-frame ${fc}` : '';
            const isSelf = _me && r.user_id === _me.id;
            const showAnon = r.is_anonymous && !isSelf && !_isAdmin;
            return `
            <tr class="rank-${r.rank} ${fr}">
              <td><span class="rank-num">${r.rank}</span></td>
              <td class="${fc ? 'frame-start' : ''}">${attrBadge(r.attribute)}</td>
              <td class="col-avatar">${showAnon ? `<span class="rank-avatar" style="display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:#e8e8e8">匿</span>` : `<a class="rank-avatar" href="/user.html?id=${r.user_id}">${r.equipped_icon_url ? `<img src="${escHtml(r.equipped_icon_url)}" alt="${escHtml(r.username)}" class="${r.equipped_icon_rarity ? `icon-rarity-${escHtml(r.equipped_icon_rarity)}` : ''}" style="width:100%;height:100%;object-fit:cover;border-radius:20%">` : escHtml(r.username.charAt(0))}</a>`}</td>
              <td class="${fc ? 'frame-name' : ''}">
                ${showAnon ? `<span style="color:#e8e8e8">匿名</span>` : r.is_anonymous ? `<a href="/user.html?id=${r.user_id}" style="color:#e8e8e8">${escHtml(r.username)}</a>` : `<a href="/user.html?id=${r.user_id}">${escHtml(r.username)}</a>`}
                ${!showAnon && r.equipped_title ? `<span class="oshi-tag title-tooltip-wrap" style="font-size:0.75rem;color:#fff;margin-left:6px">「${escHtml(r.equipped_title)}」${r.equipped_title_desc ? `<span class="title-tooltip">${escHtml(r.equipped_title_desc)}</span>` : ''}</span>` : ''}
              </td>
              <td class="col-score ${fc ? 'frame-score' : ''}" style="text-align:right"><span class="score-val">${formatScore(r.approved_score)}</span></td>
              <td class="col-img img-col ${fc ? 'frame-img' : ''}" style="text-align:center">
                ${r.approved_image_url
                  ? `<img class="result-thumb" src="${escHtml(r.approved_image_url)}" alt="結果" onclick="openModal('${escHtml(r.approved_image_url)}')">`
                  : ''}
              </td>
              <td class="col-title ${fc ? 'frame-title' : ''}" style="font-size:0.8rem;color:#fff">${r.equipped_title ? `<span class="title-tooltip-wrap">「${escHtml(r.equipped_title)}」${r.equipped_title_desc ? `<span class="title-tooltip">${escHtml(r.equipped_title_desc)}</span>` : ''}</span>` : '-'}</td>
            </tr>`;
          }).join(''); })()}
        </tbody>
      </table>`;
  } catch (err) {
    rankEl.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

function setColMode(mode) {
  const table = document.querySelector('.ranking-table');
  if (table) table.classList.toggle('show-title', mode === 'title');
  document.querySelectorAll('#col-toggle button').forEach((b, i) => {
    b.classList.toggle('active', ['score', 'title'][i] === mode);
  });
}

function openModal(url) {
  document.getElementById('modal-img').src = url;
  document.getElementById('img-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('img-modal').classList.remove('open');
}
document.getElementById('img-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

function renderSubmissionPeriod(event) {
  const start = event.submission_start ? new Date(event.submission_start) : null;
  const end = event.submission_end ? new Date(event.submission_end) : null;
  if (!start && !end) return '<div style="margin-bottom:20px"></div>';
  const now = new Date();
  const fmt = d => d.toLocaleString('ja-JP', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  let label, color;
  if (start && now < start) {
    label = `投稿期間: ${fmt(start)} 〜 ${end ? fmt(end) : ''}（開始前）`;
    color = 'var(--text-muted)';
  } else if (end && now > end) {
    label = `投稿期間: ${fmt(start || '')} 〜 ${fmt(end)}（終了）`;
    color = 'var(--text-muted)';
  } else {
    label = `投稿受付中: 〜 ${end ? fmt(end) : '期限なし'}`;
    color = 'var(--accent)';
  }
  return `<p style="font-size:0.82rem;color:${color};margin-bottom:20px">${label}</p>`;
}

// 称号ツールチップ（タップ）
document.addEventListener('click', e => {
  const wrap = e.target.closest('.title-tooltip-wrap');
  document.querySelectorAll('.title-tooltip-wrap.tt-open').forEach(el => {
    if (el !== wrap) el.classList.remove('tt-open');
  });
  if (wrap && wrap.querySelector('.title-tooltip')) {
    wrap.classList.toggle('tt-open');
    e.stopPropagation();
  }
});

loadEvent();
updateFilterUI();
loadRanking();
</script>
</body>
</html>
