<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ガチャ - HBR</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.gacha-hero { text-align:center; padding:28px 0 8px; }
.gacha-points-display { font-size:1.5rem; font-weight:bold; color:var(--accent); margin-bottom:6px; }
.gacha-pull-btns { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin:20px 0 28px; }
.gacha-btn {
  padding:14px 32px; font-size:1rem; font-weight:bold;
  border-radius:14px; border:none; cursor:pointer;
  transition:transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.gacha-btn:hover:not(:disabled) { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.35); }
.gacha-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; }
.gacha-btn-single { background:var(--accent); color:#fff; }
.gacha-btn-multi { background:linear-gradient(135deg,#ffd700 0%,#ff8c00 100%); color:#000; }
.gacha-btn .gcost { font-size:0.78rem; opacity:0.85; }

/* カードステージ */
.gacha-stage {
  min-height:200px; display:flex; align-items:center; justify-content:center;
  margin-bottom:16px;
}
.gacha-cards { display:flex; flex-wrap:wrap; column-gap:8px; row-gap:36px; justify-content:center; width:calc(5*88px + 4*8px); max-width:100%; margin:0 auto; }

/* カード */
.g-card { width:88px; height:122px; perspective:700px; flex-shrink:0; }
.g-card-inner {
  width:100%; height:100%; position:relative;
  transform-style:preserve-3d;
  transition:transform 0.65s cubic-bezier(.4,2,.55,1);
}
.g-card-inner.flipped { transform:rotateY(180deg); }
.g-card-front, .g-card-back {
  position:absolute; inset:0; backface-visibility:hidden;
  border-radius:10px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px;
}
.g-card-front {
  background:var(--bg-card); border:2px solid var(--border);
  transition: box-shadow 0.4s;
}
.g-card-back { transform:rotateY(180deg); background:var(--bg-card2); padding:4px; overflow:visible; }
.g-card-back img { width:52px; height:52px; border-radius:20%; object-fit:cover; }
.g-dup { position:absolute; bottom:-20px; left:50%; transform:translateX(-50%); white-space:nowrap; font-size:0.6rem; background:rgba(100,180,255,0.25); color:#7dd3fc; padding:1px 7px; border-radius:3px; }
.g-card-back .g-name { font-size:0.62rem; color:var(--text-primary); text-align:center; word-break:break-all; line-height:1.2; max-width:80px; }
.g-rarity-tag { position:absolute; top:-20px; left:50%; transform:translateX(-50%); white-space:nowrap; font-size:0.65rem; font-weight:bold; padding:1px 7px; border-radius:4px; }

/* レアリティ枠 */
.rarity-SS .g-card-back {
  border:2px solid transparent;
  background:linear-gradient(var(--bg-card2),var(--bg-card2)) padding-box,
             linear-gradient(135deg,#ffd700,#ff66cc,#00eeff,#ffd700) border-box;
  animation:ssGlow 1.8s linear infinite;
}
.rarity-S .g-card-back { border:2px solid #ffd700; box-shadow:0 0 12px rgba(255,215,0,0.65); }
.rarity-A .g-card-back { border:2px solid #4fc3f7; box-shadow:0 0 8px rgba(79,195,247,0.4); }
.g-rarity-tag.r-SS { background:#ffd700; color:#000; }
.g-rarity-tag.r-S  { background:#e0c060; color:#000; }
.g-rarity-tag.r-A  { background:#4fc3f7; color:#000; }

@keyframes ssGlow {
  0%   { box-shadow:0 0 18px #ffd700; }
  33%  { box-shadow:0 0 18px #ff66cc; }
  66%  { box-shadow:0 0 18px #00eeff; }
  100% { box-shadow:0 0 18px #ffd700; }
}

/* 結果サマリー */
.result-summary { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; padding:12px 0; }
.result-count { text-align:center; }
.result-count .rnum { font-size:1.5rem; font-weight:bold; }
.result-count .rlabel { font-size:0.75rem; }

/* 所持アイコン */
.icon-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(76px,1fr)); gap:12px; }
.icon-item { text-align:center; padding:4px; }
.icon-item img {
  width:58px; height:58px; border-radius:20%; object-fit:cover;
  border:2px solid var(--border); cursor:pointer;
  transition:border-color 0.2s, box-shadow 0.2s;
  display:block; margin:0 auto 4px;
}
.icon-item img:hover { border-color:var(--accent); }
.icon-item img.equipped { border-color:var(--accent); box-shadow:0 0 10px var(--accent); }
.icon-none-btn {
  width:58px; height:58px; border-radius:20%; border:2px solid var(--border); cursor:pointer;
  display:flex; align-items:center; justify-content:center; margin:0 auto 4px;
  font-size:1.4rem; color:var(--text-muted); background:var(--bg-primary);
  transition:border-color 0.2s, box-shadow 0.2s;
}
.icon-none-btn:hover { border-color:var(--accent); }
.icon-none-btn.equipped { border-color:var(--accent); box-shadow:0 0 10px var(--accent); }
.icon-item .iname { font-size:0.68rem; color:var(--text-secondary); word-break:break-all; line-height:1.2; }
.irarity { font-size:0.62rem; font-weight:bold; padding:1px 5px; border-radius:3px; display:inline-block; margin-bottom:3px; }
.irarity-SS { background:#ffd700; color:#000; }
.irarity-S  { background:#e0c060; color:#000; }
.irarity-A  { background:#4fc3f7; color:#000; }

/* めくる前カード裏面の表示レアリティ演出 */
.display-rarity-SS .g-card-front {
  border:2px solid transparent;
  background:linear-gradient(var(--bg-card2),var(--bg-card2)) padding-box,
             linear-gradient(135deg,#ffd700,#ff66cc,#00eeff,#ffd700) border-box;
  animation:ssGlow 1.8s linear infinite;
}
.display-rarity-S .g-card-front {
  border:2px solid #ffd700;
  box-shadow:0 0 12px rgba(255,215,0,0.65);
}
/* S・SS レアリティ変更演出 */
@keyframes sRevealAnim {
  0%   { box-shadow:0 0 10px rgba(255,215,0,0.5); filter:brightness(1); transform:scale(1); }
  30%  { box-shadow:0 0 32px rgba(255,215,0,1), 0 0 64px rgba(255,180,0,0.5); filter:brightness(1.5); transform:scale(1.08); }
  55%  { box-shadow:0 0 20px rgba(255,215,0,0.8); filter:brightness(1.2); transform:scale(1.02); }
  78%  { box-shadow:0 0 38px rgba(255,215,0,1), 0 0 72px rgba(255,215,0,0.4); filter:brightness(1.45); transform:scale(1.06); }
  100% { box-shadow:0 0 12px rgba(255,215,0,0.65); filter:brightness(1); transform:scale(1); }
}
@keyframes ssRevealAnim {
  0%   { filter:brightness(1); transform:scale(1) translateX(0); box-shadow:none; }
  12%  { filter:brightness(1.6); transform:scale(1.06) translateX(-4px); box-shadow:0 0 30px #ffd700, 0 0 60px rgba(255,215,0,0.4); }
  24%  { filter:brightness(1.3); transform:scale(1.03) translateX(4px);  box-shadow:0 0 36px #ff88cc, 0 0 72px rgba(255,100,200,0.35); }
  38%  { filter:brightness(1.8); transform:scale(1.10) translateX(-3px); box-shadow:0 0 44px #00eeff, 0 0 88px rgba(0,200,255,0.4); }
  52%  { filter:brightness(2.1); transform:scale(1.13) translateX(0);    box-shadow:0 0 55px #ffd700, 0 0 90px #ff66cc, 0 0 130px rgba(0,230,255,0.35); }
  68%  { filter:brightness(1.5); transform:scale(1.06) translateX(0);    box-shadow:0 0 40px #ff66cc, 0 0 75px #00eeff; }
  85%  { filter:brightness(1.2); transform:scale(1.02); }
  100% { filter:brightness(1);   transform:scale(1) translateX(0); }
}
.reveal-S  .g-card-front { animation:sRevealAnim  0.95s ease-in-out forwards; }
.reveal-SS .g-card-front { animation:ssRevealAnim 1.25s ease-in-out forwards; }

.section-title { font-size:1rem; font-weight:bold; margin-bottom:14px; color:var(--text-primary); }
.rate-row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--border); font-size:0.85rem; }
.rate-row:last-child { border-bottom:none; }

@media(max-width:480px) {
  .g-card { width:66px; height:92px; }
  .g-card-back img { width:42px; height:42px; }
  .g-card-back .g-name { font-size:0.58rem; }
  .gacha-cards { width:calc(5*66px + 4*5px); column-gap:5px; row-gap:36px; }
  .gacha-btn { padding:12px 22px; }
}
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <div id="alert"></div>

  <div class="gacha-hero">
    <h1 class="page-title" style="margin-bottom:6px">キャラアイコン ガチャ</h1>
    <div class="gacha-points-display" id="my-points">--- pt</div>
    <div style="font-size:0.9rem;color:var(--text-muted)" id="my-gp">GP: ---</div>
    <div id="dup-indicator" style="font-size:0.82rem;font-weight:bold;color:#4fc3f7;height:1.3em;opacity:0;transition:opacity 0.3s;text-align:center;margin-bottom:2px"></div>
    <div style="font-size:0.8rem;color:var(--text-muted)" id="cost-info">読み込み中...</div>
  </div>

  <div class="gacha-pull-btns">
    <button class="gacha-btn gacha-btn-single" id="btn-single" onclick="doPull('single')" disabled>
      単発ガチャ
      <span class="gcost" id="single-cost-label"></span>
    </button>
    <button class="gacha-btn gacha-btn-multi" id="btn-multi" onclick="doPull('multi')" disabled>
      10連ガチャ
      <span class="gcost" id="multi-cost-label">Sレア以上確定</span>
    </button>
  </div>

  <!-- アニメーション領域 -->
  <div class="gacha-stage" id="gacha-stage">
    <div style="text-align:center;color:var(--text-muted);font-size:0.9rem">ガチャを引いてアイコンをゲット！</div>
  </div>

  <!-- 結果サマリー -->
  <div id="result-summary" style="display:none;margin-bottom:20px"></div>

  <!-- 排出率 -->
  <div class="card" style="margin-bottom:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="section-title" style="margin:0">排出率</div>
      <button class="btn btn-secondary btn-sm" onclick="openPoolModal()">排出対象を見る</button>
    </div>
    <div id="rate-info"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- GP交換 -->
  <div class="card" style="margin-bottom:20px">
    <div class="section-title" style="margin-bottom:4px">GP交換</div>
    <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px">200GP → SSアイコン1枚（選択）</div>
    <div id="exchange-ss-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-bottom:10px">
      <div class="loading"><div class="spinner"></div></div>
    </div>
    <div id="exchange-result" style="font-size:0.9rem"></div>
  </div>

  <!-- 排出対象モーダル -->
  <div id="pool-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:2000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 12px">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:520px;width:100%;margin:auto;position:relative">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <div style="font-size:1rem;font-weight:bold">排出対象アイコン</div>
        <button onclick="closePoolModal()" style="background:none;border:none;font-size:1.4rem;color:var(--text-muted);cursor:pointer;line-height:1">×</button>
      </div>
      <div id="pool-list"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
    </div>
  </div>

  <!-- 所持アイコン -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="section-title" style="margin:0">所持アイコン</div>
      <span style="font-size:0.8rem;color:var(--text-muted)">タップで装備</span>
    </div>
    <div id="my-icons"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
  </div>
</main>

<script src="/js/common.js"></script>
<script>
renderNav();
if (!requireLogin()) throw new Error('redirect');

let gSettings = null;
let isPulling = false;
let currentPoints = 0;
let currentGp = 0;

async function init() {
  try {
    const [settings, myData] = await Promise.all([
      apiFetch('/gacha/settings'),
      apiFetch('/gacha/my')
    ]);
    gSettings = settings;
    currentPoints = myData.points;
    currentGp = myData.gp || 0;
    updatePointsDisplay(currentPoints);
    updateGpDisplay(currentGp);
    loadExchangeList();

    // GP移行（未移行の場合のみ）
    try {
      const migRes = await apiFetch('/gacha/gp-migrate', { method: 'POST' });
      if (!migRes.already_done && migRes.gp_awarded > 0) {
        currentGp = migRes.new_gp;
        updateGpDisplay(currentGp);
        const el = document.getElementById('exchange-result');
        el.style.color = 'var(--accent)';
        el.textContent = `GP補填：過去のガチャ分 ${migRes.gp_awarded}GP を付与しました！`;
      }
    } catch (_) {}

    document.getElementById('single-cost-label').textContent = `${settings.single_cost}pt`;
    document.getElementById('multi-cost-label').textContent = `${settings.multi_cost}pt　Sレア以上確定`;
    document.getElementById('cost-info').textContent =
      `単発 ${settings.single_cost}pt ／ 10連 ${settings.multi_cost}pt（最後の1枚Sレア以上確定）`;

    document.getElementById('rate-info').innerHTML = `
      <div class="rate-row">
        <span><span class="irarity irarity-SS">SS</span></span>
        <span style="font-weight:bold;color:#ffd700">${settings.ss_rate}%</span>
      </div>
      <div class="rate-row">
        <span><span class="irarity irarity-S">S</span></span>
        <span style="font-weight:bold;color:#e0c060">${settings.s_rate}%</span>
      </div>
      <div class="rate-row">
        <span><span class="irarity irarity-A">A</span></span>
        <span style="font-weight:bold;color:#4fc3f7">${settings.a_rate}%</span>
      </div>
      <p style="font-size:0.75rem;color:var(--text-muted);margin-top:10px;text-align:center">
        レアリティ内の確率は均等。10連最後の1枚はAがSに変換。
      </p>`;

    document.getElementById('btn-single').disabled = false;
    document.getElementById('btn-multi').disabled = false;

    renderMyIcons(myData.icons);
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

function updatePointsDisplay(pts) {
  document.getElementById('my-points').textContent = Number(pts).toLocaleString('ja-JP') + ' pt';
}
function updateGpDisplay(gp) {
  document.getElementById('my-gp').textContent = 'GP: ' + Number(gp).toLocaleString('ja-JP');
  document.querySelectorAll('.exchange-icon-btn').forEach(btn => {
    btn.disabled = isPulling || gp < 200;
  });
}

async function loadExchangeList() {
  const container = document.getElementById('exchange-ss-list');
  try {
    const icons = await apiFetch('/gacha/icons');
    const ss = icons.filter(i => i.rarity === 'SS');
    if (ss.length === 0) { container.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem">SSアイコンがありません</div>'; return; }
    container.innerHTML = ss.map(i => `
      <div style="text-align:center;cursor:pointer" onclick="doExchange(${i.id})">
        <img src="${escHtml(i.image_url)}" style="width:64px;height:64px;object-fit:contain;border-radius:8px;border:2px solid #ffd700;display:block;margin:0 auto 4px">
        <div style="font-size:0.7rem;color:#ffd700;word-break:break-all">${escHtml(i.name)}</div>
        <button class="btn btn-primary btn-sm exchange-icon-btn" style="margin-top:4px;font-size:0.7rem;padding:2px 6px" ${currentGp < 200 ? 'disabled' : ''}>200GP</button>
      </div>
    `).join('');
  } catch (e) {
    container.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem">読み込み失敗</div>';
  }
}

async function doExchange(iconId) {
  if (isPulling || currentGp < 200) return;
  isPulling = true;
  updateGpDisplay(currentGp);
  document.getElementById('exchange-result').textContent = '';
  try {
    const res = await apiFetch('/gacha/exchange', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ icon_id: iconId }) });
    currentGp = res.new_gp;
    updateGpDisplay(currentGp);
    const r = res.result;
    const label = r.is_dup ? `（重複 +${r.dup_pts}pt補償）` : '（NEW！）';
    document.getElementById('exchange-result').innerHTML =
      `<span style="color:#ffd700">【SS】${escHtml(r.name)}</span> ${label}`;
    const myData = await apiFetch('/gacha/my');
    renderMyIcons(myData.icons);
  } catch (err) {
    document.getElementById('exchange-result').textContent = err.message || 'エラーが発生しました';
  } finally {
    isPulling = false;
    updateGpDisplay(currentGp);
  }
}

function animateCount(from, to, duration) {
  return new Promise(resolve => {
    const start = performance.now();
    const diff = to - from;
    function step(now) {
      const t = Math.min((now - start) / duration, 1);
      const ease = t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
      updatePointsDisplay(Math.round(from + diff * ease));
      if (t < 1) requestAnimationFrame(step);
      else { updatePointsDisplay(to); resolve(); }
    }
    requestAnimationFrame(step);
  });
}

async function showDupReturn(from, to, dupTotal) {
  const ind = document.getElementById('dup-indicator');
  ind.textContent = `+${dupTotal}pt 重複補償`;
  ind.style.opacity = '1';
  await animateCount(from, to, 700);
  await new Promise(r => setTimeout(r, 1400));
  ind.style.opacity = '0';
}

function renderMyIcons(icons) {
  const el = document.getElementById('my-icons');
  if (!icons || icons.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎰</div><p>まだアイコンを所持していません</p></div>';
    return;
  }
  const anyEquipped = icons.some(i => i.is_equipped);
  el.innerHTML = `<div class="icon-grid">${icons.map(icon => `
    <div class="icon-item">
      <span class="irarity irarity-${escHtml(icon.rarity)}">${escHtml(icon.rarity)}</span><br>
      <img src="${escHtml(icon.image_url)}" alt="${escHtml(icon.name)}"
           class="${icon.is_equipped ? 'equipped' : ''}"
           onclick="equipIcon(${icon.id}, this)"
           title="${escHtml(icon.name)}">
      <div class="iname">${escHtml(icon.name)}</div>
    </div>`).join('')}
    <div class="icon-item">
      <span class="irarity" style="visibility:hidden">-</span><br>
      <div class="icon-none-btn ${anyEquipped ? '' : 'equipped'}" onclick="unequipIcon(this)" title="何もつけない">✕</div>
      <div class="iname">何もつけない</div>
    </div>
  </div>`;
}

async function equipIcon(iconId, imgEl) {
  try {
    const res = await apiFetch('/gacha/equip', { method: 'POST', body: JSON.stringify({ icon_id: iconId }) });
    document.querySelectorAll('#my-icons img').forEach(el => el.classList.remove('equipped'));
    document.querySelectorAll('#my-icons .icon-none-btn').forEach(el => el.classList.remove('equipped'));
    imgEl.classList.add('equipped');
    showAlert('#alert', res.message, 'success');
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

async function unequipIcon(el) {
  try {
    const res = await apiFetch('/gacha/equip', { method: 'POST', body: JSON.stringify({ icon_id: null }) });
    document.querySelectorAll('#my-icons img').forEach(e => e.classList.remove('equipped'));
    document.querySelectorAll('#my-icons .icon-none-btn').forEach(e => e.classList.remove('equipped'));
    el.classList.add('equipped');
    showAlert('#alert', res.message, 'success');
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

async function doPull(type) {
  if (isPulling) return;
  isPulling = true;
  const btnS = document.getElementById('btn-single');
  const btnM = document.getElementById('btn-multi');
  btnS.disabled = true;
  btnM.disabled = true;
  document.getElementById('result-summary').style.display = 'none';
  clearAlert('#alert');

  try {
    const res = await apiFetch(`/gacha/pull/${type}`, { method: 'POST' });
    // コスト分を即座に減らす
    const dupTotal = res.results.reduce((s, r) => s + (r.dup_pts || 0), 0);
    const afterCost = res.new_points - dupTotal;
    await animateCount(currentPoints, afterCost, 350);
    currentPoints = afterCost;

    await animatePull(res.results);
    showResultSummary(res.results);

    // 重複補償を返却
    if (dupTotal > 0) {
      await showDupReturn(currentPoints, res.new_points, dupTotal);
    }
    currentPoints = res.new_points;
    if (res.new_gp != null) { currentGp = res.new_gp; updateGpDisplay(currentGp); }

    const myData = await apiFetch('/gacha/my');
    renderMyIcons(myData.icons);
  } catch (err) {
    showAlert('#alert', err.message);
  } finally {
    isPulling = false;
    btnS.disabled = false;
    btnM.disabled = false;
  }
}

async function animatePull(results) {
  const stage = document.getElementById('gacha-stage');
  stage.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'gacha-cards';
  stage.appendChild(wrap);

  // めくる前に表示する演出レアリティを決定
  // SS: 50%→虹, 25%→金, 25%→通常
  // S:  75%→金, 25%→通常
  // A:  100%→通常
  const dispRarities = results.map(icon => {
    if (icon.rarity === 'SS') {
      const r = Math.random();
      if (r < 0.50) return 'SS';
      if (r < 0.75) return 'S';
      return 'A';
    }
    if (icon.rarity === 'S') return Math.random() < 0.75 ? 'S' : 'A';
    return 'A';
  });

  // カード生成（裏向き・表示レアリティ付き）
  results.forEach((icon, i) => {
    const card = document.createElement('div');
    card.className = `g-card rarity-${icon.rarity} display-rarity-${dispRarities[i]}`;
    card.innerHTML = `
      <div class="g-card-inner" id="gc-${i}">
        <div class="g-card-front"><img src="/img/logo.png" alt="" style="width:70%;height:70%;object-fit:contain;opacity:0.7"></div>
        <div class="g-card-back">
          <span class="g-rarity-tag r-${escHtml(icon.rarity)}">${escHtml(icon.rarity)}</span>
          <img src="${escHtml(icon.image_url)}" alt="${escHtml(icon.name)}">
          <div class="g-name">${escHtml(icon.name)}</div>
          ${icon.is_dup ? `<span class="g-dup">重複+${icon.dup_pts}pt</span>` : ''}
        </div>
      </div>`;
    wrap.appendChild(card);
  });

  // タップするまで待機（文字なし）
  const cardEls = wrap.querySelectorAll('.g-card');
  await new Promise(resolve => {
    stage.style.cursor = 'pointer';
    const handler = () => {
      stage.removeEventListener('click', handler);
      stage.style.cursor = '';
      resolve();
    };
    stage.addEventListener('click', handler);
  });

  // 順にめくる（めくる直前にレアリティ変更演出）
  const stagger = results.length === 1 ? 0 : 180;
  for (let i = 0; i < results.length; i++) {
    if (i > 0) await new Promise(r => setTimeout(r, stagger));
    const actual = results[i].rarity;
    const isFakeout = dispRarities[i] !== actual;
    if (isFakeout || actual === 'SS' || actual === 'S') {
      const card = cardEls[i];
      if (isFakeout) {
        card.classList.remove(`display-rarity-${dispRarities[i]}`);
        card.classList.add(`display-rarity-${actual}`);
      }
      card.classList.add(`reveal-${actual}`);
      // SSはピーク時に画面フラッシュ
      if (actual === 'SS') {
        setTimeout(() => {
          const fl = document.createElement('div');
          fl.style.cssText = 'position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(255,230,120,0.45) 0%,transparent 70%);pointer-events:none;z-index:1500;opacity:0;transition:opacity 0.18s';
          document.body.appendChild(fl);
          requestAnimationFrame(() => { fl.style.opacity = '1'; });
          setTimeout(() => { fl.style.opacity = '0'; setTimeout(() => fl.remove(), 220); }, 180);
        }, 480);
      }
      const revealDur = actual === 'SS' ? 1300 : 1000;
      await new Promise(r => setTimeout(r, revealDur));
      card.classList.remove(`reveal-${actual}`);
      await new Promise(r => setTimeout(r, 40));
    }
    document.getElementById(`gc-${i}`).classList.add('flipped');
  }

  // 最後のカードのアニメーション完了を待つ
  await new Promise(r => setTimeout(r, 700));
}

function showResultSummary(results) {
  const counts = { SS: 0, S: 0, A: 0 };
  results.forEach(r => { counts[r.rarity] = (counts[r.rarity] || 0) + 1; });

  const colors = { SS: '#ffd700', S: '#e0c060', A: '#4fc3f7' };
  const parts = Object.entries(counts)
    .filter(([, n]) => n > 0)
    .map(([rarity, n]) => `
      <div class="result-count">
        <div class="rnum" style="color:${colors[rarity]}">${n}</div>
        <div class="rlabel"><span class="irarity irarity-${rarity}">${rarity}</span></div>
      </div>`);

  const el = document.getElementById('result-summary');
  el.innerHTML = `<div class="result-summary">${parts.join('')}</div>`;
  el.style.display = '';
}

init();

let poolLoaded = false;
async function openPoolModal() {
  const modal = document.getElementById('pool-modal');
  modal.style.display = 'flex';
  if (poolLoaded) return;
  try {
    const icons = await apiFetch('/gacha/icons');
    const order = ['SS', 'S', 'A'];
    const grouped = {};
    order.forEach(r => grouped[r] = []);
    icons.forEach(ic => { if (grouped[ic.rarity]) grouped[ic.rarity].push(ic); });
    const rarityColors = { SS: '#ffd700', S: '#e0c060', A: '#4fc3f7' };
    document.getElementById('pool-list').innerHTML = order.map(r => {
      if (!grouped[r].length) return '';
      return `
        <div style="margin-bottom:18px">
          <div style="font-size:0.82rem;font-weight:bold;color:${rarityColors[r]};margin-bottom:8px">${r}レア（${grouped[r].length}種）</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px">
            ${grouped[r].map(ic => `
              <div style="text-align:center">
                <img src="${escHtml(ic.image_url)}" alt="${escHtml(ic.name)}"
                     style="width:54px;height:54px;border-radius:20%;object-fit:cover;border:2px solid ${rarityColors[r]};display:block;margin:0 auto 4px">
                <div style="font-size:0.62rem;color:var(--text-secondary);word-break:break-all;line-height:1.2">${escHtml(ic.name)}</div>
              </div>`).join('')}
          </div>
        </div>`;
    }).join('');
    poolLoaded = true;
  } catch (err) {
    document.getElementById('pool-list').innerHTML = `<div style="color:var(--danger)">${escHtml(err.message)}</div>`;
  }
}
function closePoolModal() {
  document.getElementById('pool-modal').style.display = 'none';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePoolModal(); });
</script>
