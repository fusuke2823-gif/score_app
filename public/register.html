<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新規登録 - HBR</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<nav id="nav"></nav>
<div class="auth-wrap">
  <div class="auth-card card">
    <h1 class="auth-title" data-i18n="register.title">新規登録</h1>
    <div id="internal-badge" style="display:none;text-align:center;margin-bottom:12px">
      <span style="background:var(--accent);color:#fff;font-size:0.8rem;font-weight:bold;padding:4px 12px;border-radius:20px" data-i18n="register.internal_badge">内部メンバー登録</span>
    </div>
    <div id="alert"></div>
    <form id="register-form">
      <div class="form-group">
        <label class="form-label"><span data-i18n="register.username">ユーザー名</span> <span style="color:var(--accent)">*</span></label>
        <input class="form-input" type="text" id="username" required autofocus minlength="1" maxlength="12">
        <div class="form-hint" data-i18n="register.username_hint">1〜12文字</div>
      </div>
      <div class="form-group">
        <label class="form-label"><span data-i18n="register.password">パスワード</span> <span style="color:var(--accent)">*</span></label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="password" required minlength="6">
          <button type="button" class="pw-toggle" onclick="togglePw('password')" tabindex="-1"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <div class="form-hint" data-i18n="register.password_hint">6文字以上</div>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="register.oshi">推しキャラクター（任意）</label>
        <input class="form-input" type="text" id="oshi" maxlength="100" data-i18n-ph="register.oshi_ph" placeholder="例: 茅森月歌">
      </div>
      <div class="form-group">
        <label class="form-label">X (Twitter) ID（任意）</label>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="color:var(--text-muted);font-size:0.9rem">@</span>
          <input class="form-input" type="text" id="twitter" maxlength="15" placeholder="username" style="flex:1" autocomplete="off">
        </div>
        <div class="form-hint">英数字・アンダースコアのみ</div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="submit-btn" data-i18n="register.btn">登録する</button>
    </form>
    <div style="display:flex;align-items:center;gap:8px;margin:16px 0">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="font-size:0.8rem;color:var(--text-muted)">またはGoogleで登録</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>
    <div id="google-btn-wrap" style="display:flex;justify-content:center"></div>
    <div id="google-client-id" data-client-id=""></div>
    <p style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--text-secondary)">
      <span data-i18n="register.has_account">すでにアカウントがある方は</span> <a href="/login.html" data-i18n="register.login_link">ログイン</a>
    </p>
  </div>
</div>

<!-- Googleユーザー名設定モーダル -->
<div id="google-username-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:3000;align-items:center;justify-content:center">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:28px 24px;max-width:360px;width:90%">
    <h2 style="margin:0 0 6px;font-size:1.1rem">ユーザー名を設定</h2>
    <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:18px">このアプリで使うユーザー名を設定してください。</p>
    <div id="google-modal-alert" style="margin-bottom:10px"></div>
    <input class="form-input" id="google-username-input" type="text" placeholder="ユーザー名（1〜12文字）" maxlength="12" style="margin-bottom:10px">
    <button class="btn btn-primary" style="width:100%" onclick="submitGoogleUsername()">登録してログイン</button>
  </div>
</div>
<script src="/js/common.js"></script>
<script>
renderNav();
applyI18n();
if (getToken()) location.href = '/index.html';

let _pendingGoogleId = null;

function isInAppBrowser() {
  return /Line\/|FBAN|FBAV|Instagram|MicroMessenger|WebView|wv\b/i.test(navigator.userAgent);
}

fetch('/api/auth/google/client-id')
  .then(r => r.json())
  .then(({ client_id }) => {
    if (!client_id) return;
    const wrap = document.getElementById('google-btn-wrap');
    if (isInAppBrowser()) {
      wrap.innerHTML = `<div style="font-size:0.8rem;color:var(--text-muted);text-align:center;padding:8px 0">LINEなどのアプリ内ブラウザではGoogleログインをご利用いただけません。<br>ブラウザアプリで開いてからお試しください。</div>`;
      return;
    }
    const script = document.querySelector('script[src*="accounts.google.com"]');
    const init = () => {
      if (!window.google) return;
      google.accounts.id.initialize({ client_id, callback: handleGoogleCredential });
      google.accounts.id.renderButton(
        wrap,
        { theme: 'outline', size: 'large', width: 280, text: 'signup_with', locale: 'ja' }
      );
    };
    if (window.google) init();
    else script?.addEventListener('load', init);
  })
  .catch(() => {});

async function handleGoogleCredential(response) {
  try {
    const data = await apiFetch('/auth/google/verify', {
      method: 'POST',
      body: JSON.stringify({ credential: response.credential })
    });
    if (data.token) {
      setAuth(data.token, data.user);
      location.href = '/index.html';
    } else if (data.needs_username) {
      _pendingGoogleId = data.google_id;
      document.getElementById('google-username-modal').style.display = 'flex';
      document.getElementById('google-username-input').focus();
    }
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

async function submitGoogleUsername() {
  const username = document.getElementById('google-username-input').value.trim();
  if (!username) return;
  const ref = getParam('ref') || '';
  try {
    const data = await apiFetch('/auth/google/register', {
      method: 'POST',
      body: JSON.stringify({ google_id: _pendingGoogleId, username, ref })
    });
    setAuth(data.token, data.user);
    location.href = '/index.html';
  } catch (err) {
    document.getElementById('google-modal-alert').innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

// ?ref= がある場合は内部メンバーバッジを表示
if (getParam('ref')) {
  document.getElementById('internal-badge').style.display = '';
}

document.getElementById('register-form').addEventListener('submit', async e => {
  e.preventDefault();
  clearAlert('#alert');
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = t('register.btn_loading');

  try {
    const twitterRaw = document.getElementById('twitter').value.trim().replace(/^@/, '');
    if (twitterRaw && !/^[A-Za-z0-9_]{1,15}$/.test(twitterRaw)) {
      showAlert('#alert', 'XのIDは英数字・アンダースコア1〜15文字で入力してください');
      btn.disabled = false;
      btn.textContent = t('register.btn');
      return;
    }
    const body = {
      username: document.getElementById('username').value,
      password: document.getElementById('password').value,
      oshi_character: document.getElementById('oshi').value || undefined,
      twitter_username: twitterRaw || undefined,
      ref: getParam('ref') || undefined
    };

    const data = await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify(body)
    });
    setAuth(data.token, data.user);
    location.href = '/index.html';
  } catch (err) {
    showAlert('#alert', err.message);
    btn.disabled = false;
    btn.textContent = t('register.btn');
  }
});
</script>
</body>
</html>
