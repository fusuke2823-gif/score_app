<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新規登録 - HBR</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav id="nav"></nav>
<div class="auth-wrap">
  <div class="auth-card card">
    <h1 class="auth-title" data-i18n="register.title">新規登録</h1>
    <div id="alert"></div>
    <form id="register-form">
      <div class="form-group">
        <label class="form-label"><span data-i18n="register.username">ユーザー名</span> <span style="color:var(--accent)">*</span></label>
        <input class="form-input" type="text" id="username" required autofocus minlength="1" maxlength="12">
        <div class="form-hint" data-i18n="register.username_hint">1〜12文字</div>
      </div>
      <div class="form-group">
        <label class="form-label"><span data-i18n="register.password">パスワード</span> <span style="color:var(--accent)">*</span></label>
        <input class="form-input" type="password" id="password" required minlength="6">
        <div class="form-hint" data-i18n="register.password_hint">6文字以上</div>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="register.oshi">推しキャラクター（任意）</label>
        <input class="form-input" type="text" id="oshi" maxlength="100" data-i18n-ph="register.oshi_ph" placeholder="例: 茅森月歌">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="submit-btn" data-i18n="register.btn">登録する</button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--text-secondary)">
      <span data-i18n="register.has_account">すでにアカウントがある方は</span> <a href="/login.html" data-i18n="register.login_link">ログイン</a>
    </p>
  </div>
</div>
<script src="/js/common.js"></script>
<script>
renderNav();
applyI18n();
if (getToken()) location.href = '/index.html';

document.getElementById('register-form').addEventListener('submit', async e => {
  e.preventDefault();
  clearAlert('#alert');
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = t('register.btn_loading');

  try {
    const data = await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        oshi_character: document.getElementById('oshi').value || undefined
      })
    });
    setAuth(data.token, data.user);
    location.href = '/index.html';
  } catch (err) {
    showAlert('#alert', err.message);
    btn.disabled = false;
    btn.textContent = t('register.btn');
  }
});
</script>
</body>
</html>
