<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面 2 - HBR</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.section-title { font-size:1rem; font-weight:bold; margin-bottom:16px; color:var(--text-primary); }
.enemy-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:600px){ .enemy-form-grid{grid-template-columns:1fr;} }
.event-list-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 16px; border-bottom:1px solid var(--border);
}
.event-list-item:last-child { border-bottom:none; }

/* アイコングリッド */
.admin-icon-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:12px; }
.admin-icon-card {
  background:var(--bg-primary); border:1px solid var(--border); border-radius:10px;
  padding:12px 8px; text-align:center;
}
.admin-icon-card img { width:60px; height:60px; border-radius:20%; object-fit:cover; border:2px solid var(--border); }
.admin-icon-card .iname { font-size:0.75rem; margin-top:6px; word-break:break-all; }
.admin-icon-card .ibtns { display:flex; gap:4px; justify-content:center; margin-top:8px; flex-wrap:wrap; }
.rarity-badge { font-size:0.68rem; font-weight:bold; padding:2px 7px; border-radius:4px; display:inline-block; margin-bottom:4px; }
.rarity-badge-SS { background:#ffd700; color:#000; }
.rarity-badge-S  { background:#e0c060; color:#000; }
.rarity-badge-A  { background:#4fc3f7; color:#000; }

/* Canvas cropper */
#crop-wrap { position:relative; }
#crop-canvas { display:block; max-width:100%; border-radius:8px; cursor:crosshair; touch-action:none; }
#crop-section { margin-top:16px; display:none; }
.crop-row { display:flex; gap:16px; align-items:flex-start; flex-wrap:wrap; margin-bottom:12px; }
#crop-preview { border-radius:20%; border:3px solid var(--accent); display:block; flex-shrink:0; }
.crop-controls { display:flex; align-items:center; gap:10px; margin-top:8px; }
.crop-controls label { font-size:0.82rem; color:var(--text-muted); white-space:nowrap; }
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:4px;flex-wrap:wrap">
    <h1 class="page-title" style="margin:0">管理画面 2</h1>
    <a href="/admin.html" style="font-size:0.85rem;color:var(--text-muted)">← 管理画面 1</a>
  </div>
  <div id="alert"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('points')">ポイント配布</button>
    <button class="tab-btn" onclick="switchTab('gacha')">ガチャ管理</button>
    <button class="tab-btn" onclick="switchTab('loginbonus')">ログインボーナス</button>
    <button class="tab-btn" onclick="switchTab('history')">ポイント履歴</button>
  </div>

  <!-- ポイント配布 -->
  <div class="tab-content active" id="tab-points">
    <div class="card" style="margin-bottom:20px">
      <div class="section-title">手動ポイント付与</div>
      <div id="grant-alert" style="margin-bottom:12px"></div>
      <div class="form-group">
        <label class="form-label">対象プレイヤー</label>
        <select class="form-input" id="grant-user"><option value="">全員</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">付与ポイント数</label>
        <input class="form-input" id="grant-amount" type="number" min="1" placeholder="例: 50">
      </div>
      <div class="form-group">
        <label class="form-label">理由（任意）</label>
        <input class="form-input" id="grant-reason" type="text" placeholder="例: キャンペーン報酬" maxlength="100">
      </div>
      <button class="btn btn-primary" onclick="grantPoints()">付与する</button>
    </div>
    <div class="card" style="margin-bottom:20px">
      <div class="section-title">順位ポイント設定</div>
      <div id="rank-pts-alert" style="margin-bottom:12px"></div>
      <div class="enemy-form-grid">
        <div class="form-group">
          <label class="form-label">1位（pt）</label>
          <input class="form-input" type="number" id="rp-1" min="0" placeholder="100">
        </div>
        <div class="form-group">
          <label class="form-label">2〜3位（pt）</label>
          <input class="form-input" type="number" id="rp-2-3" min="0" placeholder="95">
        </div>
        <div class="form-group">
          <label class="form-label">4〜5位（pt）</label>
          <input class="form-input" type="number" id="rp-4-5" min="0" placeholder="90">
        </div>
        <div class="form-group">
          <label class="form-label">6〜10位（pt）</label>
          <input class="form-input" type="number" id="rp-6-10" min="0" placeholder="80">
        </div>
        <div class="form-group">
          <label class="form-label">11〜15位（pt）</label>
          <input class="form-input" type="number" id="rp-11-15" min="0" placeholder="60">
        </div>
        <div class="form-group">
          <label class="form-label">16〜20位（pt）</label>
          <input class="form-input" type="number" id="rp-16-20" min="0" placeholder="50">
        </div>
        <div class="form-group">
          <label class="form-label">21〜25位（pt）</label>
          <input class="form-input" type="number" id="rp-21-25" min="0" placeholder="30">
        </div>
        <div class="form-group">
          <label class="form-label">26〜30位（pt）</label>
          <input class="form-input" type="number" id="rp-26-30" min="0" placeholder="20">
        </div>
        <div class="form-group">
          <label class="form-label">31位以降（pt）</label>
          <input class="form-input" type="number" id="rp-31plus" min="0" placeholder="10">
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveRankPts()">保存する</button>
    </div>

    <div class="card">
      <div class="section-title">ポイント配布（終了済みイベント）</div>
      <p id="rank-pts-summary" style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px"></p>
      <div id="points-alert" style="margin-bottom:12px"></div>
      <div id="distributable-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- ガチャ管理 -->
  <div class="tab-content" id="tab-gacha">

    <!-- ガチャプール管理 -->
    <div class="card" style="margin-bottom:24px">
      <div class="section-title">ガチャプール管理</div>
      <div id="pool-alert" style="margin-bottom:12px"></div>
      <div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px">
        <div style="font-size:0.85rem;font-weight:bold;margin-bottom:10px;color:var(--text-muted)">新規プール作成</div>
        <div class="enemy-form-grid">
          <div class="form-group">
            <label class="form-label">ガチャ名</label>
            <input class="form-input" id="pool-name" placeholder="例: 年末スペシャルガチャ">
          </div>
          <div class="form-group">
            <label class="form-label">表示順</label>
            <input class="form-input" type="number" id="pool-order" value="0" min="0">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">説明（任意）</label>
          <input class="form-input" id="pool-desc" placeholder="例: SSレアリティ強化！">
        </div>
        <div class="form-group">
          <label class="form-label">タイトル画像（任意）</label>
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
            <input type="file" id="pool-img-file" accept="image/*" style="display:none" onchange="onPoolImgSelect(this,'pool-img-preview')">
            <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('pool-img-file').click()">画像を選択</button>
            <img id="pool-img-preview" src="" alt="" style="display:none;width:64px;height:64px;border-radius:12px;object-fit:cover;border:1px solid var(--border)">
          </div>
        </div>
        <button class="btn btn-primary" onclick="createPool()">作成する</button>
      </div>
      <div id="pool-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <!-- アイコン設定モーダル -->
    <div id="pool-icon-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:3000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 12px">
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:600px;width:100%;margin:auto;position:relative">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <div style="font-weight:bold" id="pool-modal-title">アイコン設定</div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            <button class="btn btn-secondary btn-sm" onclick="closePoolIconModal()">キャンセル</button>
            <button class="btn btn-primary btn-sm" onclick="savePoolIcons()">保存する</button>
            <button onclick="closePoolIconModal()" style="background:none;border:none;font-size:1.4rem;color:var(--text-muted);cursor:pointer;line-height:1;padding:0 4px">×</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px">
          <p style="font-size:0.82rem;color:var(--text-muted);margin:0;flex:1">このガチャに含めるアイコンを選択してください（レアリティ別に表示）</p>
          <button class="btn btn-secondary btn-sm" id="btn-toggle-ss" onclick="toggleAllSS()">SS全選択</button>
          <button class="btn btn-secondary btn-sm" id="btn-toggle-as" onclick="toggleAllAS()">A・S全選択</button>
        </div>
        <div id="pool-modal-icons"></div>
      </div>
    </div>

    <!-- ガチャ設定 -->
    <div class="card" style="margin-bottom:24px">
      <div class="section-title">ガチャ設定</div>
      <div id="gacha-settings-alert" style="margin-bottom:12px"></div>
      <div class="enemy-form-grid">
        <div class="form-group">
          <label class="form-label">SS確率（%）</label>
          <input class="form-input" type="number" id="gs-ss" min="0" max="100" step="0.1" placeholder="例: 3">
        </div>
        <div class="form-group">
          <label class="form-label">S確率（%）</label>
          <input class="form-input" type="number" id="gs-s" min="0" max="100" step="0.1" placeholder="例: 15">
        </div>
        <div class="form-group">
          <label class="form-label">A確率（%）<span style="font-size:0.75rem;color:var(--text-muted);margin-left:4px">自動計算</span></label>
          <input class="form-input" type="number" id="gs-a" readonly style="background:var(--bg-primary);color:var(--text-muted)">
        </div>
        <div class="form-group">
          <label class="form-label">単発コスト（pt）</label>
          <input class="form-input" type="number" id="gs-single" min="1" placeholder="例: 50">
        </div>
        <div class="form-group">
          <label class="form-label">10連コスト（pt）</label>
          <input class="form-input" type="number" id="gs-multi" min="1" placeholder="例: 450">
        </div>
      </div>
      <div class="enemy-form-grid" style="margin-top:4px">
        <div class="form-group">
          <label class="form-label">SS重複補償（pt）</label>
          <input class="form-input" type="number" id="gs-dup-ss" min="0" placeholder="例: 30">
        </div>
        <div class="form-group">
          <label class="form-label">S重複補償（pt）</label>
          <input class="form-input" type="number" id="gs-dup-s" min="0" placeholder="例: 10">
        </div>
        <div class="form-group">
          <label class="form-label">A重複補償（pt）</label>
          <input class="form-input" type="number" id="gs-dup-a" min="0" placeholder="例: 3">
        </div>
      </div>
      <div class="form-group" style="margin-top:4px">
        <label style="display:flex;align-items:center;gap:12px;cursor:pointer">
          <input type="checkbox" id="gs-show-nav" style="width:18px;height:18px">
          <span>ナビゲーションバーにガチャを表示する</span>
        </label>
      </div>
      <button class="btn btn-primary" style="margin-top:8px" onclick="saveGachaSettings()">保存する</button>
    </div>

    <!-- アイコン追加 -->
    <div class="card" style="margin-bottom:24px">
      <div class="section-title">アイコン追加</div>
      <div id="gacha-icon-alert" style="margin-bottom:12px"></div>
      <div class="form-group">
        <label class="form-label">画像を選択</label>
        <input class="form-input" type="file" id="icon-file" accept="image/*" style="padding:8px" onchange="handleIconFile(this)">
      </div>

      <!-- キャンバスクロッパー -->
      <div id="crop-section">
        <div class="crop-row">
          <div style="flex:1;min-width:200px">
            <canvas id="crop-canvas"></canvas>
            <div class="crop-controls">
              <label>サイズ</label>
              <input type="range" id="crop-size-slider" min="20" max="100" value="80" style="flex:1" oninput="onCropSizeChange(this.value)">
            </div>
          </div>
          <div style="text-align:center">
            <p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:6px">プレビュー</p>
            <canvas id="crop-preview" width="80" height="80"></canvas>
          </div>
        </div>
        <p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:12px">
          白い枠をドラッグして切り取り位置を調整してください
        </p>
      </div>

      <div class="enemy-form-grid">
        <div class="form-group">
          <label class="form-label">アイコン名</label>
          <input class="form-input" type="text" id="icon-name" placeholder="例: ハルカ">
        </div>
        <div class="form-group">
          <label class="form-label">レアリティ</label>
          <select class="form-input" id="icon-rarity">
            <option value="SS">SS</option>
            <option value="S" selected>S</option>
            <option value="A">A</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" id="add-icon-btn" onclick="addGachaIcon()">追加する</button>
    </div>

    <!-- アイコン一覧 -->
    <div class="card">
      <div class="section-title">アイコン一覧</div>
      <div id="gacha-icon-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>

  </div>

  <!-- ログインボーナス管理 -->
  <div class="tab-content" id="tab-loginbonus">

    <div class="card" style="margin-bottom:20px">
      <div class="section-title">通常ログインボーナス設定</div>
      <div id="lb-alert" style="margin-bottom:12px"></div>
      <div id="lb-day-inputs" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:16px"></div>
      <button class="btn btn-primary" onclick="saveLBSettings()">保存</button>
    </div>

    <div class="card">
      <div class="section-title">特別ログインボーナス</div>
      <div id="sb-alert" style="margin-bottom:12px"></div>
      <div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px">
        <div style="font-size:0.85rem;font-weight:bold;margin-bottom:12px;color:var(--text-muted)">新規作成</div>
        <div class="form-group"><label class="form-label">題名</label>
          <input class="form-input" id="sb-title" placeholder="例: GW特別ボーナス"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group"><label class="form-label">開始日</label>
            <input class="form-input" id="sb-start" type="date"></div>
          <div class="form-group"><label class="form-label">終了日</label>
            <input class="form-input" id="sb-end" type="date"></div>
          <div class="form-group"><label class="form-label">獲得可能回数</label>
            <input class="form-input" id="sb-max" type="number" min="1" value="1"></div>
          <div class="form-group"><label class="form-label">1回のpt</label>
            <input class="form-input" id="sb-pts" type="number" min="1" value="5"></div>
        </div>
        <button class="btn btn-primary" style="margin-top:4px" onclick="createSpecialBonus()">作成</button>
      </div>
      <div id="sb-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>

  </div>

  <!-- ポイント履歴 -->
  <div class="tab-content" id="tab-history">
    <div class="card">
      <div class="section-title">ポイント履歴</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px">
        <select class="form-input" id="ph-user" style="max-width:220px" onchange="loadHistory(true)">
          <option value="">全ユーザー</option>
        </select>
        <span id="ph-total" style="font-size:0.82rem;color:var(--text-muted)"></span>
      </div>
      <div style="overflow-x:auto">
        <table class="table" id="ph-table">
          <thead><tr><th>日時</th><th>ユーザー</th><th style="text-align:right">pt</th><th>理由</th></tr></thead>
          <tbody id="ph-body"></tbody>
        </table>
      </div>
      <div id="ph-more" style="text-align:center;margin-top:16px;display:none">
        <button class="btn btn-secondary" onclick="loadHistoryMore()">さらに読み込む</button>
      </div>
    </div>
  </div>
</main>

<script src="/js/common.js"></script>
<script>
renderNav();
if (!requireAdmin()) throw new Error('redirect');

const TAB_NAMES = ['points', 'gacha', 'loginbonus', 'history'];

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', TAB_NAMES[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'points') { loadRankPts(); loadDistributable(); loadGrantUsers(); }
  if (name === 'gacha') { loadGachaSettings(); loadGachaIcons(); loadPools(); }
  if (name === 'loginbonus') { loadLBSettings(); loadSpecialBonuses(); }
  if (name === 'history') { loadHistoryUsers(); loadHistory(true); }
}

// ===== 手動ポイント付与 =====
async function loadGrantUsers() {
  try {
    const users = await apiFetch('/admin/users');
    const sel = document.getElementById('grant-user');
    sel.innerHTML = '<option value="">全員</option>' +
      users.map(u => `<option value="${u.id}">${escHtml(u.username)}（${u.points}pt）</option>`).join('');
  } catch {}
}

async function grantPoints() {
  const userId = document.getElementById('grant-user').value || null;
  const amount = document.getElementById('grant-amount').value;
  const reason = document.getElementById('grant-reason').value.trim();
  if (!amount || Number(amount) < 1) { showAlert('#grant-alert', '付与ポイント数を入力してください'); return; }
  const target = userId ? document.getElementById('grant-user').selectedOptions[0].text : '全員';
  if (!confirm(`${target} に ${amount}pt を付与しますか？`)) return;
  try {
    const res = await apiFetch('/admin/points/grant', {
      method: 'POST',
      body: JSON.stringify({ user_id: userId ? Number(userId) : null, amount: Number(amount), reason })
    });
    showAlert('#grant-alert', res.message, 'success');
    document.getElementById('grant-amount').value = '';
    document.getElementById('grant-reason').value = '';
    loadGrantUsers();
  } catch (err) { showAlert('#grant-alert', err.message); }
}

// ===== 順位ポイント設定 =====
async function loadRankPts() {
  try {
    const result = await apiFetch('/admin/settings/rank-pts');
    document.getElementById('rp-1').value      = result.rank_pts_1;
    document.getElementById('rp-2-3').value    = result.rank_pts_2_3;
    document.getElementById('rp-4-5').value    = result.rank_pts_4_5;
    document.getElementById('rp-6-10').value   = result.rank_pts_6_10;
    document.getElementById('rp-11-15').value  = result.rank_pts_11_15;
    document.getElementById('rp-16-20').value  = result.rank_pts_16_20;
    document.getElementById('rp-21-25').value  = result.rank_pts_21_25;
    document.getElementById('rp-26-30').value  = result.rank_pts_26_30;
    document.getElementById('rp-31plus').value = result.rank_pts_31plus;
    updateRankPtsSummary(result);
  } catch (err) { showAlert('#rank-pts-alert', err.message); }
}

function updateRankPtsSummary(r) {
  document.getElementById('rank-pts-summary').textContent =
    `1位: ${r.rank_pts_1}pt / 2〜3位: ${r.rank_pts_2_3}pt / 4〜5位: ${r.rank_pts_4_5}pt / 6〜10位: ${r.rank_pts_6_10}pt / 11〜15位: ${r.rank_pts_11_15}pt / 16〜20位: ${r.rank_pts_16_20}pt / 21〜25位: ${r.rank_pts_21_25}pt / 26〜30位: ${r.rank_pts_26_30}pt / 31位以降: ${r.rank_pts_31plus}pt`;
}

async function saveRankPts() {
  const body = {
    rank_pts_1:      parseInt(document.getElementById('rp-1').value),
    rank_pts_2_3:    parseInt(document.getElementById('rp-2-3').value),
    rank_pts_4_5:    parseInt(document.getElementById('rp-4-5').value),
    rank_pts_6_10:   parseInt(document.getElementById('rp-6-10').value),
    rank_pts_11_15:  parseInt(document.getElementById('rp-11-15').value),
    rank_pts_16_20:  parseInt(document.getElementById('rp-16-20').value),
    rank_pts_21_25:  parseInt(document.getElementById('rp-21-25').value),
    rank_pts_26_30:  parseInt(document.getElementById('rp-26-30').value),
    rank_pts_31plus: parseInt(document.getElementById('rp-31plus').value)
  };
  try {
    await apiFetch('/admin/settings/rank-pts', { method: 'PUT', body: JSON.stringify(body) });
    showAlert('#rank-pts-alert', '保存しました', 'success');
    updateRankPtsSummary(body);
  } catch (err) { showAlert('#rank-pts-alert', err.message); }
}

// ===== ポイント配布 =====
async function loadDistributable() {
  const el = document.getElementById('distributable-list');
  try {
    const events = await apiFetch('/admin/events/distributable');
    if (events.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>配布可能なイベントがありません</p></div>';
      return;
    }
    el.innerHTML = events.map(e => `

function onPoolImgSelect(input, previewId) {

    const img = document.getElementById(previewId);
    img.src = e.target.result;

  };

async function createPool() {
  const name = document.getElementById('pool-name').value.trim();
  const desc = document.getElementById('pool-desc').value.trim();
  const order = document.getElementById('pool-order').value;
  if (!name) { showAlert('#pool-alert', 'ガチャ名を入力してください'); return; }
  try {
    const imgFile = document.getElementById('pool-img-file').files[0];
    let image_base64 = null;
    if (imgFile) image_base64 = await fileToBase64(imgFile);
    await apiFetch('/admin/gacha/pools', { method: 'POST', body: JSON.stringify({ name, description: desc, order_index: parseInt(order)||0, image_base64 }) });
    showAlert('#pool-alert', '作成しました', 'success');
    document.getElementById('pool-name').value = '';
    document.getElementById('pool-desc').value = '';
    document.getElementById('pool-order').value = '0';
    document.getElementById('pool-img-file').value = '';
    document.getElementById('pool-img-preview').style.display = 'none';
    loadPools();
  } catch (err) { showAlert('#pool-alert', err.message); }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadPoolImage(poolId, input) {
  const file = input.files[0];
  if (!file) return;
  try {
    showAlert('#pool-alert', '画像をアップロード中...', 'success');
    const image_base64 = await fileToBase64(file);
    await apiFetch(`/admin/gacha/pools/${poolId}/image`, { method: 'PATCH', body: JSON.stringify({ image_base64 }) });
    showAlert('#pool-alert', '画像を更新しました', 'success');
    loadPools();
  } catch (err) { showAlert('#pool-alert', err.message); }
}

function editPool(id, name, desc, isActive, order) {
  const newName = prompt('ガチャ名', name);
  if (newName === null) return;
  const newDesc = prompt('説明（空欄でなし）', desc);
  if (newDesc === null) return;
  const newOrder = prompt('表示順', order);
  if (newOrder === null) return;
  const newActive = confirm('表示する（キャンセルで非表示）');
  apiFetch(`/admin/gacha/pools/${id}`, {
    method: 'PUT',
    body: JSON.stringify({ name: newName || name, description: newDesc || null, is_active: newActive, order_index: parseInt(newOrder)||0 })
  }).then(() => { showAlert('#pool-alert', '更新しました', 'success'); loadPools(); })
    .catch(err => showAlert('#pool-alert', err.message));
}

async function deletePool(id, name) {

    ]);

    pickupIds.forEach(id => _pickupSet.add(id));
    const rarityOrder = ['SS', 'S', 'A'];

    allIcons.forEach(ic => { if (grouped[ic.rarity]) grouped[ic.rarity].push(ic); });

    document.getElementById('btn-toggle-as').textContent = 'A・S全選択';

          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px">

              <label style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px;border-radius:8px;border:2px solid ${selectedSet.has(ic.id) ? rarityColors[r] : 'var(--border)'};background:var(--bg-primary);transition:border-color 0.15s;position:relative" onclick="toggleIconCard(this,${ic.id},'${rarityColors[r]}')">

function toggleIconCard(labelEl, iconId, color) {
  const cb = labelEl.querySelector('input[type=checkbox]');
  cb.checked = !cb.checked;
  labelEl.style.borderColor = cb.checked ? color : 'var(--border)';
}

const _rarityColors = { SS: '#ffd700', S: '#e0c060', A: '#4fc3f7' };
function toggleAllSS() {
  const labels = document.querySelectorAll('#pool-modal-icons label');
  const ssIcons = Array.from(labels).filter(label => {
    const cb = label.querySelector('input[type=checkbox]');
    const icon = _allIcons.find(i => i.id === parseInt(cb?.dataset.iconId));
    return icon && icon.rarity === 'SS';
  });
  const allChecked = ssIcons.every(label => label.querySelector('input[type=checkbox]').checked);
  ssIcons.forEach(label => {
    const cb = label.querySelector('input[type=checkbox]');
    cb.checked = !allChecked;
    label.style.borderColor = (!allChecked) ? _rarityColors['SS'] : 'var(--border)';
  });
  document.getElementById('btn-toggle-ss').textContent = allChecked ? 'SS全選択' : 'SS全解除';
}

function toggleAllAS() {
  const labels = document.querySelectorAll('#pool-modal-icons label');
  const asIcons = Array.from(labels).filter(label => {
    const cb = label.querySelector('input[type=checkbox]');
    const icon = _allIcons.find(i => i.id === parseInt(cb?.dataset.iconId));
    return icon && (icon.rarity === 'A' || icon.rarity === 'S');
  });
  const allChecked = asIcons.every(label => label.querySelector('input[type=checkbox]').checked);
  asIcons.forEach(label => {
    const cb = label.querySelector('input[type=checkbox]');
    const icon = _allIcons.find(i => i.id === parseInt(cb.dataset.iconId));
    cb.checked = !allChecked;
    label.style.borderColor = (!allChecked) ? (_rarityColors[icon.rarity]) : 'var(--border)';
  });
  document.getElementById('btn-toggle-as').textContent = allChecked ? 'A・S全選択' : 'A・S全解除';
}

function togglePickup(btn, iconId) {
  if (_pickupSet.has(iconId)) {
    _pickupSet.delete(iconId);
    btn.textContent = '☆PU';
    btn.style.borderColor = 'var(--border)';
    btn.style.color = 'var(--text-muted)';
  } else {
    _pickupSet.add(iconId);
    btn.textContent = '★PU';
    btn.style.borderColor = '#ffd700';
    btn.style.color = '#ffd700';
  }
}

// ===== キャンバスクロッパー =====
let cropState = { img: null, x: 0, y: 0, size: 100, scale: 1, dragging: false, dx: 0, dy: 0 };

function handleIconFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      cropState.img = img;
      const maxD = Math.min(img.width, img.height);
      cropState.size = maxD * 0.8;
      cropState.x = (img.width - cropState.size) / 2;
      cropState.y = (img.height - cropState.size) / 2;
      // スライダーの範囲設定
      const slider = document.getElementById('crop-size-slider');
      slider.max = maxD;
      slider.min = Math.max(20, Math.floor(maxD * 0.1));
      slider.value = Math.floor(cropState.size);
      document.getElementById('crop-section').style.display = '';
      drawCrop();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function drawCrop() {
  const canvas = document.getElementById('crop-canvas');
  const ctx = canvas.getContext('2d');
  const img = cropState.img;

  const container = canvas.parentElement.clientWidth || 360;
  const maxW = Math.min(img.width, container - 16);
  const scale = maxW / img.width;
  cropState.scale = scale;
  canvas.width  = img.width  * scale;
  canvas.height = img.height * scale;

  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const sx = cropState.x * scale, sy = cropState.y * scale, ss = cropState.size * scale;
  ctx.save();
  ctx.beginPath(); ctx.rect(sx, sy, ss, ss); ctx.clip();
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  ctx.restore();

  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.strokeRect(sx, sy, ss, ss);

  // コーナーハンドル
  const hw = 9;
  ctx.fillStyle = '#fff';
  [[sx, sy], [sx+ss-hw, sy], [sx, sy+ss-hw], [sx+ss-hw, sy+ss-hw]]
    .forEach(([cx, cy]) => ctx.fillRect(cx, cy, hw, hw));

  drawPreview();
}

function drawPreview() {
  const c = document.getElementById('crop-preview');
  const ctx = c.getContext('2d');
  c.width = 80; c.height = 80;
  ctx.clearRect(0, 0, 80, 80);
  ctx.beginPath(); ctx.arc(40, 40, 40, 0, Math.PI * 2); ctx.clip();
  ctx.drawImage(cropState.img, cropState.x, cropState.y, cropState.size, cropState.size, 0, 0, 80, 80);
}

function getCanvasXY(e) {
  const rect = document.getElementById('crop-canvas').getBoundingClientRect();
  const clientX = e.clientX ?? e.touches[0].clientX;
  const clientY = e.clientY ?? e.touches[0].clientY;
  return { x: (clientX - rect.left) / cropState.scale, y: (clientY - rect.top) / cropState.scale };
}

const cc = document.getElementById('crop-canvas');
cc.addEventListener('mousedown',  e => startDrag(getCanvasXY(e)));
cc.addEventListener('mousemove',  e => { if (cropState.dragging) moveDrag(getCanvasXY(e)); });
cc.addEventListener('mouseup',    () => { cropState.dragging = false; });
cc.addEventListener('mouseleave', () => { cropState.dragging = false; });
cc.addEventListener('touchstart', e => { e.preventDefault(); startDrag(getCanvasXY(e)); }, { passive: false });
cc.addEventListener('touchmove',  e => { e.preventDefault(); if (cropState.dragging) moveDrag(getCanvasXY(e)); }, { passive: false });
cc.addEventListener('touchend',   () => { cropState.dragging = false; });

function startDrag(p) {
  if (p.x >= cropState.x && p.x <= cropState.x + cropState.size &&
      p.y >= cropState.y && p.y <= cropState.y + cropState.size) {
    cropState.dragging = true;
    cropState.dx = p.x - cropState.x;
    cropState.dy = p.y - cropState.y;
  }
}
function moveDrag(p) {
  const img = cropState.img;
  cropState.x = Math.max(0, Math.min(img.width  - cropState.size, p.x - cropState.dx));
  cropState.y = Math.max(0, Math.min(img.height - cropState.size, p.y - cropState.dy));
  drawCrop();
}

function onCropSizeChange(val) {
  if (!cropState.img) return;
  cropState.size = Number(val);
  cropState.x = Math.min(cropState.x, cropState.img.width  - cropState.size);
  cropState.y = Math.min(cropState.y, cropState.img.height - cropState.size);
  cropState.x = Math.max(0, cropState.x);
  cropState.y = Math.max(0, cropState.y);
  drawCrop();
}

function getCroppedDataUrl() {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const ctx = c.getContext('2d');
  const r = 51; // 角丸半径（256の20%）
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(256 - r, 0);
  ctx.arcTo(256, 0, 256, r, r);
  ctx.lineTo(256, 256 - r);
  ctx.arcTo(256, 256, 256 - r, 256, r);
  ctx.lineTo(r, 256);
  ctx.arcTo(0, 256, 0, 256 - r, r);
  ctx.lineTo(0, r);
  ctx.arcTo(0, 0, r, 0, r);
  ctx.closePath();
  ctx.clip();
  ctx.drawImage(cropState.img, cropState.x, cropState.y, cropState.size, cropState.size, 0, 0, 256, 256);
  return c.toDataURL('image/png');
}

  if (!cropState.img) { showAlert('#gacha-icon-alert', '画像を選択してください'); return; }
  const name = document.getElementById('icon-name').value.trim();
  const rarity = document.getElementById('icon-rarity').value;
  if (!name) { showAlert('#gacha-icon-alert', 'アイコン名を入力してください'); return; }

  const btn = document.getElementById('add-icon-btn');
  btn.disabled = true;
  try {
    const image_base64 = getCroppedDataUrl();
    await apiFetch('/admin/gacha/icons', {
      method: 'POST',
      body: JSON.stringify({ name, rarity, image_base64 })
    });
    showAlert('#gacha-icon-alert', '追加しました', 'success');
    document.getElementById('icon-name').value = '';
    document.getElementById('icon-file').value = '';
    document.getElementById('crop-section').style.display = 'none';
    cropState.img = null;
    loadGachaIcons();
  } catch (err) {
    showAlert('#gacha-icon-alert', err.message);
  } finally {
    btn.disabled = false;
  }
}

// ===== アイコン一覧 =====
async function loadGachaIcons() {
  const el = document.getElementById('gacha-icon-list');
  try {
    const icons = await apiFetch('/admin/gacha/icons');
    if (icons.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>アイコンがありません</p></div>';
      return;
    }
    const UNITS = ['','31A','31B','31C','31D','31E','31F','30G','31X'];
    el.innerHTML = `<div class="admin-icon-grid">${icons.map(icon => `
      <div class="admin-icon-card">
        <span class="rarity-badge rarity-badge-${escHtml(icon.rarity)}">${escHtml(icon.rarity)}</span><br>
        <img src="${escHtml(icon.image_url)}" alt="${escHtml(icon.name)}"
             ${!icon.is_active ? 'style="opacity:0.4"' : ''}>
        <div class="iname">${escHtml(icon.name)}</div>
        <select class="form-input" style="font-size:0.75rem;padding:3px 6px;margin-top:6px"
          onchange="setIconUnit(${icon.id}, this.value)">
          ${UNITS.map(u => `<option value="${u}" ${icon.unit === u || (!icon.unit && u === '') ? 'selected' : ''}>${u || '部隊なし'}</option>`).join('')}
        </select>
        <div class="ibtns">
          <button class="btn btn-secondary btn-sm" onclick="toggleIconVisibility(${icon.id}, ${!icon.is_active})">
            ${icon.is_active ? '非表示' : '表示'}
          </button>
          <button class="btn btn-danger btn-sm" onclick="deleteGachaIcon(${icon.id})">削除</button>
        </div>
      </div>`).join('')}</div>`;
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

async function setIconUnit(id, unit) {
  try {
    await apiFetch(`/admin/gacha/icons/${id}/unit`, { method: 'PATCH', body: JSON.stringify({ unit }) });
  } catch (err) { showAlert('#alert', err.message); }
}

async function toggleIconVisibility(id, makeActive) {
  try {
    const res = await apiFetch(`/admin/gacha/icons/${id}/visibility`, {
      method: 'PATCH', body: JSON.stringify({ is_active: makeActive })
    });
    showAlert('#alert', res.message, 'success');
    loadGachaIcons();
  } catch (err) { showAlert('#alert', err.message); }
}

async function deleteGachaIcon(id) {
  if (!confirm('このアイコンを削除しますか？所持ユーザーからも削除されます。')) return;
  try {
    await apiFetch(`/admin/gacha/icons/${id}`, { method: 'DELETE' });
    loadGachaIcons();
  } catch (err) { showAlert('#alert', err.message); }
}

// ===== ログインボーナス設定 =====
async function loadLBSettings() {
  try {
    const data = await apiFetch('/admin/login-bonus-settings');
    const days = ['day1','day2','day3','day4','day5','day6','day7'];
    document.getElementById('lb-day-inputs').innerHTML = days.map(d => `
      <div>
        <label class="form-label">${d.replace('day','')}日目</label>
        <input class="form-input" id="lb-${d}" type="number" min="0" value="${data[d] ?? 1}">
      </div>`).join('');
  } catch (err) { showAlert('#lb-alert', err.message); }
}

async function saveLBSettings() {
  const days = ['day1','day2','day3','day4','day5','day6','day7'];
  const body = {};
  for (const d of days) body[d] = document.getElementById(`lb-${d}`)?.value;
  try {
    await apiFetch('/admin/login-bonus-settings', { method: 'PUT', body: JSON.stringify(body) });
    showAlert('#lb-alert', '保存しました', 'success');
  } catch (err) { showAlert('#lb-alert', err.message); }
}

// ===== 特別ログインボーナス =====
async function loadSpecialBonuses() {
  const el = document.getElementById('sb-list');
  try {
    const list = await apiFetch('/admin/special-bonuses');
    if (list.length === 0) { el.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem">特別ボーナスなし</div>'; return; }
    el.innerHTML = list.map(b => `
      <div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
          <div>
            <div style="font-weight:bold;margin-bottom:2px">${escHtml(b.title)}</div>
            <div style="font-size:0.75rem;color:var(--text-muted)">${escHtml(b.start_date.slice(0,10))} 〜 ${escHtml(b.end_date.slice(0,10))} ／ 上限${b.max_claims}回 ／ ${b.points_per_claim}pt</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:0.72rem;padding:2px 8px;border-radius:10px;background:${b.is_active ? 'var(--accent-dim)' : 'var(--bg-card)'};color:${b.is_active ? 'var(--accent)' : 'var(--text-muted)'}">${b.is_active ? '有効' : '無効'}</span>
            <button class="btn btn-secondary btn-sm" onclick="toggleSB(${b.id},${!b.is_active},this)">${b.is_active ? '無効化' : '有効化'}</button>
            <button class="btn btn-secondary btn-sm" onclick="deleteSB(${b.id},this)" style="color:#f87171">削除</button>
          </div>
        </div>
      </div>`).join('');
  } catch (err) { el.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`; }
}

async function createSpecialBonus() {
  const body = {
    title: document.getElementById('sb-title').value,
    start_date: document.getElementById('sb-start').value,
    end_date: document.getElementById('sb-end').value,
    max_claims: document.getElementById('sb-max').value,
    points_per_claim: document.getElementById('sb-pts').value,
  };
  try {
    await apiFetch('/admin/special-bonuses', { method: 'POST', body: JSON.stringify(body) });
    showAlert('#sb-alert', '作成しました', 'success');
    ['sb-title','sb-start','sb-end'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('sb-max').value = '1';
    document.getElementById('sb-pts').value = '5';
    loadSpecialBonuses();
  } catch (err) { showAlert('#sb-alert', err.message); }
}

async function toggleSB(id, newActive, btn) {
  btn.disabled = true;
  try {
    const item = btn.closest('div[style*="background"]');
    const title = item.querySelector('[style*="font-weight:bold"]').textContent;
    const meta = item.querySelector('[style*="font-size:0.75rem"]').textContent;
    const parts = meta.match(/(\S+) 〜 (\S+) ／ 上限(\d+)回 ／ (\d+)pt/);
    await apiFetch(`/admin/special-bonuses/${id}`, { method: 'PUT', body: JSON.stringify({
      title, start_date: parts[1], end_date: parts[2],
      max_claims: parseInt(parts[3]), points_per_claim: parseInt(parts[4]), is_active: newActive
    })});
    loadSpecialBonuses();
  } catch (err) { showAlert('#sb-alert', err.message); btn.disabled = false; }
}

async function deleteSB(id, btn) {
  if (!confirm('削除しますか？')) return;
  btn.disabled = true;
  try {
    await apiFetch(`/admin/special-bonuses/${id}`, { method: 'DELETE' });
    loadSpecialBonuses();
  } catch (err) { showAlert('#sb-alert', err.message); btn.disabled = false; }
}

// ===== ポイント履歴 =====
let _phOffset = 0;
const PH_LIMIT = 50;

async function loadHistoryUsers() {
  try {
    const users = await apiFetch('/admin/users');
    const sel = document.getElementById('ph-user');
    const cur = sel.value;
    sel.innerHTML = '<option value="">全ユーザー</option>' +
      users.map(u => `<option value="${u.id}"${String(u.id) === cur ? ' selected' : ''}>${escHtml(u.username)}</option>`).join('');
  } catch {}
}

async function loadHistory(reset = false) {
  if (reset) _phOffset = 0;
  const userId = document.getElementById('ph-user').value;
  const params = new URLSearchParams({ limit: PH_LIMIT, offset: _phOffset });
  if (userId) params.set('user_id', userId);
  try {
    const data = await apiFetch('/admin/point-history?' + params);
    const tbody = document.getElementById('ph-body');
    if (reset) tbody.innerHTML = '';
    tbody.innerHTML += data.rows.map(r => `
      <tr>
        <td style="white-space:nowrap;font-size:0.82rem">${escHtml(new Date(r.created_at).toLocaleString('ja-JP'))}</td>
        <td><a href="/user.html?id=${r.user_id}" style="color:var(--accent)">${escHtml(r.username)}</a></td>
        <td style="text-align:right;font-weight:bold;color:${r.amount >= 0 ? 'var(--accent)' : '#f87171'}">${r.amount >= 0 ? '+' : ''}${r.amount}</td>
        <td style="font-size:0.85rem;color:var(--text-muted)">${escHtml(r.reason || '')}</td>
      </tr>`).join('');
    document.getElementById('ph-total').textContent = `全 ${data.total} 件`;
    _phOffset += data.rows.length;
    document.getElementById('ph-more').style.display =
      _phOffset < data.total ? 'block' : 'none';
  } catch (err) { showAlert('#alert', err.message); }
}

function loadHistoryMore() { loadHistory(false); }
</script>
