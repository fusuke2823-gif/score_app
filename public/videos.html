<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="videos.title">動画掲示板 - HBR</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.filter-pill {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border-light);
  background: transparent;
  color: #c0c0d8;
  font-size: 0.85rem;
  cursor: pointer;
  transition: border-color .15s, background .15s, color .15s;
  white-space: nowrap;
}
.filter-pill:hover { border-color: #5a5a80; color: var(--text-primary); }
.filter-pill.active {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--text-primary);
}
.filter-section-label {
  font-size: 0.75rem;
  color: #9090b0;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.videos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
  margin-top: 12px;
}
.video-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.video-card:hover { border-color: var(--accent); }
.video-thumb {
  display: block;
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  background: var(--bg-secondary);
}
.video-thumb-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--bg-secondary);
  color: var(--text-muted);
  font-size: 2rem;
}
.video-info { padding: 10px 12px; }
.video-group { margin-bottom: 28px; }
.video-group-header {
  position: sticky;
  top: 96px;
  z-index: 10;
  font-size: 0.9rem;
  font-weight: bold;
  color: var(--text-primary);
  margin-bottom: 4px;
  padding: 8px 0 6px;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
}
.video-event {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}
.video-score {
  font-size: 1rem;
  font-weight: bold;
  color: var(--text-primary);
  flex-shrink: 0;
}
.video-user { display: flex; align-items: center; gap: 7px; }
.video-username {
  font-size: 0.85rem;
  font-weight: bold;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.name-suggestions {
  position: absolute;
  top: calc(100% + 3px);
  left: 0;
  right: 0;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  z-index: 310;
  max-height: 180px;
  overflow-y: auto;
  display: none;
}
.name-suggestion-item {
  padding: 6px 10px;
  font-size: 0.82rem;
  cursor: pointer;
  color: var(--text-primary);
}
.name-suggestion-item:hover { background: var(--bg-secondary); }
</style>
</head>
<body>
<nav id="nav"></nav>
<main class="container" style="padding-top:20px;padding-bottom:40px">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <div>
      <h2 style="font-size:1.1rem;font-weight:bold;margin-bottom:4px" data-i18n="videos.title">動画掲示板</h2>
      <p style="font-size:0.82rem;color:var(--text-muted);margin:0" data-i18n="videos.desc">公開スコアに登録された動画一覧</p>
    </div>
    <a id="video-mgmt-btn" href="/my-videos.html" class="btn btn-sm" style="display:none;background:#e53935;color:#fff;border:none">投稿・管理</a>
  </div>

  <div id="filter-bar" style="display:none;align-items:center;gap:8px;margin-bottom:14px;position:sticky;top:56px;z-index:11;background:var(--bg-primary);padding:8px 0;margin-top:-8px">
    <button id="filter-open-btn" onclick="openFilterModal()" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:0.88rem;cursor:pointer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      <span data-i18n="filter.title">フィルター</span>
    </button>
    <button id="filter-reset-btn" onclick="resetFilters()" style="display:none;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:0.88rem;cursor:pointer" data-i18n="filter.default">デフォルト</button>
  </div>

  <div id="filter-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.65);align-items:center;justify-content:center;padding:16px" onclick="if(event.target===this)closeFilterModal()">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:460px;padding:20px 20px 24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <span style="font-weight:bold;font-size:1rem" data-i18n="filter.title">フィルター</span>
        <button onclick="closeFilterModal()" style="background:none;border:none;color:var(--text-muted);font-size:1.4rem;cursor:pointer;line-height:1;padding:0 4px">&times;</button>
      </div>
      <div id="modal-body"></div>
      <div style="display:flex;gap:8px;margin-top:22px">
        <button onclick="resetFilters()" style="flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:transparent;color:#c0c0d8;font-size:0.9rem;cursor:pointer" data-i18n="filter.reset">リセット</button>
        <button onclick="closeFilterModal()" style="flex:2;padding:9px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:0.9rem;cursor:pointer;font-weight:bold" data-i18n="filter.apply_close">適用して閉じる</button>
      </div>
    </div>
  </div>

  <div id="videos-list">
    <div class="loading"><div class="spinner"></div><span data-i18n="loading">読み込み中...</span></div>
  </div>
</main>
<script src="/js/common.js"></script>
<script>
renderNav();
applyI18n();
if (getUser()) document.getElementById('video-mgmt-btn').style.display = '';

const ATTRS = ['火','氷','雷','光','闇','無'];
let allVideos = [];
let allUsernames = [];
let lazyObserver = null;
const _params = new URLSearchParams(location.search);
const filter = { attrs: new Set(), eventId: '', scoreMin: '', scoreMax: '', name: _params.get('name') || '' };

function isFiltered() {
  return filter.attrs.size > 0 || filter.eventId || filter.scoreMin !== '' || filter.scoreMax !== '' || filter.name.trim();
}

function updateFilterBar() {
  document.getElementById('filter-reset-btn').style.display = isFiltered() ? '' : 'none';
}

function openFilterModal() {
  renderModal();
  document.getElementById('filter-modal').style.display = 'flex';
}

function closeFilterModal() {
  document.getElementById('filter-modal').style.display = 'none';
}

function resetFilters() {
  filter.attrs.clear();
  filter.eventId = '';
  filter.scoreMin = '';
  filter.scoreMax = '';
  filter.name = '';
  updateFilterBar();
  renderModal();
  applyFilter();
}

function renderModal() {
  const attrBtns = ATTRS.map(a => {
    const active = filter.attrs.has(a);
    return `<button class="attr-btn attr-${a}${active ? ' active' : ''}" onclick="toggleAttr('${a}')">${t('attr.' + a) || a}</button>`;
  }).join('');

  const events = [...new Map(allVideos.map(v => [v.event_id, v.event_name])).entries()];
  const eventOptions = events.map(([id, name]) =>
    `<option value="${id}"${filter.eventId === String(id) ? ' selected' : ''}>${escHtml(name)}</option>`
  ).join('');

  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:18px">
      <div class="filter-section-label">名前検索</div>
      <div style="position:relative">
        <input id="modal-name-input" class="form-input" type="text" value="${escHtml(filter.name)}"
          placeholder="名前で検索..." style="width:100%;font-size:0.85rem;padding:6px 10px"
          oninput="onNameInput(this.value)" autocomplete="off">
        <div id="modal-name-suggestions" class="name-suggestions"></div>
      </div>
    </div>
    <div style="margin-bottom:18px">
      <div class="filter-section-label" data-i18n="filter.weak_attr">属性</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${attrBtns}</div>
    </div>
    <div style="margin-bottom:18px">
      <div class="filter-section-label">イベント</div>
      <select onchange="setEvent(this.value)" style="width:100%;padding:6px 10px;border-radius:6px;border:1px solid var(--border-light);background:var(--bg-secondary);color:var(--text-primary);font-size:0.85rem;cursor:pointer">
        <option value="">全て</option>
        ${eventOptions}
      </select>
    </div>
    <div>
      <div class="filter-section-label">スコア範囲</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <input id="modal-score-min" type="number" step="10000" value="${escHtml(String(filter.scoreMin))}" placeholder="下限"
          style="width:100px;padding:5px 8px;border-radius:6px;border:1px solid var(--border-light);background:var(--bg-card2,var(--bg-secondary));color:var(--text-primary);font-size:0.85rem;text-align:center"
          oninput="filter.scoreMin=this.value;updateFilterBar();applyFilter()">
        <span style="color:#9090b0">〜</span>
        <input id="modal-score-max" type="number" step="10000" value="${escHtml(String(filter.scoreMax))}" placeholder="上限"
          style="width:100px;padding:5px 8px;border-radius:6px;border:1px solid var(--border-light);background:var(--bg-card2,var(--bg-secondary));color:var(--text-primary);font-size:0.85rem;text-align:center"
          oninput="filter.scoreMax=this.value;updateFilterBar();applyFilter()">
      </div>
    </div>
  `;

  // オートコンプリート
  const nameInput = document.getElementById('modal-name-input');
  if (nameInput) {
    nameInput.addEventListener('focus', () => showSuggestions(nameInput.value));
    document.addEventListener('click', hideSuggestionsOutside, { once: false });
  }
}

function hideSuggestionsOutside(e) {
  const box = document.getElementById('modal-name-suggestions');
  const inp = document.getElementById('modal-name-input');
  if (box && inp && !inp.contains(e.target) && !box.contains(e.target)) {
    box.style.display = 'none';
  }
}

function onNameInput(val) {
  filter.name = val;
  updateFilterBar();
  applyFilter();
  showSuggestions(val);
}

function showSuggestions(q) {
  const box = document.getElementById('modal-name-suggestions');
  if (!box) return;
  if (!q.trim()) { box.style.display = 'none'; return; }
  const matches = allUsernames.filter(u => u.toLowerCase().includes(q.toLowerCase())).slice(0, 8);
  if (!matches.length) { box.style.display = 'none'; return; }
  box.innerHTML = matches.map(u => `<div class="name-suggestion-item" onmousedown="pickName('${escHtml(u)}')">${escHtml(u)}</div>`).join('');
  box.style.display = 'block';
}

function pickName(name) {
  filter.name = name;
  const inp = document.getElementById('modal-name-input');
  if (inp) inp.value = name;
  const box = document.getElementById('modal-name-suggestions');
  if (box) box.style.display = 'none';
  updateFilterBar();
  applyFilter();
}

function toggleAttr(a) {
  if (filter.attrs.has(a)) filter.attrs.delete(a);
  else filter.attrs.add(a);
  updateFilterBar();
  applyFilter();
  renderModal();
}

function setEvent(id) {
  filter.eventId = id;
  updateFilterBar();
  applyFilter();
}

function renderCard(v) {
  const thumb = v.approved_image_url
    ? `<a href="${escHtml(v.youtube_url)}" target="_blank" rel="noopener noreferrer">
         <img class="video-thumb lazy-img" data-src="${escHtml(mediumUrl(v.approved_image_url))}" alt="">
       </a>`
    : `<a href="${escHtml(v.youtube_url)}" target="_blank" rel="noopener noreferrer" class="video-thumb-placeholder">▶</a>`;
  const showAnon = v.is_anonymous;
  const iconLabel = showAnon ? t('ranking.anonymous').charAt(0) : escHtml(v.username.charAt(0));
  const rarityClass = v.equipped_icon_rarity ? ` icon-rarity-${escHtml(v.equipped_icon_rarity)}` : '';
  const iconInner = (!showAnon && v.equipped_icon_url)
    ? `<img src="${escHtml(thumbUrl(v.equipped_icon_url))}" alt="" class="${rarityClass.trim()}" style="width:100%;height:100%;object-fit:cover;border-radius:20%" loading="lazy">`
    : iconLabel;
  const iconEl = showAnon
    ? `<span class="rank-avatar" style="display:inline-flex;align-items:center;justify-content:center;font-size:0.75rem;color:#e8e8e8">${iconLabel}</span>`
    : `<a class="rank-avatar${rarityClass}" href="/user.html?id=${escHtml(String(v.user_id))}">${iconInner}</a>`;
  const score = v.youtube_score ?? v.approved_score;
  const username = showAnon ? escHtml(t('ranking.anonymous')) : escHtml(v.username);
  const usernameEl = showAnon
    ? `<span class="video-username">${username}</span>`
    : `<a class="video-username" href="/user.html?id=${escHtml(String(v.user_id))}" style="text-decoration:none;color:inherit">${username}</a>`;
  return `
    <div class="video-card">
      ${thumb}
      <div class="video-info">
        <div class="video-event">
          <span class="video-score">${formatScore(score)}</span>
          <span class="attr-badge attr-${escHtml(v.attribute)} small" style="flex-shrink:0">${escHtml(t('attr.' + v.attribute) || v.attribute)}</span>
        </div>
        <div class="video-user">
          ${iconEl}
          ${usernameEl}
        </div>
      </div>
    </div>`;
}

function renderGroups(videos) {
  const el = document.getElementById('videos-list');
  if (lazyObserver) { lazyObserver.disconnect(); lazyObserver = null; }

  if (!videos.length) {
    el.innerHTML = `<div class="empty-state"><p>${t('videos.empty')}</p></div>`;
    return;
  }

  const groups = [];
  let current = null;
  for (const v of videos) {
    if (!current || current.event_id !== v.event_id) {
      current = { event_id: v.event_id, event_name: v.event_name, items: [] };
      groups.push(current);
    }
    current.items.push(v);
  }

  el.innerHTML = groups.map(g => `
    <div class="video-group">
      <div class="video-group-header">${escHtml(g.event_name)}</div>
      <div class="videos-grid">${g.items.map(renderCard).join('')}</div>
    </div>`).join('');

  lazyObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const img = entry.target;
        img.src = img.dataset.src;
        img.removeAttribute('data-src');
        lazyObserver.unobserve(img);
      }
    });
  }, { rootMargin: '200px' });
  el.querySelectorAll('img.lazy-img').forEach(img => lazyObserver.observe(img));
}

function applyFilter() {
  const nameQ = filter.name.trim().toLowerCase();
  const scoreMin = filter.scoreMin !== '' ? parseInt(filter.scoreMin) : null;
  const scoreMax = filter.scoreMax !== '' ? parseInt(filter.scoreMax) : null;

  const filtered = allVideos.filter(v => {
    if (filter.attrs.size > 0 && !filter.attrs.has(v.attribute)) return false;
    if (filter.eventId && String(v.event_id) !== filter.eventId) return false;
    if (nameQ) {
      if (v.is_anonymous) return false;
      if (!(v.username || '').toLowerCase().includes(nameQ)) return false;
    }
    const score = v.youtube_score ?? v.approved_score;
    if (scoreMin !== null && score < scoreMin) return false;
    if (scoreMax !== null && score > scoreMax) return false;
    return true;
  });

  renderGroups(filtered);
}

async function load() {
  const el = document.getElementById('videos-list');
  try {
    allVideos = await apiFetch('/videos');
    if (!allVideos.length) {
      el.innerHTML = `<div class="empty-state"><p>${t('videos.empty')}</p></div>`;
      return;
    }
    allUsernames = [...new Set(allVideos.filter(v => !v.is_anonymous && v.username).map(v => v.username))].sort();
    document.getElementById('filter-bar').style.display = 'flex';
    updateFilterBar();
    isFiltered() ? applyFilter() : renderGroups(allVideos);
  } catch (e) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(e.message)}</div>`;
  }
}

load();
</script>
</body>
</html>
