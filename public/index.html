<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヘブバン ランキングボード</title>
<meta name="description" content="ヘブンバーンズレッドのスコアアタック・遭遇戦等のランキングボード。各回、各属性のスコアを投稿・閲覧できる非公式ファンサービスです。">
<meta property="og:title" content="ヘブバン ランキングボード">
<meta property="og:description" content="ヘブンバーンズレッドのスコアアタック・遭遇戦等のランキングボード。各回、各属性のスコアを投稿・閲覧できる非公式ファンサービスです。">
<meta property="og:url" content="https://hebuban-rankboard.com">
<meta name="google-site-verification" content="-t94Qe4K_8RRSefVXljjCgHLRHX39hgsLp925ioTtwU" />
<link rel="stylesheet" href="/css/style.css">
<style>
.filter-pill {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border-light);
  background: transparent;
  color: #c0c0d8;
  font-size: 0.85rem;
  cursor: pointer;
  transition: border-color .15s, background .15s, color .15s;
  white-space: nowrap;
}
.filter-pill:hover { border-color: #5a5a80; color: var(--text-primary); }
.filter-pill.active {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--text-primary);
}
.filter-section-label {
  font-size: 0.75rem;
  color: #9090b0;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: .05em;
}
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <div style="position:relative">
    <h1 class="page-title" data-i18n="index.title">ヘブバン ランキングボード</h1>
    <p id="app-version" onclick="openVersionModal()" style="font-size:0.8rem;color:var(--text-muted);margin:-8px 0 4px;cursor:pointer;display:inline-block;text-decoration:underline dotted"></p>
    <p class="page-subtitle" data-i18n="index.subtitle">制作:つんつく</p>

    <!-- ドキュメントメニュー -->
    <div style="position:absolute;top:0;right:0">
      <button id="doc-btn" onclick="toggleDocMenu(event)" style="width:36px;height:36px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0" title="利用規約・プライバシーポリシー">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="13" y2="17"/>
        </svg>
      </button>
      <div id="doc-menu" style="display:none;position:absolute;top:42px;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:4px;min-width:200px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,0.4)">
        <button onclick="copyPageLink(event)" style="display:block;width:100%;text-align:left;padding:8px 12px;border-radius:5px;font-size:0.85rem;color:var(--text-primary);background:transparent;border:none;cursor:pointer" onmouseover="this.style.background='var(--bg-card2)'" onmouseout="this.style.background='transparent'">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;vertical-align:middle"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span id="copy-link-label" data-i18n="doc.copy_link">リンクをコピー</span>
        </button>
        <div style="height:1px;background:var(--border);margin:4px 0"></div>
        <a href="/terms.html" style="display:block;padding:8px 12px;border-radius:5px;font-size:0.85rem;color:var(--text-primary);text-decoration:none" onmouseover="this.style.background='var(--bg-card2)'" onmouseout="this.style.background=''" data-i18n="doc.terms">利用規約</a>
        <a href="/privacy.html" style="display:block;padding:8px 12px;border-radius:5px;font-size:0.85rem;color:var(--text-primary);text-decoration:none" onmouseover="this.style.background='var(--bg-card2)'" onmouseout="this.style.background=''" data-i18n="doc.privacy">プライバシーポリシー</a>
      </div>
    </div>
  </div>
  <div id="alert"></div>

  <div id="filter-bar" style="display:none;align-items:center;gap:8px;margin-bottom:14px">
    <button id="filter-open-btn" onclick="openFilterModal()" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:0.88rem;cursor:pointer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      <span data-i18n="filter.title">フィルター</span>
    </button>
    <button id="filter-reset-btn" onclick="resetFilters()" style="display:none;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:0.88rem;cursor:pointer" data-i18n="filter.default">デフォルト</button>
  </div>

  <div id="filter-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.65);align-items:center;justify-content:center;padding:16px" onclick="if(event.target===this)closeFilterModal()">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:460px;padding:20px 20px 24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <span style="font-weight:bold;font-size:1rem" data-i18n="filter.title">フィルター</span>
        <button onclick="closeFilterModal()" style="background:none;border:none;color:var(--text-muted);font-size:1.4rem;cursor:pointer;line-height:1;padding:0 4px">&times;</button>
      </div>
      <div id="modal-body"></div>
      <div style="display:flex;gap:8px;margin-top:22px">
        <button onclick="resetFilters()" style="flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:transparent;color:#c0c0d8;font-size:0.9rem;cursor:pointer" data-i18n="filter.reset">リセット</button>
        <button onclick="closeFilterModal()" style="flex:2;padding:9px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:0.9rem;cursor:pointer;font-weight:bold" data-i18n="filter.apply_close">適用して閉じる</button>
      </div>
    </div>
  </div>

  <!-- バージョン履歴モーダル -->
  <div id="version-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.65);align-items:center;justify-content:center;padding:16px" onclick="if(event.target===this)closeVersionModal()">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:20px 20px 24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <span style="font-weight:bold;font-size:1rem">バージョン履歴</span>
        <button onclick="closeVersionModal()" style="background:none;border:none;color:var(--text-muted);font-size:1.4rem;cursor:pointer;line-height:1;padding:0 4px">&times;</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:0">
        <div style="padding:12px 0;border-bottom:1px solid var(--border)">
          <div style="font-weight:bold;font-size:0.95rem;color:var(--accent);margin-bottom:4px">ver 4.02.46</div>
          <div style="font-size:0.85rem;color:var(--text)">イベントフィルター追加</div>
        </div>
        <div style="padding:12px 0;border-bottom:1px solid var(--border)">
          <div style="font-weight:bold;font-size:0.95rem;margin-bottom:4px">ver 4.02.00</div>
          <div style="font-size:0.85rem;color:var(--text)">繁体字対応・外部公開準備 等</div>
        </div>
        <div style="padding:12px 0;border-bottom:1px solid var(--border)">
          <div style="font-weight:bold;font-size:0.95rem;margin-bottom:4px">ver 4.01.00</div>
          <div style="font-size:0.85rem;color:var(--text)">ガチャ機能実装 等</div>
        </div>
        <div style="padding:12px 0;border-bottom:1px solid var(--border)">
          <div style="font-weight:bold;font-size:0.95rem;margin-bottom:4px">ver 4.00.00</div>
          <div style="font-size:0.85rem;color:var(--text)">Webサイトとして公開（HTML / CSS / JS）</div>
        </div>
        <div style="padding:12px 0;border-bottom:1px solid var(--border)">
          <div style="font-weight:bold;font-size:0.95rem;margin-bottom:4px">ver 3</div>
          <div style="font-size:0.85rem;color:var(--text)">Unity再開発・手動集計。各プレイヤーの各属性スコアを保存可能に</div>
        </div>
        <div style="padding:12px 0;border-bottom:1px solid var(--border)">
          <div style="font-weight:bold;font-size:0.95rem;margin-bottom:4px">ver 2</div>
          <div style="font-size:0.85rem;color:var(--text)">Unityにて開発・手動集計</div>
        </div>
        <div style="padding:12px 0">
          <div style="font-weight:bold;font-size:0.95rem;margin-bottom:4px">ver 1</div>
          <div style="font-size:0.85rem;color:var(--text)">テキストのみ・手動集計</div>
        </div>
      </div>
    </div>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div><span data-i18n="loading">読み込み中...</span></div>
  </div>
</main>
<script src="/js/common.js"></script>
<script>
renderNav();
applyI18n();

function copyPageLink(e) {
  e.stopPropagation();
  navigator.clipboard.writeText(location.origin).then(() => {
    const el = document.getElementById('copy-link-label');
    const orig = el.textContent;
    el.textContent = t('doc.copy_done');
    setTimeout(() => {
      el.textContent = orig;
      document.getElementById('doc-menu').style.display = 'none';
    }, 1500);
  });
}

function toggleDocMenu(e) {
  e.stopPropagation();
  const m = document.getElementById('doc-menu');
  m.style.display = m.style.display === 'none' ? '' : 'none';
}
document.addEventListener('click', () => {
  const m = document.getElementById('doc-menu');
  if (m) m.style.display = 'none';
});

apiFetch('/version').then(d => {
  const el = document.getElementById('app-version');
  if (el && d.version) el.textContent = 'ver ' + d.version;
}).catch(() => {});

function openVersionModal() {
  const m = document.getElementById('version-modal');
  m.style.display = 'flex';
}
function closeVersionModal() {
  document.getElementById('version-modal').style.display = 'none';
}

let allEvents = [];

const ALL_TYPES = ['score', 'seraph'];
const ALL_ENEMY_COUNTS = ['single', 'multi'];
const ATTRS = ['火','氷','雷','光','闇'];

const filterState = {
  types: new Set(),        // empty or all = no filter
  enemyCounts: new Set(),  // empty or all = no filter
  attrMode: 'or',
  attrs: new Set(),
  drMin: '',
  drMax: '',
};

function getEventType(e) {
  if (e.name.includes('スコアアタック')) return 'score';
  if (e.name.includes('セラフ') || e.name.includes('遭遇戦')) return 'seraph';
  return 'other';
}

function isScoreOnly() {
  return filterState.types.size === 1 && filterState.types.has('score');
}

function isFiltered() {
  if (filterState.types.size > 0 && filterState.types.size < ALL_TYPES.length) return true;
  if (isScoreOnly() && filterState.enemyCounts.size > 0 && filterState.enemyCounts.size < ALL_ENEMY_COUNTS.length) return true;
  if (filterState.attrs.size > 0) return true;
  if (filterState.drMin !== '' || filterState.drMax !== '') return true;
  return false;
}

function updateFilterBar() {
  document.getElementById('filter-reset-btn').style.display = isFiltered() ? '' : 'none';
}

function renderModal() {
  const scoreOnly = isScoreOnly();

  const typePills = ALL_TYPES.map(v => {
    const label = t(v === 'score' ? 'filter.score_attack' : 'filter.seraph');
    const cls = filterState.types.has(v) ? 'filter-pill active' : 'filter-pill';
    return `<button class="${cls}" onclick="toggleType('${v}')">${label}</button>`;
  }).join('');

  const enemyCountPills = [
    { v: 'single', key: 'filter.single' },
    { v: 'multi',  key: 'filter.multi'  },
  ].map(({ v, key }) => {
    const cls = filterState.enemyCounts.has(v) ? 'filter-pill active' : 'filter-pill';
    return `<button class="${cls}" onclick="toggleEnemyCount('${v}')">${t(key)}</button>`;
  }).join('');

  const attrModePills = [
    { v: 'or',  key: 'filter.or'  },
    { v: 'and', key: 'filter.and' },
  ].map(({ v, key }) => {
    const cls = filterState.attrMode === v ? 'filter-pill active' : 'filter-pill';
    return `<button class="${cls}" onclick="setAttrMode('${v}')">${t(key)}</button>`;
  }).join('');

  const attrPills = ATTRS.map(a => {
    const isActive = filterState.attrs.has(a);
    return `<button class="attr-btn attr-${a}${isActive ? ' active' : ''}" onclick="toggleAttr('${a}')">${t('attr.' + a)}</button>`;
  }).join('');

  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:18px">
      <div class="filter-section-label">${t('filter.event_type')}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${typePills}</div>
    </div>
    <div style="margin-bottom:18px;transition:opacity .2s;${scoreOnly ? '' : 'opacity:0.3;pointer-events:none'}">
      <div class="filter-section-label">${t('filter.enemy_count')}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${enemyCountPills}</div>
    </div>
    <div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span class="filter-section-label" style="margin:0">${t('filter.weak_attr')}</span>
        <div style="display:flex;gap:4px">${attrModePills}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${attrPills}</div>
    </div>
    <div>
      <div class="filter-section-label">${t('filter.destruction_rate')}</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <input id="dr-min" type="number" min="0" step="100" placeholder="100" value="${filterState.drMin}"
          style="width:60px;padding:5px 8px;border-radius:6px;border:1px solid var(--border-light);background:var(--bg-card2);color:var(--text-primary);font-size:0.85rem;text-align:center"
          oninput="setDr('Min',this.value)">
        <span style="color:#9090b0">%　〜　</span>
        <input id="dr-max" type="number" min="0" step="100" placeholder="999" value="${filterState.drMax}"
          style="width:60px;padding:5px 8px;border-radius:6px;border:1px solid var(--border-light);background:var(--bg-card2);color:var(--text-primary);font-size:0.85rem;text-align:center"
          oninput="setDr('Max',this.value)">
        <span style="color:#9090b0">%</span>
        <button onclick="resetDr()" style="padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:#c0c0d8;font-size:0.82rem;cursor:pointer">${t('filter.reset')}</button>
      </div>
    </div>
  `;
}

function toggleType(v) {
  if (filterState.types.has(v)) filterState.types.delete(v);
  else filterState.types.add(v);
  if (!isScoreOnly()) filterState.enemyCounts.clear();
  renderModal();
  updateFilterBar();
  renderEvents();
}

function toggleEnemyCount(v) {
  if (filterState.enemyCounts.has(v)) filterState.enemyCounts.delete(v);
  else filterState.enemyCounts.add(v);
  renderModal();
  updateFilterBar();
  renderEvents();
}

function setDr(type, value) {
  filterState['dr' + type] = value;
  updateFilterBar();
  renderEvents();
}

function resetDr() {
  filterState.drMin = '';
  filterState.drMax = '';
  const minEl = document.getElementById('dr-min');
  const maxEl = document.getElementById('dr-max');
  if (minEl) minEl.value = '';
  if (maxEl) maxEl.value = '';
  updateFilterBar();
  renderEvents();
}

function setAttrMode(v) {
  filterState.attrMode = v;
  renderModal();
  renderEvents();
}

function toggleAttr(a) {
  if (filterState.attrs.has(a)) filterState.attrs.delete(a);
  else filterState.attrs.add(a);
  renderModal();
  updateFilterBar();
  renderEvents();
}

function openFilterModal() {
  renderModal();
  document.getElementById('filter-modal').style.display = 'flex';
}

function closeFilterModal() {
  document.getElementById('filter-modal').style.display = 'none';
}

function resetFilters() {
  filterState.types.clear();
  filterState.enemyCounts.clear();
  filterState.attrMode = 'or';
  filterState.attrs.clear();
  filterState.drMin = '';
  filterState.drMax = '';
  updateFilterBar();
  renderEvents();
  closeFilterModal();
}

function filterEvents() {
  return allEvents.filter(e => {
    // empty or all selected = no filter
    if (filterState.types.size > 0 && filterState.types.size < ALL_TYPES.length) {
      if (!filterState.types.has(getEventType(e))) return false;
    }
    if (isScoreOnly() && filterState.enemyCounts.size > 0 && filterState.enemyCounts.size < ALL_ENEMY_COUNTS.length) {
      const cnt = parseInt(e.enemy_count) || 0;
      if (filterState.enemyCounts.has('single') && !filterState.enemyCounts.has('multi') && cnt !== 1) return false;
      if (filterState.enemyCounts.has('multi') && !filterState.enemyCounts.has('single') && cnt < 2) return false;
    }
    if (filterState.attrs.size > 0) {
      const eventAttrs = new Set(
        (e.first_enemy_weak || '').split(',').map(a => a.trim()).filter(Boolean)
      );
      if (filterState.attrMode === 'or') {
        if (![...filterState.attrs].some(a => eventAttrs.has(a))) return false;
      } else {
        if (![...filterState.attrs].every(a => eventAttrs.has(a))) return false;
      }
    }
    if (filterState.drMin !== '' || filterState.drMax !== '') {
      const dr = e.first_enemy_destruction_rate;
      if (dr == null) return false;
      if (filterState.drMin !== '' && dr < parseInt(filterState.drMin)) return false;
      if (filterState.drMax !== '' && dr > parseInt(filterState.drMax)) return false;
    }
    return true;
  });
}

function renderEvents() {
  const el = document.getElementById('content');
  const filtered = filterEvents();
  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><p>${t('filter.no_match')}</p></div>`;
    return;
  }
  const now = new Date();
  el.innerHTML = `<div class="event-grid">${filtered.map(e => {
    const start = e.submission_start ? new Date(e.submission_start) : null;
    const end = e.submission_end ? new Date(e.submission_end) : null;
    let statusLabel, statusStyle;
    if (start && now < start) {
      statusLabel = t('event.before');
      statusStyle = 'color:var(--text-muted)';
    } else if (end && now > end) {
      statusLabel = t('event.ended');
      statusStyle = 'color:var(--text-muted)';
    } else if (end) {
      const diffMs = end - now;
      const diffHours = diffMs / (1000 * 60 * 60);
      const remaining = diffHours < 24
        ? t('event.hours_left', Math.ceil(diffHours))
        : t('event.days_left', Math.ceil(diffHours / 24));
      statusLabel = `${t('event.active')} ${remaining}`;
      statusStyle = 'color:#4caf50;font-weight:bold';
    } else {
      statusLabel = t('event.active');
      statusStyle = 'color:#4caf50;font-weight:bold';
    }
    return `
    <a class="event-card" href="/ranking.html?id=${e.id}" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
      <div style="flex:1;min-width:0">
        <div class="event-name">${escHtml(e.name)}</div>
        <div class="event-meta" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="${statusStyle}">${statusLabel}</span>
          ${e.first_enemy_weak ? e.first_enemy_weak.split(',').filter(Boolean).map(a => `<span style="font-size:0.72rem">${attrBadge(a, true)}</span>`).join('') : ''}
        </div>
      </div>
      ${e.first_enemy_image ? `<img src="${escHtml(e.first_enemy_image)}" alt="" style="width:64px;height:64px;object-fit:contain;flex-shrink:0;opacity:0.92;margin:-4px 0">` : ''}
    </a>`;
  }).join('')}</div>`;
}

async function load() {
  try {
    allEvents = await apiFetch('/events');
    const el = document.getElementById('content');
    if (allEvents.length === 0) {
      el.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <p>${t('event.empty')}</p>
      </div>`;
      return;
    }
    document.getElementById('filter-bar').style.display = 'flex';
    renderEvents();
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

load();
</script>
</body>
</html>
