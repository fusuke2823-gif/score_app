<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBR スコアアタックランキング</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav id="nav"></nav>
<main>
  <h1 class="page-title">ヘブバン ランキングボード</h1>
  <p id="app-version" style="font-size:0.8rem;color:var(--text-muted);margin:-8px 0 4px"></p>
  <p class="page-subtitle">制作:つんつく</p>
  <div id="alert"></div>
  <div id="content">
    <div class="loading"><div class="spinner"></div>読み込み中...</div>
  </div>
</main>
<script src="/js/common.js"></script>
<script>
renderNav();

apiFetch('/version').then(d => {
  const el = document.getElementById('app-version');
  if (el && d.version) el.textContent = 'ver ' + d.version;
}).catch(() => {});

async function load() {
  try {
    const events = await apiFetch('/events');
    const el = document.getElementById('content');
    if (events.length === 0) {
      el.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <p>現在公開中のイベントはありません</p>
      </div>`;
      return;
    }
    const now = new Date();
    el.innerHTML = `<div class="event-grid">${events.map(e => {
      const start = e.submission_start ? new Date(e.submission_start) : null;
      const end = e.submission_end ? new Date(e.submission_end) : null;
      let statusLabel, statusStyle;
      if (start && now < start) {
        statusLabel = '開催前';
        statusStyle = 'color:var(--text-muted)';
      } else if (end && now > end) {
        statusLabel = '終了';
        statusStyle = 'color:var(--text-muted)';
      } else {
        statusLabel = '開催中';
        statusStyle = 'color:#4caf50;font-weight:bold';
      }
      return `
      <a class="event-card" href="/ranking.html?id=${e.id}">
        <div class="event-number">第${e.event_number}回</div>
        <div class="event-name">${escHtml(e.name)}</div>
        <div class="event-meta" style="${statusStyle}">${statusLabel}</div>
      </a>`;
    }).join('')}</div>`;
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

load();
</script>
</body>
</html>
