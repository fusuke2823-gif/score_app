<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBR スコアアタックランキング</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.filter-pill {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border-light);
  background: transparent;
  color: #c0c0d8;
  font-size: 0.85rem;
  cursor: pointer;
  transition: border-color .15s, background .15s, color .15s;
  white-space: nowrap;
}
.filter-pill:hover { border-color: #5a5a80; color: var(--text-primary); }
.filter-pill.active {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--text-primary);
}
.filter-pill.active-fire   { border-color: var(--fire);    background: var(--fire-bg);    color: var(--fire);    }
.filter-pill.active-ice    { border-color: var(--ice);     background: var(--ice-bg);     color: var(--ice);     }
.filter-pill.active-thunder{ border-color: var(--thunder); background: var(--thunder-bg); color: var(--thunder); }
.filter-pill.active-light  { border-color: var(--light);   background: var(--light-bg);   color: var(--light);   }
.filter-pill.active-dark   { border-color: var(--dark);    background: var(--dark-bg);    color: var(--dark);    }
.filter-pill.active-none   { border-color: var(--none);    background: var(--none-bg);    color: var(--none);    }
.filter-section-label {
  font-size: 0.75rem;
  color: #9090b0;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: .05em;
}
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <h1 class="page-title" data-i18n="index.title">ヘブバン ランキングボード</h1>
  <p id="app-version" style="font-size:0.8rem;color:var(--text-muted);margin:-8px 0 4px"></p>
  <p class="page-subtitle" data-i18n="index.subtitle">制作:つんつく</p>
  <div id="alert"></div>

  <div id="filter-bar" style="display:none;align-items:center;gap:8px;margin-bottom:14px">
    <button id="filter-open-btn" onclick="openFilterModal()" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:0.88rem;cursor:pointer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      フィルター
      <span id="filter-badge" style="display:none;background:var(--accent);color:#fff;border-radius:10px;padding:0 6px;font-size:0.72rem;line-height:18px;min-width:18px;text-align:center"></span>
    </button>
    <button id="filter-reset-btn" onclick="resetFilters()" style="display:none;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:0.88rem;cursor:pointer">デフォルト</button>
  </div>

  <div id="filter-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.65);align-items:center;justify-content:center;padding:16px" onclick="if(event.target===this)closeFilterModal()">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:460px;padding:20px 20px 24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <span style="font-weight:bold;font-size:1rem">フィルター</span>
        <button onclick="closeFilterModal()" style="background:none;border:none;color:var(--text-muted);font-size:1.4rem;cursor:pointer;line-height:1;padding:0 4px">&times;</button>
      </div>
      <div id="modal-body"></div>
      <div style="display:flex;gap:8px;margin-top:22px">
        <button onclick="resetFilters()" style="flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:transparent;color:#c0c0d8;font-size:0.9rem;cursor:pointer">リセット</button>
        <button onclick="closeFilterModal()" style="flex:2;padding:9px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:0.9rem;cursor:pointer;font-weight:bold">適用して閉じる</button>
      </div>
    </div>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div><span data-i18n="loading">読み込み中...</span></div>
  </div>
</main>
<script src="/js/common.js"></script>
<script>
renderNav();
applyI18n();

apiFetch('/version').then(d => {
  const el = document.getElementById('app-version');
  if (el && d.version) el.textContent = 'ver ' + d.version;
}).catch(() => {});

let allEvents = [];

const ALL_TYPES = ['score', 'seraph'];
const ATTRS = ['火','氷','雷','光','闇','無'];
const ATTR_CLASS = { '火':'fire', '氷':'ice', '雷':'thunder', '光':'light', '闇':'dark', '無':'none' };

const filterState = {
  types: new Set(),   // empty or all = no filter
  enemyCount: 'all',
  attrMode: 'or',
  attrs: new Set(),
};

function getEventType(e) {
  if (e.name.includes('スコアアタック')) return 'score';
  if (e.name.includes('セラフ') || e.name.includes('遭遇戦')) return 'seraph';
  return 'other';
}

function isScoreOnly() {
  return filterState.types.size === 1 && filterState.types.has('score');
}

function getActiveFilterCount() {
  let n = 0;
  if (filterState.types.size > 0 && filterState.types.size < ALL_TYPES.length) n++;
  if (isScoreOnly() && filterState.enemyCount !== 'all') n++;
  if (filterState.attrs.size > 0) n++;
  return n;
}

function updateFilterBar() {
  const count = getActiveFilterCount();
  const badge = document.getElementById('filter-badge');
  const resetBtn = document.getElementById('filter-reset-btn');
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = '';
    resetBtn.style.display = '';
  } else {
    badge.style.display = 'none';
    resetBtn.style.display = 'none';
  }
}

function renderModal() {
  const scoreOnly = isScoreOnly();

  const typePills = ALL_TYPES.map(v => {
    const label = v === 'score' ? 'スコアアタック' : 'セラフ遭遇戦演習';
    const cls = filterState.types.has(v) ? 'filter-pill active' : 'filter-pill';
    return `<button class="${cls}" onclick="toggleType('${v}')">${label}</button>`;
  }).join('');

  const enemyCountPills = [
    { v: 'all', label: 'すべて' },
    { v: 'single', label: '単体' },
    { v: 'multi', label: '２体以上' },
  ].map(({ v, label }) => {
    const cls = filterState.enemyCount === v ? 'filter-pill active' : 'filter-pill';
    return `<button class="${cls}" onclick="setEnemyCount('${v}')">${label}</button>`;
  }).join('');

  const attrModePills = [
    { v: 'or', label: 'いずれか' },
    { v: 'and', label: 'すべて含む' },
  ].map(({ v, label }) => {
    const cls = filterState.attrMode === v ? 'filter-pill active' : 'filter-pill';
    return `<button class="${cls}" onclick="setAttrMode('${v}')">${label}</button>`;
  }).join('');

  const attrPills = ATTRS.map(a => {
    const isActive = filterState.attrs.has(a);
    const cls = isActive ? `filter-pill active-${ATTR_CLASS[a]}` : 'filter-pill';
    return `<button class="${cls}" onclick="toggleAttr('${a}')">${a}</button>`;
  }).join('');

  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:18px">
      <div class="filter-section-label">イベント種類</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${typePills}</div>
    </div>
    <div style="margin-bottom:18px;transition:opacity .2s;${scoreOnly ? '' : 'opacity:0.3;pointer-events:none'}">
      <div class="filter-section-label">敵数（スコアアタックのみ）</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${enemyCountPills}</div>
    </div>
    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span class="filter-section-label" style="margin:0">弱点属性</span>
        <div style="display:flex;gap:4px">${attrModePills}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${attrPills}</div>
    </div>
  `;
}

function toggleType(v) {
  if (filterState.types.has(v)) filterState.types.delete(v);
  else filterState.types.add(v);
  if (!isScoreOnly()) filterState.enemyCount = 'all';
  renderModal();
  updateFilterBar();
  renderEvents();
}

function setEnemyCount(v) {
  filterState.enemyCount = v;
  renderModal();
  updateFilterBar();
  renderEvents();
}

function setAttrMode(v) {
  filterState.attrMode = v;
  renderModal();
  renderEvents();
}

function toggleAttr(a) {
  if (filterState.attrs.has(a)) filterState.attrs.delete(a);
  else filterState.attrs.add(a);
  renderModal();
  updateFilterBar();
  renderEvents();
}

function openFilterModal() {
  renderModal();
  document.getElementById('filter-modal').style.display = 'flex';
}

function closeFilterModal() {
  document.getElementById('filter-modal').style.display = 'none';
}

function resetFilters() {
  filterState.types.clear();
  filterState.enemyCount = 'all';
  filterState.attrMode = 'or';
  filterState.attrs.clear();
  updateFilterBar();
  renderEvents();
  closeFilterModal();
}

function filterEvents() {
  return allEvents.filter(e => {
    // empty or all selected = no filter
    if (filterState.types.size > 0 && filterState.types.size < ALL_TYPES.length) {
      if (!filterState.types.has(getEventType(e))) return false;
    }
    if (isScoreOnly() && filterState.enemyCount !== 'all') {
      const cnt = parseInt(e.enemy_count) || 0;
      if (filterState.enemyCount === 'single' && cnt !== 1) return false;
      if (filterState.enemyCount === 'multi' && cnt < 2) return false;
    }
    if (filterState.attrs.size > 0) {
      const eventAttrs = new Set(
        (e.first_enemy_weak || '').split(',').map(a => a.trim()).filter(Boolean)
      );
      if (filterState.attrMode === 'or') {
        if (![...filterState.attrs].some(a => eventAttrs.has(a))) return false;
      } else {
        if (![...filterState.attrs].every(a => eventAttrs.has(a))) return false;
      }
    }
    return true;
  });
}

function renderEvents() {
  const el = document.getElementById('content');
  const filtered = filterEvents();
  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><p>条件に一致するイベントがありません</p></div>`;
    return;
  }
  const now = new Date();
  el.innerHTML = `<div class="event-grid">${filtered.map(e => {
    const start = e.submission_start ? new Date(e.submission_start) : null;
    const end = e.submission_end ? new Date(e.submission_end) : null;
    let statusLabel, statusStyle;
    if (start && now < start) {
      statusLabel = t('event.before');
      statusStyle = 'color:var(--text-muted)';
    } else if (end && now > end) {
      statusLabel = t('event.ended');
      statusStyle = 'color:var(--text-muted)';
    } else if (end) {
      const diffMs = end - now;
      const diffHours = diffMs / (1000 * 60 * 60);
      const remaining = diffHours < 24
        ? t('event.hours_left', Math.ceil(diffHours))
        : t('event.days_left', Math.ceil(diffHours / 24));
      statusLabel = `${t('event.active')} ${remaining}`;
      statusStyle = 'color:#4caf50;font-weight:bold';
    } else {
      statusLabel = t('event.active');
      statusStyle = 'color:#4caf50;font-weight:bold';
    }
    return `
    <a class="event-card" href="/ranking.html?id=${e.id}" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
      <div style="flex:1;min-width:0">
        <div class="event-name">${escHtml(e.name)}</div>
        <div class="event-meta" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="${statusStyle}">${statusLabel}</span>
          ${e.first_enemy_weak ? e.first_enemy_weak.split(',').filter(Boolean).map(a => `<span style="font-size:0.72rem">${attrBadge(a, true)}</span>`).join('') : ''}
        </div>
      </div>
      ${e.first_enemy_image ? `<img src="${escHtml(e.first_enemy_image)}" alt="" style="width:64px;height:64px;object-fit:contain;flex-shrink:0;opacity:0.92;margin:-4px 0">` : ''}
    </a>`;
  }).join('')}</div>`;
}

async function load() {
  try {
    allEvents = await apiFetch('/events');
    const el = document.getElementById('content');
    if (allEvents.length === 0) {
      el.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <p>${t('event.empty')}</p>
      </div>`;
      return;
    }
    document.getElementById('filter-bar').style.display = 'flex';
    renderEvents();
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

load();
</script>
</body>
</html>
