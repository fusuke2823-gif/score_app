<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBR スコアアタックランキング</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav id="nav"></nav>
<main>
  <h1 class="page-title" data-i18n="index.title">ヘブバン ランキングボード</h1>
  <p id="app-version" style="font-size:0.8rem;color:var(--text-muted);margin:-8px 0 4px"></p>
  <p class="page-subtitle" data-i18n="index.subtitle">制作:つんつく</p>
  <div id="alert"></div>
  <div id="content">
    <div class="loading"><div class="spinner"></div><span data-i18n="loading">読み込み中...</span></div>
  </div>
</main>
<script src="/js/common.js"></script>
<script>
renderNav();
applyI18n();

apiFetch('/version').then(d => {
  const el = document.getElementById('app-version');
  if (el && d.version) el.textContent = 'ver ' + d.version;
}).catch(() => {});

async function load() {
  try {
    const events = await apiFetch('/events');
    const el = document.getElementById('content');
    if (events.length === 0) {
      el.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <p>${t('event.empty')}</p>
      </div>`;
      return;
    }
    const now = new Date();
    el.innerHTML = `<div class="event-grid">${events.map(e => {
      const start = e.submission_start ? new Date(e.submission_start) : null;
      const end = e.submission_end ? new Date(e.submission_end) : null;
      let statusLabel, statusStyle;
      if (start && now < start) {
        statusLabel = t('event.before');
        statusStyle = 'color:var(--text-muted)';
      } else if (end && now > end) {
        statusLabel = t('event.ended');
        statusStyle = 'color:var(--text-muted)';
      } else if (end) {
        const diffMs = end - now;
        const diffHours = diffMs / (1000 * 60 * 60);
        const remaining = diffHours < 24
          ? t('event.hours_left', Math.ceil(diffHours))
          : t('event.days_left', Math.ceil(diffHours / 24));
        statusLabel = `${t('event.active')} ${remaining}`;
        statusStyle = 'color:#4caf50;font-weight:bold';
      } else {
        statusLabel = t('event.active');
        statusStyle = 'color:#4caf50;font-weight:bold';
      }
      return `
      <a class="event-card" href="/ranking.html?id=${e.id}" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <div style="flex:1;min-width:0">
          <div class="event-name">${escHtml(e.name)}</div>
          <div class="event-meta" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span style="${statusStyle}">${statusLabel}</span>
            ${e.first_enemy_weak ? e.first_enemy_weak.split(',').filter(Boolean).map(a => `<span style="font-size:0.72rem">${attrBadge(a, true)}</span>`).join('') : ''}
          </div>
        </div>
        ${e.first_enemy_image ? `<img src="${escHtml(e.first_enemy_image)}" alt="" style="width:64px;height:64px;object-fit:contain;flex-shrink:0;opacity:0.92;margin:-4px 0">` : ''}
      </a>`;
    }).join('')}</div>`;
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

load();
</script>
</body>
</html>
