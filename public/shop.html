<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ショップ - HBR</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.points-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 20px;
  margin-bottom: 24px;
}
.points-label { color: var(--text-secondary); font-size: 0.9rem; }
.points-value { font-size: 1.4rem; font-weight: bold; color: var(--accent); }

.title-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.title-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.title-card.owned { border-color: var(--accent); }
.title-card.equipped { background: var(--accent-dim); border-color: var(--accent); }
.title-name { font-size: 1rem; font-weight: bold; }
.title-desc { font-size: 0.82rem; color: var(--text-muted); flex: 1; }
.title-cost { font-size: 0.9rem; color: var(--accent); font-weight: bold; }
.title-badge {
  font-size: 0.72rem;
  padding: 2px 8px;
  border-radius: 10px;
  display: inline-block;
  background: var(--accent-dim);
  color: var(--accent);
  align-self: flex-start;
}

/* フレームプレビュー */
.frame-preview {
  height: 6px;
  border-radius: 3px;
  margin-bottom: 4px;
}
.frame-gold      { background: #ffd700; }
.frame-silver    { background: #c0c0c0; }
.frame-neon-blue { background: #00cfff; }
.frame-neon-pink { background: #ff4dd2; }
.frame-fire      { background: linear-gradient(90deg,#ff6a00,#ee0979); }
.frame-rainbow   { background: linear-gradient(90deg,#ff4d4d,#ff9a00,#ffe600,#4dff6e,#00cfff,#b44dff); }

.tabs { margin-bottom: 20px; }
.shop-tab-content { display: none; }
.shop-tab-content.active { display: block; }
.section-label { font-size: 0.82rem; font-weight: bold; color: var(--text-muted); margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 0.05em; }

/* アイコングリッド（装備タブ） */
.equip-icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
.equip-icon-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 8px; text-align: center; cursor: pointer; transition: border-color 0.15s;
}
.equip-icon-card.equipped { background: var(--accent-dim); border-color: var(--accent); }
.equip-icon-card img { width: 56px; height: 56px; border-radius: 20%; object-fit: cover; }
.equip-icon-card .iname { font-size: 0.72rem; margin-top: 6px; word-break: break-all; color: var(--text-secondary); }
.equip-icon-none {
  background: var(--bg-card); border: 1px dashed var(--border); border-radius: 10px;
  padding: 10px 8px; text-align: center; cursor: pointer; transition: border-color 0.15s;
}
.equip-icon-none.equipped { border-color: var(--accent); background: var(--accent-dim); }
.equip-icon-none .iname { font-size: 0.72rem; margin-top: 6px; color: var(--text-muted); }
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <h1 class="page-title" id="page-title">ショップ</h1>
  <div id="alert"></div>

  <div id="points-bar" style="display:none" class="points-bar">
    <span class="points-label">所持ポイント</span>
    <span class="points-value" id="my-points">0</span>
    <span class="points-label">pt</span>
  </div>

  <!-- ショップ（称号・フレームのサブタブ） -->
  <div class="tab-content active" id="tab-shop">
    <div class="tabs" id="shop-tabs" style="margin-bottom:16px">
      <button class="tab-btn active" onclick="switchShopTab('titles')">称号</button>
      <button class="tab-btn" onclick="switchShopTab('frames')">フレーム</button>
    </div>
    <div class="shop-tab-content active" id="shop-tab-titles">
      <div id="shop-titles"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
    </div>
    <div class="shop-tab-content" id="shop-tab-frames">
      <div id="shop-frames"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
    </div>
  </div>

  <!-- 装備（所持称号＋フレーム＋アイコンのサブタブ） -->
  <div class="tab-content" id="tab-equip">
    <div class="tabs" id="equip-tabs" style="margin-bottom:16px">
      <button class="tab-btn active" onclick="switchEquipTab('titles')">称号</button>
      <button class="tab-btn" onclick="switchEquipTab('frames')">フレーム</button>
      <button class="tab-btn" onclick="switchEquipTab('icons')">アイコン</button>
    </div>
    <div class="shop-tab-content active" id="equip-tab-titles">
      <div id="my-titles"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
    </div>
    <div class="shop-tab-content" id="equip-tab-frames">
      <div id="my-frames"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
    </div>
    <div class="shop-tab-content" id="equip-tab-icons">
      <div id="my-icons"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
    </div>
  </div>
</main>

<script src="/js/common.js"></script>
<script>
renderNav();

const user = getUser();
let myData = null;

function switchTab(name) {
  ['shop','equip'].forEach(n => {
    document.getElementById('tab-' + n).classList.toggle('active', n === name);
  });
  document.getElementById('page-title').textContent = name === 'equip' ? '装備' : 'ショップ';
}

function switchEquipTab(name) {
  document.querySelectorAll('#equip-tabs .tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['titles','frames','icons'][i] === name);
  });
  ['titles','frames','icons'].forEach(n => {
    document.getElementById('equip-tab-' + n).classList.toggle('active', n === name);
  });
}

function switchShopTab(name) {
  document.querySelectorAll('#shop-tabs .tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['titles','frames'][i] === name);
  });
  document.querySelectorAll('.shop-tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('shop-tab-' + name).classList.add('active');
}

async function load() {
  try {
    const [titles, frames] = await Promise.all([
      apiFetch('/shop/titles'),
      apiFetch('/shop/frames')
    ]);
    if (user) {
      document.getElementById('points-bar').style.display = '';
      myData = await apiFetch('/shop/my');
      document.getElementById('my-points').textContent = myData.points;
      renderMyTitles();
      renderMyFrames();
      await renderMyIcons();
    }
    renderShopTitles(titles);
    renderShopFrames(frames);
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

async function refreshMyData() {
  myData = await apiFetch('/shop/my');
  document.getElementById('my-points').textContent = myData.points;
}

// ===== 称号 =====
function renderShopTitles(titles) {
  const el = document.getElementById('shop-titles');
  if (!titles || titles.length === 0) {
    el.innerHTML = '<div class="empty-state"><p>購入できる称号がありません</p></div>';
    return;
  }
  el.innerHTML = `<div class="title-grid">${titles.map(t => {
    const owned = myData?.titles.some(mt => mt.id === t.id);
    const equipped = myData?.equipped_title_id === t.id;
    return `
      <div class="title-card ${equipped ? 'equipped' : owned ? 'owned' : ''}">
        <div class="title-name">「${escHtml(t.name)}」</div>
        ${t.description ? `<div class="title-desc">${escHtml(t.description)}</div>` : '<div class="title-desc"></div>'}
        <div class="title-cost">${t.point_cost}pt</div>
        ${equipped
          ? `<span class="title-badge">装備中</span>`
          : owned
            ? `<span class="title-badge">所持済み</span>`
            : user
              ? `<button class="btn btn-primary btn-sm" onclick="buyTitle(${t.id},'${escHtml(t.name)}',${t.point_cost})">購入する</button>`
              : `<span style="font-size:0.8rem;color:var(--text-muted)">ログインして購入</span>`
        }
      </div>`;
  }).join('')}</div>`;
}

function renderMyTitles() {
  const el = document.getElementById('my-titles');
  if (!myData?.titles?.length) {
    el.innerHTML = '<div class="empty-state"><p>所持している称号がありません</p></div>';
    return;
  }
  el.innerHTML = `<div class="title-grid">${myData.titles.map(t => {
    const equipped = myData.equipped_title_id === t.id;
    return `
      <div class="title-card ${equipped ? 'equipped' : ''}">
        <div class="title-name">「${escHtml(t.name)}」</div>
        ${t.description ? `<div class="title-desc">${escHtml(t.description)}</div>` : ''}
        ${t.point_cost ? `<div class="title-cost">${t.point_cost}pt</div>` : `<span class="title-badge">称号獲得</span>`}
        ${equipped
          ? `<span class="title-badge">装備中</span>
             <button class="btn btn-secondary btn-sm" onclick="equipTitle(null)">外す</button>`
          : `<button class="btn btn-primary btn-sm" onclick="equipTitle(${t.id})">装備する</button>`
        }
      </div>`;
  }).join('')}</div>`;
}

async function buyTitle(id, name, cost) {
  if (!confirm(`「${name}」を ${cost}pt で購入しますか？`)) return;
  try {
    const res = await apiFetch(`/shop/buy/${id}`, { method: 'POST' });
    showAlert('#alert', res.message, 'success');
    await refreshMyData();
    const titles = await apiFetch('/shop/titles');
    renderShopTitles(titles);
    renderMyTitles();
  } catch (err) { showAlert('#alert', err.message); }
}

async function equipTitle(id) {
  try {
    const res = await apiFetch('/shop/equip', { method: 'POST', body: JSON.stringify({ title_id: id }) });
    showAlert('#alert', res.message, 'success');
    await refreshMyData();
    const titles = await apiFetch('/shop/titles');
    renderShopTitles(titles);
    renderMyTitles();
  } catch (err) { showAlert('#alert', err.message); }
}

// ===== フレーム =====
const FRAME_LABELS = {
  'frame-gold': 'ゴールド',
  'frame-silver': 'シルバー',
  'frame-neon-blue': 'ネオンブルー',
  'frame-neon-pink': 'ネオンピンク',
  'frame-fire': 'ファイア',
  'frame-rainbow': 'レインボー'
};

function renderShopFrames(frames) {
  const el = document.getElementById('shop-frames');
  if (!frames || frames.length === 0) {
    el.innerHTML = '<div class="empty-state"><p>購入できるフレームがありません</p></div>';
    return;
  }
  el.innerHTML = `<div class="title-grid">${frames.map(f => {
    const owned = myData?.frames?.some(mf => mf.id === f.id);
    const equipped = myData?.equipped_frame_id === f.id;
    return `
      <div class="title-card ${equipped ? 'equipped' : owned ? 'owned' : ''}">
        <div class="frame-preview ${escHtml(f.css_class)}"></div>
        <div class="title-name">${escHtml(f.name)}</div>
        ${f.description ? `<div class="title-desc">${escHtml(f.description)}</div>` : '<div class="title-desc"></div>'}
        <div class="title-cost">${f.point_cost}pt</div>
        ${equipped
          ? `<span class="title-badge">装備中</span>`
          : owned
            ? `<span class="title-badge">所持済み</span>`
            : user
              ? `<button class="btn btn-primary btn-sm" onclick="buyFrame(${f.id},'${escHtml(f.name)}',${f.point_cost})">購入する</button>`
              : `<span style="font-size:0.8rem;color:var(--text-muted)">ログインして購入</span>`
        }
      </div>`;
  }).join('')}</div>`;
}

function renderMyFrames() {
  const el = document.getElementById('my-frames');
  if (!myData?.frames?.length) {
    el.innerHTML = '<div class="empty-state"><p>所持しているフレームがありません</p></div>';
    return;
  }
  el.innerHTML = `<div class="title-grid">${myData.frames.map(f => {
    const equipped = myData.equipped_frame_id === f.id;
    return `
      <div class="title-card ${equipped ? 'equipped' : ''}">
        <div class="frame-preview ${escHtml(f.css_class)}"></div>
        <div class="title-name">${escHtml(f.name)}</div>
        ${f.description ? `<div class="title-desc">${escHtml(f.description)}</div>` : ''}
        <div class="title-cost">${f.point_cost}pt</div>
        ${equipped
          ? `<span class="title-badge">装備中</span>
             <button class="btn btn-secondary btn-sm" onclick="equipFrame(null)">外す</button>`
          : `<button class="btn btn-primary btn-sm" onclick="equipFrame(${f.id})">装備する</button>`
        }
      </div>`;
  }).join('')}</div>`;
}

async function buyFrame(id, name, cost) {
  if (!confirm(`「${name}」を ${cost}pt で購入しますか？`)) return;
  try {
    const res = await apiFetch(`/shop/frames/buy/${id}`, { method: 'POST' });
    showAlert('#alert', res.message, 'success');
    await refreshMyData();
    const frames = await apiFetch('/shop/frames');
    renderShopFrames(frames);
    renderMyFrames();
  } catch (err) { showAlert('#alert', err.message); }
}

async function equipFrame(id) {
  try {
    const res = await apiFetch('/shop/frames/equip', { method: 'POST', body: JSON.stringify({ frame_id: id }) });
    showAlert('#alert', res.message, 'success');
    await refreshMyData();
    const frames = await apiFetch('/shop/frames');
    renderShopFrames(frames);
    renderMyFrames();
  } catch (err) { showAlert('#alert', err.message); }
}

// ===== アイコン =====
let myIconData = null; // { icons, equipped_icon_id }

async function renderMyIcons() {
  const el = document.getElementById('my-icons');
  try {
    myIconData = await apiFetch('/gacha/my');
    const icons = myIconData.icons || [];
    const equippedId = myIconData.equipped_icon_id ?? null;
    if (icons.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>所持しているアイコンがありません<br><a href="/gacha.html" style="color:var(--accent)">ガチャでゲットしよう</a></p></div>';
      return;
    }
    const noneEquipped = equippedId === null;
    el.innerHTML = `<div class="equip-icon-grid">
      <div class="equip-icon-none${noneEquipped ? ' equipped' : ''}" onclick="equipIcon(null)">
        <div style="width:56px;height:56px;border-radius:20%;background:var(--bg-primary);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:1.4rem">✕</div>
        <div class="iname">なし</div>
        ${noneEquipped ? '<div style="font-size:0.68rem;color:var(--accent);margin-top:2px">装備中</div>' : ''}
      </div>
      ${icons.map(icon => {
        const equipped = icon.id === equippedId || icon.is_equipped;
        return `<div class="equip-icon-card${equipped ? ' equipped' : ''}" onclick="equipIcon(${icon.id})">
          <img src="${escHtml(icon.image_url)}" alt="${escHtml(icon.name)}" class="${equipped ? `icon-rarity-${escHtml(icon.rarity)}` : ''}">
          <div class="iname">${escHtml(icon.name)}</div>
          ${equipped ? '<div style="font-size:0.68rem;color:var(--accent);margin-top:2px">装備中</div>' : ''}
        </div>`;
      }).join('')}
    </div>`;
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

async function equipIcon(id) {
  try {
    const res = await apiFetch('/gacha/equip', { method: 'POST', body: JSON.stringify({ icon_id: id }) });
    showAlert('#alert', res.message, 'success');
    await renderMyIcons();
    // localStorageのユーザー情報のequipped_icon_idを更新
    const u = getUser();
    if (u) { u.equipped_icon_id = id; setAuth(getToken(), u); }
  } catch (err) { showAlert('#alert', err.message); }
}

switchTab(getParam('tab') || 'shop');
load();
</script>
</body>
</html>
