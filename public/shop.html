<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ショップ - HBR</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.points-bar {
  display: flex;
  flex-direction: column;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 20px;
  margin-bottom: 24px;
}
.points-label { color: var(--text-secondary); font-size: 0.9rem; }
.points-value { font-size: 1.4rem; font-weight: bold; color: var(--accent); }

.title-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.title-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.title-card.owned { border-color: var(--accent); }
.title-card.equipped { background: var(--accent-dim); border-color: var(--accent); }
.title-name { font-size: 1rem; font-weight: bold; }
.title-desc { font-size: 0.82rem; color: var(--text-muted); flex: 1; }
.title-cost { font-size: 0.9rem; color: var(--accent); font-weight: bold; }
.title-badge {
  font-size: 0.72rem;
  padding: 2px 8px;
  border-radius: 10px;
  display: inline-block;
  background: var(--accent-dim);
  color: var(--accent);
  align-self: flex-start;
}

/* フレームプレビュー */
.frame-preview {
  height: 6px;
  border-radius: 3px;
  margin-bottom: 4px;
}
.frame-gold      { background: #ffd700; }
.frame-silver    { background: #c0c0c0; }
.frame-neon-blue { background: #00cfff; }
.frame-neon-pink { background: #ff4dd2; }
.frame-fire      { background: linear-gradient(90deg,#ff6a00,#ee0979); }
.frame-rainbow   { background: linear-gradient(90deg,#ff4d4d,#ff9a00,#ffe600,#4dff6e,#00cfff,#b44dff); }

.tabs { margin-bottom: 20px; }
.shop-tab-content { display: none; }
.shop-tab-content.active { display: block; }
.section-label { font-size: 0.82rem; font-weight: bold; color: var(--text-muted); margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 0.05em; }

/* アイコングリッド（装備タブ） */
.equip-icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
.equip-icon-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 8px; text-align: center; cursor: pointer; transition: border-color 0.15s;
}
.equip-icon-card.equipped { background: var(--accent-dim); border-color: var(--accent); }
.equip-icon-card img { width: 56px; height: 56px; border-radius: 20%; object-fit: cover; }
.equip-icon-card .iname { font-size: 0.72rem; margin-top: 6px; word-break: break-all; color: var(--text-secondary); }
.equip-icon-none {
  background: var(--bg-card); border: 1px dashed var(--border); border-radius: 10px;
  padding: 10px 8px; text-align: center; cursor: pointer; transition: border-color 0.15s;
}
.equip-icon-none.equipped { border-color: var(--accent); background: var(--accent-dim); }
.equip-icon-none .iname { font-size: 0.72rem; margin-top: 6px; color: var(--text-muted); }
</style>
</head>
<body>
<nav id="nav"></nav>
<main>
  <h1 class="page-title" id="page-title" data-i18n="shop.title">ショップ</h1>
  <div id="alert"></div>

  <div id="points-bar" style="display:none" class="points-bar">
    <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:6px" data-i18n="shop.points_hint">※ポイントはランキングに応じて配布されます</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="points-label" data-i18n="shop.my_points">所持ポイント</span>
      <span class="points-value" id="my-points">0</span>
      <span class="points-label">pt</span>
    </div>
  </div>

  <!-- ショップ（称号・推し称号・フレームのサブタブ） -->
  <div class="tab-content active" id="tab-shop">
    <div class="tabs" id="shop-tabs" style="margin-bottom:16px">
      <button class="tab-btn active" onclick="switchShopTab('titles')" data-i18n="shop.tab_titles">称号</button>
      <button class="tab-btn" onclick="switchShopTab('oshi')" data-i18n="shop.tab_oshi">推し称号</button>
      <button class="tab-btn" onclick="switchShopTab('frames')" data-i18n="shop.tab_frames" style="display:none">フレーム</button>
    </div>
    <div class="shop-tab-content active" id="shop-tab-titles">
      <div id="shop-titles"><div class="loading"><div class="spinner"></div><span data-i18n="loading">読み込み中...</span></div></div>
    </div>
    <div class="shop-tab-content" id="shop-tab-oshi">
      <div id="shop-oshi-titles"><div class="loading"><div class="spinner"></div><span data-i18n="loading">読み込み中...</span></div></div>
    </div>
    <div class="shop-tab-content" id="shop-tab-frames">
      <div id="shop-frames"><div class="loading"><div class="spinner"></div><span data-i18n="loading">読み込み中...</span></div></div>
    </div>
  </div>

  <!-- 装備（所持称号＋フレーム＋アイコンのサブタブ） -->
  <div class="tab-content" id="tab-equip">
    <div class="tabs" id="equip-tabs" style="margin-bottom:16px">
      <button class="tab-btn active" onclick="switchEquipTab('titles')" data-i18n="shop.tab_titles">称号</button>
      <button class="tab-btn" onclick="switchEquipTab('frames')" data-i18n="shop.tab_frames" style="display:none">フレーム</button>
      <button class="tab-btn" onclick="switchEquipTab('icons')" data-i18n="shop.tab_icons">アイコン</button>
    </div>
    <div class="shop-tab-content active" id="equip-tab-titles">
      <div id="my-titles"><div class="loading"><div class="spinner"></div><span data-i18n="loading">読み込み中...</span></div></div>
    </div>
    <div class="shop-tab-content" id="equip-tab-frames">
      <div id="my-frames"><div class="loading"><div class="spinner"></div><span data-i18n="loading">読み込み中...</span></div></div>
    </div>
    <div class="shop-tab-content" id="equip-tab-icons">
      <div style="display:flex;gap:6px;margin-bottom:12px">
        <button class="btn btn-secondary btn-sm" id="icon-sort-impl" onclick="setIconSort('impl')" style="opacity:1" data-i18n="shop.sort_unit">部隊順</button>
        <button class="btn btn-secondary btn-sm" id="icon-sort-acq" onclick="setIconSort('acq')" style="opacity:0.45" data-i18n="shop.sort_acq">入手順</button>
      </div>
      <div id="my-icons"><div class="loading"><div class="spinner"></div><span data-i18n="loading">読み込み中...</span></div></div>
    </div>
  </div>
</main>

<script src="/js/common.js"></script>
<script>
renderNav();
applyI18n();

const user = getUser();
let myData = null;


function switchTab(name) {
  ['shop','equip'].forEach(n => {
    document.getElementById('tab-' + n).classList.toggle('active', n === name);
  });
  document.getElementById('page-title').textContent = name === 'equip' ? t('shop.equip_title') : t('shop.title');
}

function switchEquipTab(name) {
  document.querySelectorAll('#equip-tabs .tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['titles','frames','icons'][i] === name);
  });
  ['titles','frames','icons'].forEach(n => {
    document.getElementById('equip-tab-' + n).classList.toggle('active', n === name);
  });
}

function switchShopTab(name) {
  document.querySelectorAll('#shop-tabs .tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['titles','oshi','frames'][i] === name);
  });
  document.querySelectorAll('.shop-tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('shop-tab-' + name).classList.add('active');
}

async function load() {
  try {
    const [titles, oshiTitles, frames] = await Promise.all([
      apiFetch('/shop/titles'),
      apiFetch('/shop/titles?tag=oshi'),
      apiFetch('/shop/frames')
    ]);
    if (user) {
      document.getElementById('points-bar').style.display = '';
      myData = await apiFetch('/shop/my');
      document.getElementById('my-points').textContent = myData.points;
      renderMyTitles();
      renderMyFrames();
      myIconData = null;
      await renderMyIcons();
    }
    renderShopTitles(titles);
    renderShopOshiTitles(oshiTitles);
    renderShopFrames(frames);
  } catch (err) {
    showAlert('#alert', err.message);
  }
}

async function refreshMyData() {
  myData = await apiFetch('/shop/my');
  document.getElementById('my-points').textContent = myData.points;
}

// ===== 称号 =====
function _titleScopeFor(scope) {
  // 外部枠に装備可能か（external/common）
  return scope !== 'internal';
}
function _titleScopeForInternal(scope) {
  // 内部枠に装備可能か（internal/common）
  return scope !== 'external';
}

function renderShopTitles(titles) {
  const el = document.getElementById('shop-titles');
  // 外部ユーザーは internal 称号を非表示
  const visible = user && isInternal() ? titles : (titles || []).filter(ti => (ti.scope || 'common') !== 'internal');
  if (!visible.length) {
    el.innerHTML = `<div class="empty-state"><p>${t('shop.no_titles')}</p></div>`;
    return;
  }
  el.innerHTML = `<div class="title-grid">${visible.map(ti => {
    const owned = myData?.titles.some(mt => mt.id === ti.id);
    const equippedExt = myData?.equipped_title_id === ti.id;
    const equippedInt = myData?.equipped_internal_title_id === ti.id;
    const equipped = equippedExt || equippedInt;
    const equippedLabel = equippedInt && equippedExt ? '内部・外部装備中' : equippedInt ? '内部装備中' : equippedExt ? '装備中' : '';
    return `
      <div class="title-card ${equipped ? 'equipped' : owned ? 'owned' : ''}">
        <div class="title-name">「${escHtml(ti.name)}」</div>
        ${ti.description ? `<div class="title-desc">${escHtml(ti.description)}</div>` : '<div class="title-desc"></div>'}
        <div class="title-cost">${ti.point_cost}pt</div>
        ${equipped
          ? `<span class="title-badge">${equippedLabel}</span>`
          : owned
            ? `<span class="title-badge">${t('shop.owned')}</span>`
            : user
              ? `<button class="btn btn-primary btn-sm" onclick="buyTitle(${ti.id},'${escHtml(ti.name)}',${ti.point_cost})">${t('shop.buy')}</button>`
              : `<span style="font-size:0.8rem;color:var(--text-muted)">${t('shop.login_to_buy')}</span>`
        }
      </div>`;
  }).join('')}</div>`;
}

function renderShopOshiTitles(titles) {
  const el = document.getElementById('shop-oshi-titles');
  const visible = user && isInternal() ? titles : (titles || []).filter(ti => (ti.scope || 'common') !== 'internal');
  if (!visible.length) {
    el.innerHTML = `<div class="empty-state"><p>${t('shop.no_titles')}</p></div>`;
    return;
  }
  el.innerHTML = `<div class="title-grid">${visible.map(ti => {
    const owned = myData?.titles.some(mt => mt.id === ti.id);
    const equippedExt = myData?.equipped_title_id === ti.id;
    const equippedInt = myData?.equipped_internal_title_id === ti.id;
    const equipped = equippedExt || equippedInt;
    const equippedLabel = equippedInt && equippedExt ? '内部・外部装備中' : equippedInt ? '内部装備中' : equippedExt ? '装備中' : '';
    return `
      <div class="title-card ${equipped ? 'equipped' : owned ? 'owned' : ''}">
        <div class="title-name">「${escHtml(ti.name)}」</div>
        ${ti.description ? `<div class="title-desc">${escHtml(ti.description)}</div>` : '<div class="title-desc"></div>'}
        <div class="title-cost">${ti.point_cost}pt</div>
        ${equipped
          ? `<span class="title-badge">${equippedLabel}</span>`
          : owned
            ? `<span class="title-badge">${t('shop.owned')}</span>`
            : user
              ? `<button class="btn btn-primary btn-sm" onclick="buyTitle(${ti.id},'${escHtml(ti.name)}',${ti.point_cost})">${t('shop.buy')}</button>`
              : `<span style="font-size:0.8rem;color:var(--text-muted)">${t('shop.login_to_buy')}</span>`
        }
      </div>`;
  }).join('')}</div>`;
}

function _renderTitleSlot(titles, equippedId, equipFn, unequipFn, emptyMsg) {
  if (!titles.length) return `<div class="empty-state" style="padding:12px 0"><p style="font-size:0.85rem">${emptyMsg}</p></div>`;
  return `<div class="title-grid">${titles.map(ti => {
    const equipped = equippedId === ti.id;
    return `
      <div class="title-card ${equipped ? 'equipped' : ''}">
        <div class="title-name">「${escHtml(ti.name)}」</div>
        ${ti.description ? `<div class="title-desc">${escHtml(ti.description)}</div>` : ''}
        ${ti.point_cost ? `<div class="title-cost">${ti.point_cost}pt</div>` : `<span class="title-badge">${t('shop.title_award')}</span>`}
        ${equipped
          ? `<span class="title-badge">${t('shop.equipped_badge')}</span>
             <button class="btn btn-secondary btn-sm" onclick="${unequipFn}">${t('shop.unequip')}</button>`
          : `<button class="btn btn-primary btn-sm" onclick="${equipFn}(${ti.id})">${t('shop.equip_btn')}</button>`
        }
      </div>`;
  }).join('')}</div>`;
}

function renderMyTitles() {
  const el = document.getElementById('my-titles');
  if (!myData?.titles?.length) {
    el.innerHTML = `<div class="empty-state"><p>${t('shop.no_my_titles')}</p></div>`;
    return;
  }
  if (isInternal()) {
    // 内部ユーザー：2つの装備枠
    const intTitles = myData.titles.filter(ti => _titleScopeForInternal(ti.scope || 'common'));
    const extTitles = myData.titles.filter(ti => _titleScopeFor(ti.scope || 'common'));
    el.innerHTML = `
      <div style="margin-bottom:20px">
        <div style="font-size:0.82rem;font-weight:bold;color:var(--text-muted);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)">内部用装備枠（内部ランキングに表示）</div>
        ${_renderTitleSlot(intTitles, myData.equipped_internal_title_id, 'equipTitleInternal', 'equipTitleInternal(null)', '装備できる称号がありません')}
      </div>
      <div>
        <div style="font-size:0.82rem;font-weight:bold;color:var(--text-muted);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)">外部用装備枠（外部ランキングに表示）</div>
        ${_renderTitleSlot(extTitles, myData.equipped_title_id, 'equipTitle', 'equipTitle(null)', '装備できる称号がありません')}
      </div>`;
  } else {
    // 外部ユーザー：1つの装備枠（external/common のみ）
    const extTitles = myData.titles.filter(ti => _titleScopeFor(ti.scope || 'common'));
    el.innerHTML = _renderTitleSlot(extTitles, myData.equipped_title_id, 'equipTitle', 'equipTitle(null)', t('shop.no_my_titles'));
  }
}

async function buyTitle(id, name, cost) {
  if (!confirm(`「${name}」を ${cost}pt で購入しますか？`)) return;
  try {
    const res = await apiFetch(`/shop/buy/${id}`, { method: 'POST' });
    showAlert('#alert', res.message, 'success');
    await refreshMyData();
    const titles = await apiFetch('/shop/titles');
    renderShopTitles(titles);
    renderMyTitles();
  } catch (err) { showAlert('#alert', err.message); }
}

async function equipTitle(id) {
  try {
    const res = await apiFetch('/shop/equip', { method: 'POST', body: JSON.stringify({ title_id: id }) });
    showAlert('#alert', res.message, 'success');
    await refreshMyData();
    const titles = await apiFetch('/shop/titles');
    renderShopTitles(titles);
    renderMyTitles();
  } catch (err) { showAlert('#alert', err.message); }
}

async function equipTitleInternal(id) {
  try {
    const res = await apiFetch('/shop/equip-internal', { method: 'POST', body: JSON.stringify({ title_id: id }) });
    showAlert('#alert', res.message, 'success');
    await refreshMyData();
    const titles = await apiFetch('/shop/titles');
    renderShopTitles(titles);
    renderMyTitles();
  } catch (err) { showAlert('#alert', err.message); }
}

// ===== フレーム =====
function renderShopFrames(frames) {
  const el = document.getElementById('shop-frames');
  if (!frames || frames.length === 0) {
    el.innerHTML = `<div class="empty-state"><p>${t('shop.no_frames')}</p></div>`;
    return;
  }
  el.innerHTML = `<div class="title-grid">${frames.map(f => {
    const owned = myData?.frames?.some(mf => mf.id === f.id);
    const equipped = myData?.equipped_frame_id === f.id;
    return `
      <div class="title-card ${equipped ? 'equipped' : owned ? 'owned' : ''}">
        <div class="frame-preview ${escHtml(f.css_class)}"></div>
        <div class="title-name">${escHtml(f.name)}</div>
        ${f.description ? `<div class="title-desc">${escHtml(f.description)}</div>` : '<div class="title-desc"></div>'}
        <div class="title-cost">${f.point_cost}pt</div>
        ${equipped
          ? `<span class="title-badge">${t('shop.equipped_badge')}</span>`
          : owned
            ? `<span class="title-badge">${t('shop.owned')}</span>`
            : user
              ? `<button class="btn btn-primary btn-sm" onclick="buyFrame(${f.id},'${escHtml(f.name)}',${f.point_cost})">${t('shop.buy')}</button>`
              : `<span style="font-size:0.8rem;color:var(--text-muted)">${t('shop.login_to_buy')}</span>`
        }
      </div>`;
  }).join('')}</div>`;
}

function renderMyFrames() {
  const el = document.getElementById('my-frames');
  if (!myData?.frames?.length) {
    el.innerHTML = `<div class="empty-state"><p>${t('shop.no_my_frames')}</p></div>`;
    return;
  }
  el.innerHTML = `<div class="title-grid">${myData.frames.map(f => {
    const equipped = myData.equipped_frame_id === f.id;
    return `
      <div class="title-card ${equipped ? 'equipped' : ''}">
        <div class="frame-preview ${escHtml(f.css_class)}"></div>
        <div class="title-name">${escHtml(f.name)}</div>
        ${f.description ? `<div class="title-desc">${escHtml(f.description)}</div>` : ''}
        <div class="title-cost">${f.point_cost}pt</div>
        ${equipped
          ? `<span class="title-badge">${t('shop.equipped_badge')}</span>
             <button class="btn btn-secondary btn-sm" onclick="equipFrame(null)">${t('shop.unequip')}</button>`
          : `<button class="btn btn-primary btn-sm" onclick="equipFrame(${f.id})">${t('shop.equip_btn')}</button>`
        }
      </div>`;
  }).join('')}</div>`;
}

async function buyFrame(id, name, cost) {
  if (!confirm(`「${name}」を ${cost}pt で購入しますか？`)) return;
  try {
    const res = await apiFetch(`/shop/frames/buy/${id}`, { method: 'POST' });
    showAlert('#alert', res.message, 'success');
    await refreshMyData();
    const frames = await apiFetch('/shop/frames');
    renderShopFrames(frames);
    renderMyFrames();
  } catch (err) { showAlert('#alert', err.message); }
}

async function equipFrame(id) {
  try {
    const res = await apiFetch('/shop/frames/equip', { method: 'POST', body: JSON.stringify({ frame_id: id }) });
    showAlert('#alert', res.message, 'success');
    await refreshMyData();
    const frames = await apiFetch('/shop/frames');
    renderShopFrames(frames);
    renderMyFrames();
  } catch (err) { showAlert('#alert', err.message); }
}

// ===== アイコン =====
let myIconData = null;
let iconSort = 'impl';

function setIconSort(mode) {
  iconSort = mode;
  document.getElementById('icon-sort-impl').style.opacity = mode === 'impl' ? '1' : '0.45';
  document.getElementById('icon-sort-acq').style.opacity  = mode === 'acq'  ? '1' : '0.45';
  renderMyIcons();
}

const UNIT_ORDER = ['31A','31B','31C','31D','31E','31F','30G','31X'];
const rarityOrder = r => r === 'SS' ? 1 : r === 'S' ? 2 : 3;

function iconCardHtml(icon, equippedId) {
  const equipped = icon.id === equippedId;
  return `<div class="equip-icon-card${equipped ? ' equipped' : ''}" onclick="equipIcon(${icon.id})">
    <img src="${escHtml(icon.image_url)}" alt="${escHtml(icon.name)}" class="${equipped ? `icon-rarity-${escHtml(icon.rarity)}` : ''}">
    <div class="iname">${escHtml(icon.name)}</div>
    ${equipped ? `<div style="font-size:0.68rem;color:var(--accent);margin-top:2px">${t('shop.equipped_badge')}</div>` : ''}
  </div>`;
}

function renderIconsUnit(icons, equippedId) {
  const noneEquipped = equippedId === null;
  const noneCard = `<div class="equip-icon-none${noneEquipped ? ' equipped' : ''}" onclick="equipIcon(null)">
    <div style="width:56px;height:56px;border-radius:20%;background:var(--bg-primary);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:1.4rem">✕</div>
    <div class="iname">${t('shop.icon_none')}</div>
    ${noneEquipped ? `<div style="font-size:0.68rem;color:var(--accent);margin-top:2px">${t('shop.equipped_badge')}</div>` : ''}
  </div>`;

  const groups = {};
  for (const u of UNIT_ORDER) groups[u] = [];
  groups[''] = [];
  for (const icon of icons) groups[icon.unit || ''].push(icon);

  let html = noneCard;
  for (const u of [...UNIT_ORDER, '']) {
    const group = groups[u];
    if (!group.length) continue;
    group.sort((a, b) => rarityOrder(a.rarity) - rarityOrder(b.rarity));
    html += `</div><div style="font-size:0.78rem;font-weight:bold;color:var(--text-muted);margin:16px 0 6px">${u || t('shop.no_unit')}</div><div class="equip-icon-grid">`;
    html += group.map(ic => iconCardHtml(ic, equippedId)).join('');
  }
  return `<div class="equip-icon-grid">${html}</div>`;
}

function renderIconsAcq(icons, equippedId) {
  const noneEquipped = equippedId === null;
  const sorted = [...icons].sort((a, b) => new Date(a.acquired_at) - new Date(b.acquired_at));
  return `<div class="equip-icon-grid">
    <div class="equip-icon-none${noneEquipped ? ' equipped' : ''}" onclick="equipIcon(null)">
      <div style="width:56px;height:56px;border-radius:20%;background:var(--bg-primary);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:1.4rem">✕</div>
      <div class="iname">${t('shop.icon_none')}</div>
      ${noneEquipped ? `<div style="font-size:0.68rem;color:var(--accent);margin-top:2px">${t('shop.equipped_badge')}</div>` : ''}
    </div>
    ${sorted.map(ic => iconCardHtml(ic, equippedId)).join('')}
  </div>`;
}

async function renderMyIcons() {
  const el = document.getElementById('my-icons');
  try {
    if (!myIconData) myIconData = await apiFetch('/gacha/my');
    const icons = myIconData.icons || [];
    const equippedId = myIconData.equipped_icon_id ?? null;
    if (icons.length === 0) {
      el.innerHTML = `<div class="empty-state"><p>${t('shop.no_icons')}<br><a href="/gacha.html" style="color:var(--accent)">${t('shop.go_gacha')}</a></p></div>`;
      return;
    }
    el.innerHTML = iconSort === 'acq'
      ? renderIconsAcq(icons, equippedId)
      : renderIconsUnit(icons, equippedId);
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(err.message)}</div>`;
  }
}

async function equipIcon(id) {
  try {
    const res = await apiFetch('/gacha/equip', { method: 'POST', body: JSON.stringify({ icon_id: id }) });
    showAlert('#alert', res.message, 'success');
    myIconData.equipped_icon_id = id ?? null;
    myIconData.icons.forEach(ic => { ic.is_equipped = ic.id === id; });
    renderMyIcons();
    const u = getUser();
    if (u) { u.equipped_icon_id = id; setAuth(getToken(), u); }
  } catch (err) { showAlert('#alert', err.message); }
}

switchTab(getParam('tab') || 'shop');
load();
</script>
</body>
</html>
